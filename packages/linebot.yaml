###################################################################################
## SENSOR
###################################################################################
sensor:
  - platform: rest
    unique_id: bot_msg_count1
    name: bot_msg_count1
    resource: https://api.line.me/v2/bot/message/quota/consumption
    method: GET
    headers:
      Authorization: !secret linebot_token1_bearer
    value_template: "{{ value_json.totalUsage }}"
    scan_interval: 180

  - platform: rest
    unique_id: bot_msg_count2
    name: bot_msg_count2
    resource: https://api.line.me/v2/bot/message/quota/consumption
    method: GET
    headers:
      Authorization: !secret linebot_token2_bearer
    value_template: "{{ value_json.totalUsage }}"
    scan_interval: 180

  - platform: rest
    unique_id: bot_msg_count3
    name: bot_msg_count3
    resource: https://api.line.me/v2/bot/message/quota/consumption
    method: GET
    headers:
      Authorization: !secret linebot_token3_bearer
    value_template: "{{ value_json.totalUsage }}"
    scan_interval: 180

  - platform: rest
    unique_id: bot_msg_count0
    name: bot_msg_count0
    resource: https://api.line.me/v2/bot/message/quota/consumption
    method: GET
    headers:
      Authorization: !secret linebot_token0_bearer
    value_template: "{{ value_json.totalUsage }}"
    scan_interval: 180

###################################################################################
## TEMPLATE SENSOR
###################################################################################
template:
  - sensor:
      - name: bot_msg_remaining1
        unique_id: bot_msg_remaining1
        unit_of_measurement: "msg"
        icon: mdi:counter
        state: >-
          {% set limit = 200 %}
          {% set usage = states('sensor.bot_msg_count1') %}
          {% set invalids = ['unknown','unavailable','none','None'] %}
          {% if usage|lower in invalids %}
            unknown
          {% else %}
            {% set remain = [limit - usage|int(0), 0]|max %}
            {{ remain }}
          {% endif %}
        availability: >-
          {% set usage = states('sensor.bot_msg_count1') %}
          {{ usage|lower not in ['unknown','unavailable','none','None'] }}
        attributes:
          limit: 200
          usage: "{{ states('sensor.bot_msg_count1')|int(0) }}"
          used_ratio: >-
            {% set used = states('sensor.bot_msg_count1')|int(0) %}
            {{ ((used / 200) * 100)|round(1) }}

      - name: bot_msg_remaining2
        unique_id: bot_msg_remaining2
        unit_of_measurement: "msg"
        icon: mdi:counter
        state: >-
          {% set limit = 200 %}
          {% set usage = states('sensor.bot_msg_count2') %}
          {% set invalids = ['unknown','unavailable','none','None'] %}
          {% if usage|lower in invalids %}
            unknown
          {% else %}
            {% set remain = [limit - usage|int(0), 0]|max %}
            {{ remain }}
          {% endif %}
        availability: >-
          {% set usage = states('sensor.bot_msg_count2') %}
          {{ usage|lower not in ['unknown','unavailable','none','None'] }}
        attributes:
          limit: 200
          usage: "{{ states('sensor.bot_msg_count2')|int(0) }}"
          used_ratio: >-
            {% set used = states('sensor.bot_msg_count2')|int(0) %}
            {{ ((used / 200) * 100)|round(1) }}

      - name: bot_msg_remaining3
        unique_id: bot_msg_remaining3
        unit_of_measurement: "msg"
        icon: mdi:counter
        state: >-
          {% set limit = 200 %}
          {% set usage = states('sensor.bot_msg_count3') %}
          {% set invalids = ['unknown','unavailable','none','None'] %}
          {% if usage|lower in invalids %}
            unknown
          {% else %}
            {% set remain = [limit - usage|int(0), 0]|max %}
            {{ remain }}
          {% endif %}
        availability: >-
          {% set usage = states('sensor.bot_msg_count3') %}
          {{ usage|lower not in ['unknown','unavailable','none','None'] }}
        attributes:
          limit: 200
          usage: "{{ states('sensor.bot_msg_count3')|int(0) }}"
          used_ratio: >-
            {% set used = states('sensor.bot_msg_count3')|int(0) %}
            {{ ((used / 200) * 100)|round(1) }}

      - name: bot_msg_remaining0
        unique_id: bot_msg_remaining0
        unit_of_measurement: "msg"
        icon: mdi:counter
        state: >-
          {% set limit = 200 %}
          {% set usage = states('sensor.bot_msg_count0') %}
          {% set invalids = ['unknown','unavailable','none','None'] %}
          {% if usage|lower in invalids %}
            unknown
          {% else %}
            {% set remain = [limit - usage|int(0), 0]|max %}
            {{ remain }}
          {% endif %}
        availability: >-
          {% set usage = states('sensor.bot_msg_count0') %}
          {{ usage|lower not in ['unknown','unavailable','none','None'] }}
        attributes:
          limit: 200
          usage: "{{ states('sensor.bot_msg_count0')|int(0) }}"
          used_ratio: >-
            {% set used = states('sensor.bot_msg_count0')|int(0) %}
            {{ ((used / 200) * 100)|round(1) }}


      - name: line_bot_rotation_target
        unique_id: line_bot_rotation_target
        icon: mdi:repeat-variant
        state: >-
          {% set switch_limit = 196 %}
          {% set mode = states('input_select.line_bot_mode') %}
          {% set invalids = ['unknown','unavailable','none','None'] %}

          {# 取得各 Bot 剩餘量，若無效則設為 0 #}
          {% set r1 = states('sensor.bot_msg_remaining1')|int(-1) if states('sensor.bot_msg_remaining1') not in invalids else -1 %}
          {% set r2 = states('sensor.bot_msg_remaining2')|int(-1) if states('sensor.bot_msg_remaining2') not in invalids else -1 %}
          {% set r3 = states('sensor.bot_msg_remaining3')|int(-1) if states('sensor.bot_msg_remaining3') not in invalids else -1 %}
          {% set r0 = states('sensor.bot_msg_remaining0')|int(-1) if states('sensor.bot_msg_remaining0') not in invalids else -1 %}

          {% if mode == 'Auto' %}
            {# 嚴格依照 1 -> 2 -> 3 -> 0 順序檢查是否有剩餘額度 #}
            {% if r1 > 0 and states('sensor.bot_msg_count1')|int(0) < switch_limit %}1
            {% elif r2 > 0 and states('sensor.bot_msg_count2')|int(0) < switch_limit %}2
            {% elif r3 > 0 and states('sensor.bot_msg_count3')|int(0) < switch_limit %}3
            {% elif r0 > 0 and states('sensor.bot_msg_count0')|int(0) < switch_limit %}0
            {# 若大家都超過 switch_limit 但還有殘餘額度，則依序選還有剩的 #}
            {% elif r1 > 0 %}1
            {% elif r2 > 0 %}2
            {% elif r3 > 0 %}3
            {% elif r0 > 0 %}0
            {% else %}0{% endif %} {# 完全沒額度時停在緊急 Bot 0 #}
          {% elif mode == 'Manual Bot1' %}1
          {% elif mode == 'Manual Bot2' %}2
          {% elif mode == 'Manual Bot3' %}3
          {% elif mode == 'Manual Bot0（緊急Bot）' %}0
          {% else %}-1{% endif %}

      - name: line_bot_in_use
        unique_id: line_bot_in_use
        icon: mdi:robot-excited
        state: >-
          {% set target = states('sensor.line_bot_rotation_target')|int(0) %}
          {% if target == 1 %}ChiangFamily 智慧家庭 B
          {% elif target == 2 %}ChiangFamily 智慧家庭 C
          {% elif target == 3 %}ChiangFamily 智慧家庭 D
          {% elif target == 0 %}ChiangFamily 緊急 Bot
          {% else %}無可用 Bot{% endif %}
        attributes:
          target_index: "{{ states('sensor.line_bot_rotation_target') }}"
          rotation_switch_limit: 196

      - name: line_bot_target_user_id
        unique_id: line_bot_target_user_id
        icon: mdi:account-arrow-right
        state: >-
          {% set default_id = 'C26ff4e9d30159ba5264a1676f46f8f86' %}
          {% set test_id = 'U9eeaaf5d404dbde249039924567992d3' %}
          {% set custom_id = states('input_text.line_bot_custom_user_id')|trim %}
          {% set custom_on = is_state('input_boolean.line_bot_custom_user_enable', 'on') %}
          {% set test_on = is_state('input_boolean.line_bot_test_mode', 'on') %}
          {% set invalids = ['', 'unknown', 'unavailable', 'None'] %}

          {% if test_on %}
            {{ test_id }}
          {% elif custom_on and custom_id not in invalids %}
            {{ custom_id }}
          {% else %}
            {{ default_id }}
          {% endif %}
        attributes:
          mode: >-
            {% set custom_id = states('input_text.line_bot_custom_user_id')|trim %}
            {% set custom_on = is_state('input_boolean.line_bot_custom_user_enable', 'on') %}
            {% set test_on = is_state('input_boolean.line_bot_test_mode', 'on') %}
            {% set invalids = ['', 'unknown', 'unavailable', 'None'] %}
            {% if test_on %}
              test
            {% elif custom_on and custom_id not in invalids %}
              custom
            {% else %}
              default
            {% endif %}
          default_user_id: "C26ff4e9d30159ba5264a1676f46f8f86"
          test_user_id: "U9eeaaf5d404dbde249039924567992d3"
###################################################################################
## SCRIPT（原樣保留）
###################################################################################
script:
  send_line_to_user:
    alias: Line to Target User (Bot Auto, Text + JSON)
    mode: parallel
    fields:
      user_id:
        description: "LINE 使用者 / 群組 / Room ID"
        required: true
      message:
        description: "一般純文字訊息（擇一）"
        required: false
      payload:
        description: "LINE messages JSON（僅 messages，不含 to）"
        required: false

    sequence:
      - variables:
          quota_limit: 200
          switch_limit: 196

          bot0_token: !secret linebot_token0_bearer
          bot1_token: !secret linebot_token1_bearer
          bot2_token: !secret linebot_token2_bearer
          bot3_token: !secret linebot_token3_bearer

          bot0_name: "ChiangFamily 緊急 Bot"
          bot1_name: "ChiangFamily 智慧家庭 B"
          bot2_name: "ChiangFamily 智慧家庭 C"
          bot3_name: "ChiangFamily 智慧家庭 D"

          quota_notify_user: U9eeaaf5d404dbde249039924567992d3
          bot_mode: "{{ states('input_select.line_bot_mode') }}"
          bot_test_mode: "{{ states('input_boolean.line_bot_test_mode') }}"
          bot_override_user: "{{ states('input_text.line_bot_custom_user_id')|trim }}"
          bot_custom_enable: "{{ states('input_boolean.line_bot_custom_user_enable') }}"

          has_text: "{{ message is defined }}"
          has_json: "{{ payload is defined }}"
          valid_input: "{{ (has_text and not has_json) or (has_json and not has_text) }}"

          current_bot: "{{ states('sensor.line_bot_rotation_target')|int(-1) }}"

          target_user: >
            {% if bot_test_mode == 'on' %}
              U9eeaaf5d404dbde249039924567992d3
            {% elif bot_custom_enable == 'on' and bot_override_user not in ['', 'unknown', 'unavailable'] %}
              {{ bot_override_user }}
            {% else %}
              {{ user_id }}
            {% endif %}

          use_token: >
            {% if current_bot|int == 0 %}{{ bot0_token }}
            {% elif current_bot|int == 1 %}{{ bot1_token }}
            {% elif current_bot|int == 2 %}{{ bot2_token }}
            {% elif current_bot|int == 3 %}{{ bot3_token }}
            {% else %}""{% endif %}

          used_count: >
            {% if current_bot|int == 0 %}{{ states('sensor.bot_msg_count0')|int }}
            {% elif current_bot|int == 1 %}{{ states('sensor.bot_msg_count1')|int }}
            {% elif current_bot|int == 2 %}{{ states('sensor.bot_msg_count2')|int }}
            {% elif current_bot|int == 3 %}{{ states('sensor.bot_msg_count3')|int }}
            {% else %}999{% endif %}

          remain_count: "{{ quota_limit - used_count }}"
          need_countdown_notice: "{{ remain_count <= 12 }}"
          can_notify_quota: >-
            {{
              states('sensor.bot_msg_count0')|int(999) < quota_limit
              and states('input_boolean.notify_line_quota_warn_enable') == 'on'
            }}

          final_quota_notice: >-
            {{
              states('sensor.bot_msg_count0')|int(999) < quota_limit
              and states('input_boolean.notify_line_quota_final_enable') == 'on'
            }}

          # 🔑 自動補 to 的 RAW JSON
          full_payload: >
            {% if has_json %}
            {
              "to": "{{ target_user }}",
              "messages": {{ payload }}
            }
            {% endif %}
      # ───── 防呆 ─────
      - choose:
          - conditions: "{{ not valid_input }}"
            sequence:
              - service: system_log.write
                data:
                  level: error
                  message: "send_line_to_user：message 與 payload 必須擇一"
              - stop: "Invalid input"

      # ───── 正常送出 ─────
      - choose:
          - conditions: "{{ use_token | length > 10 }}"
            sequence:

              # JSON
              - choose:
                  - conditions: "{{ has_json }}"
                    sequence:
                      - service: rest_command.line_bot_push_raw
                        data:
                          token: "{{ use_token }}"
                          payload: "{{ full_payload }}"

                  # 文字
                  - conditions: "{{ has_text }}"
                    sequence:
                      - service: rest_command.line_bot_push
                        data:
                          token: "{{ use_token }}"
                          to: "{{ target_user }}"
                          text: "{{ message }}"

              # 額度倒數（管理者，改用緊急 Bot 通知）
              - choose:
                  - conditions: "{{ need_countdown_notice and can_notify_quota }}"
                    sequence:
                      - service: rest_command.line_bot_push
                        data:
                          token: "{{ bot0_token }}"
                          to: "{{ quota_notify_user }}"
                          text: "⚠️ {{ remain_count }} 次後將切換 Bot（目前使用：Bot{{ current_bot }}）"

        default:
          - choose:
              - conditions: "{{ final_quota_notice }}"
                sequence:
                  - service: rest_command.line_bot_push
                    data:
                      token: "{{ bot0_token }}"
                      to: "{{ quota_notify_user }}"
                      text: "🚨 所有 Bot 額度已滿或不可用，訊息未送出"
          - service: system_log.write
            data:
              level: error
              message: "LINE Bot 配額不足，無法送出訊息"
###################################################################################
## REST_COMMAND
###################################################################################
rest_command:
  # 原本：單則文字
  line_bot_push:
    url: "https://api.line.me/v2/bot/message/push"
    method: POST
    content_type: "application/json"
    headers:
      Authorization: "{{ token }}"
    payload: >
      {
        "to": "{{ to }}",
        "messages": [
          { "type": "text", "text": "{{ text }}" }
        ]
      }

  # 新增：RAW JSON（多泡泡 / 災防）
  line_bot_push_raw:
    url: "https://api.line.me/v2/bot/message/push"
    method: POST
    content_type: "application/json"
    headers:
      Authorization: "{{ token }}"
    payload: "{{ payload }}"
