# ─────────────────────────────────────────────────────────────
# LINE Bot 套件 (V1.1)
# 更新重點（2025-02-24）：
# 1) 保留原本 Bot 輪播 Script
# 2) 新增 RAW REST Command，可直接送 LINE JSON（多泡泡 / 災防）
# ─────────────────────────────────────────────────────────────

###################################################################################
## SENSOR
###################################################################################
sensor:
  - platform: rest
    unique_id: bot_msg_count1
    name: bot_msg_count1
    resource: https://api.line.me/v2/bot/message/quota/consumption
    method: GET
    headers:
      Authorization: !secret linebot_token1_bearer
    value_template: "{{ value_json.totalUsage }}"
    scan_interval: 180

  - platform: rest
    unique_id: bot_msg_count2
    name: bot_msg_count2
    resource: https://api.line.me/v2/bot/message/quota/consumption
    method: GET
    headers:
      Authorization: !secret linebot_token2_bearer
    value_template: "{{ value_json.totalUsage }}"
    scan_interval: 180

  - platform: rest
    unique_id: bot_msg_count3
    name: bot_msg_count3
    resource: https://api.line.me/v2/bot/message/quota/consumption
    method: GET
    headers:
      Authorization: !secret linebot_token3_bearer
    value_template: "{{ value_json.totalUsage }}"
    scan_interval: 180
###################################################################################
## SCRIPT（原樣保留）
###################################################################################
script:
  send_line_to_user:
    alias: Line to Target User (Bot Auto, Text + JSON)
    mode: parallel
    fields:
      user_id:
        description: "LINE 使用者 / 群組 / Room ID"
        required: true
      message:
        description: "一般純文字訊息（擇一）"
        required: false
      payload:
        description: "LINE messages JSON（僅 messages，不含 to）"
        required: false

    sequence:
      - variables:
          quota_limit: 200
          switch_limit: 198

          bot1_token: !secret linebot_token1_bearer
          bot2_token: !secret linebot_token2_bearer
          bot3_token: !secret linebot_token3_bearer

          bot1_name: "ChiangFamily 智慧家庭 B"
          bot2_name: "ChiangFamily 智慧家庭 C"
          bot3_name: "ChiangFamily 智慧家庭 D"

          has_text: "{{ message is defined }}"
          has_json: "{{ payload is defined }}"
          valid_input: "{{ (has_text and not has_json) or (has_json and not has_text) }}"

          current_bot: >
            {% set c1 = states('sensor.bot_msg_count1') %}
            {% set c2 = states('sensor.bot_msg_count2') %}
            {% set c3 = states('sensor.bot_msg_count3') %}
            {% if c1 not in ['unknown','unavailable'] and c1|int < switch_limit %}
              1
            {% elif c2 not in ['unknown','unavailable'] and c2|int < switch_limit %}
              2
            {% elif c3 not in ['unknown','unavailable'] and c3|int < switch_limit %}
              3
            {% else %}
              0
            {% endif %}

          use_token: >
            {% if current_bot|int == 1 %}{{ bot1_token }}
            {% elif current_bot|int == 2 %}{{ bot2_token }}
            {% elif current_bot|int == 3 %}{{ bot3_token }}
            {% else %}""{% endif %}

          used_count: >
            {% if current_bot|int == 1 %}{{ states('sensor.bot_msg_count1')|int }}
            {% elif current_bot|int == 2 %}{{ states('sensor.bot_msg_count2')|int }}
            {% elif current_bot|int == 3 %}{{ states('sensor.bot_msg_count3')|int }}
            {% else %}999{% endif %}

          remain_count: "{{ quota_limit - used_count }}"
          need_countdown_notice: "{{ remain_count in [3,2,1] }}"

          # 🔑 自動補 to 的 RAW JSON
          full_payload: >
            {% if has_json %}
            {
              "to": "{{ user_id }}",
              "messages": {{ payload }}
            }
            {% endif %}

      # ───── 防呆 ─────
      - choose:
          - conditions: "{{ not valid_input }}"
            sequence:
              - service: system_log.write
                data:
                  level: error
                  message: "send_line_to_user：message 與 payload 必須擇一"
              - stop: "Invalid input"

      # ───── 正常送出 ─────
      - choose:
          - conditions: "{{ use_token | length > 10 }}"
            sequence:

              # JSON
              - choose:
                  - conditions: "{{ has_json }}"
                    sequence:
                      - service: rest_command.line_bot_push_raw
                        data:
                          token: "{{ use_token }}"
                          payload: "{{ full_payload }}"

                  # 文字
                  - conditions: "{{ has_text }}"
                    sequence:
                      - service: rest_command.line_bot_push
                        data:
                          token: "{{ use_token }}"
                          to: "{{ user_id }}"
                          text: "{{ message }}"

              # 額度倒數（管理者）
              - choose:
                  - conditions: "{{ need_countdown_notice }}"
                    sequence:
                      - service: script.send_line_emergency
                        data:
                          message: "⚠️ {{ remain_count }} 次後將切換 Bot"

        default:
          - service: script.send_line_emergency
            data:
              message: "🚨 LINE 主力 Bot 額度已滿，訊息未送出"
###################################################################################
## REST_COMMAND
###################################################################################
rest_command:
  # 原本：單則文字
  line_bot_push:
    url: "https://api.line.me/v2/bot/message/push"
    method: POST
    content_type: "application/json"
    headers:
      Authorization: "{{ token }}"
    payload: >
      {
        "to": "{{ to }}",
        "messages": [
          { "type": "text", "text": "{{ text }}" }
        ]
      }

  # 新增：RAW JSON（多泡泡 / 災防）
  line_bot_push_raw:
    url: "https://api.line.me/v2/bot/message/push"
    method: POST
    content_type: "application/json"
    headers:
      Authorization: "{{ token }}"
    payload: "{{ payload }}"
