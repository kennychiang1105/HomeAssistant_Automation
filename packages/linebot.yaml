# ─────────────────────────────────────────────────────────────
# LINE Bot 套件 (V1.8)
# 更新重點（V1.8）：
# 1) Auto 模式下，先挑選未達 196 則的可用 Bot；若僅有未知用量的 Bot，依序嘗試 1→2→3→0；完全不可用時才回報額度用盡，不再誤回退到耗盡的 Bot。
# 2) 保留 V1.7 功能：感測器全數暫時無效時回退主力 Bot1，避免顯示額度 0。
# 3) 保留 V1.6 功能：修正 Bot3 顯示名稱缺字，與其他 Bot 命名保持一致。
# 4) 保留 V1.5 功能：集中計算測試模式/自訂 ID/預設 ID，供自動化共用，Manual Bot0 標註緊急 Bot。
# ─────────────────────────────────────────────────────────────
# LINE Bot 套件 (V1.7)
# 更新重點（V1.7）：
# 1) Auto 模式下，當所有用量感測器暫時無效時改回預設主力 Bot1，避免誤判為額度 0。
# 2) 保留 V1.6 功能：修正 Bot3 顯示名稱缺字，與其他 Bot 命名保持一致。
# 3) 保留 V1.5 功能：集中計算測試模式/自訂 ID/預設 ID，供自動化共用，Manual Bot0 標註緊急 Bot。
# LINE Bot 套件 (V1.6)
# 更新重點（V1.6）：
# 1) 修正 Bot3 顯示名稱缺字，與其他 Bot 命名保持一致。
# 2) 保留 V1.5 功能：集中計算測試模式/自訂 ID/預設 ID，供自動化共用，Manual Bot0 標註緊急 Bot。
# ─────────────────────────────────────────────────────────────
# LINE Bot 套件 (V1.5)
# 更新重點（V1.5）：
# 1) 新增 sensor.line_bot_target_user_id，集中計算測試模式/自訂 ID/預設 ID，供自動化共用。
# 2) 保留 V1.4 功能：Manual Bot0 標註緊急 Bot，對應 Helper 移除 initial 設定。
# ─────────────────────────────────────────────────────────────
# LINE Bot 套件 (V1.4)
# 更新重點（V1.4）：
# 1) Manual Bot0 選項標註「緊急Bot」，對應 Helper 移除 initial 設定。
# 2) 保留 V1.3 功能：新增緊急 Bot0、輪播門檻 196/12 則提醒、測試模式/自訂目標 ID。
# LINE Bot 套件 (V1.3)
# 更新重點（V1.3）：
# 1) 新增緊急 Bot0，並提供手動 Bot0-3 與自動模式切換實體。
# 2) 輪播門檻調整為 196，12 則時改以緊急 Bot 推送額度提醒。
# 3) 測試模式時統一改向測試 ID，並支援自訂目標 ID 覆蓋。
# LINE Bot 套件 (V1.2)
# 更新重點（V1.2）：
# 1) 保留原本 Bot 輪播 Script
# 2) 新增 RAW REST Command，可直接送 LINE JSON（多泡泡 / 災防）
