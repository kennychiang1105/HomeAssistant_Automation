template:
    - trigger:
        - platform: state
          entity_id:
            - input_boolean.aqara_zai_jia
            - input_boolean.aqara_wan_an
            - input_boolean.aqara_li_jia
            - input_boolean.aqara_guan_bi
            - input_boolean.aqara_chu_fa
      sensor:
        - name: aqaradang_qian_qing_jing
          unique_id: aqaradang_qian_qing_jing
          icon: mdi:shield-home
          state: >-
            {% set pairs = [
              ('在家情境', is_state('input_boolean.aqara_zai_jia','on')),
              ('晚安情境', is_state('input_boolean.aqara_wan_an','on')),
              ('離家情境', is_state('input_boolean.aqara_li_jia','on')),
              ('網關解除情境', is_state('input_boolean.aqara_guan_bi','on')),
              ('網關觸發情境', is_state('input_boolean.aqara_chu_fa','on'))
            ] %}
            {% set active = pairs | selectattr('1') | map(attribute='0') | list %}
            {% if active|length == 0 %}
              未設定情境
            {% elif active|length == 1 %}
              {{ active[0] }}
            {% else %}
              多個情境衝突：{{ active|join('、') }}
            {% endif %}
          attributes:
            friendly_name: Aqara當前情境
            active_labels: >-
              {% set pairs = [
                ('在家情境', is_state('input_boolean.aqara_zai_jia','on')),
                ('晚安情境', is_state('input_boolean.aqara_wan_an','on')),
                ('離家情境', is_state('input_boolean.aqara_li_jia','on')),
                ('網關解除情境', is_state('input_boolean.aqara_guan_bi','on')),
                ('網關觸發情境', is_state('input_boolean.aqara_chu_fa','on'))
              ] %}
              {% set active = pairs | selectattr('1') | map(attribute='0') | list %}
              {% if active|length == 0 %}
                未設定情境
              {% elif active|length == 1 %}
                {{ active[0] }}
              {% else %}
                多個情境衝突：{{ active|join('、') }}
              {% endif %}

    - trigger:
        - platform: state
          entity_id:
            - sensor.0x54ef4410007ac23c_battery
            - sensor.doorlock_batt_days_left_last_model
            - input_text.doorlock_batt_model_current
            - input_text.doorlock_batt_model_last_cycle
        - platform: time_pattern   # 保活：避免長時間沒回報時 UI 顯示舊態
          minutes: "/15"
      sensor:
        - name: 客廳門鎖電量（過濾）
          # entity_id 將會是 sensor.ke_ting_men_suo_dian_liang_guo_lu
          unit_of_measurement: "%"
          device_class: battery
          state_class: measurement
          icon: mdi:battery
          # （可選）唯一 ID，方便在 UI 調整圖示/名稱
          unique_id: doorlock_battery_filtered_main
          state: >-
            {% set new = states('sensor.0x54ef4410007ac23c_battery') %}
            {% set old = states('sensor.ke_ting_men_suo_dian_liang_guo_lu') %}
            {% set invalids = ['unknown','unavailable','None','none','','nan'] %}
            {% if new in invalids %}
              {{ old if old not in invalids else -1 }}
            {% else %}
              {% set v = new|float(0) %}
              {# 合理範圍 0~100；超出則沿用舊值；若舊值也不可用則 -1 #}
              {% if 0 <= v <= 100 %}
                {{ v }}
              {% else %}
                {{ (old|float(-1)) if old not in invalids else -1 }}
              {% endif %}
            {% endif %}
          attributes:
            source_entity: sensor.0x54ef4410007ac23c_battery
            last_raw: "{{ states('sensor.0x54ef4410007ac23c_battery') }}"
        - name: batt_line_text
          unique_id: doorlock_batt_line_text
          icon: mdi:lock-alert
          state: |-
            {% set batt_raw = states('sensor.ke_ting_men_suo_dian_liang_guo_lu') %}
            {% set eta_raw = states('sensor.doorlock_batt_days_left_last_model') %}
            {% set model_now = states('input_text.doorlock_batt_model_current')|trim %}
            {% set model_last = states('input_text.doorlock_batt_model_last_cycle')|trim %}
            {% set invalids = ['unknown','unavailable','none','None','','nan','-1'] %}
            {% set header = '門鎖電量摘要：' %}

            {% set eta_val = eta_raw|float(none) %}
            {% set eta_valid = eta_val is not none and eta_val >= 0 %}
            {% set eta_text = (eta_val|round(0)|int|string ~ ' 天') if eta_valid else '—（不同款或資料不足）' %}
            {% set model_curr = model_now if model_now not in invalids else '—' %}
            {% set model_prev = model_last if model_last not in invalids else '—' %}

            {% if batt_raw in invalids %}
              {{ [
                header,
                '• 資料暫無（gateway 尚未回報）',
                '• 預估天數：' ~ eta_text,
                '• 當前/上次款式：' ~ model_curr ~ ' / ' ~ model_prev
              ] | join('\n') }}
            {% else %}
              {% set batt_val = batt_raw|float(0) %}
              {% set lines = [
                header,
                '• 客廳門鎖電量：' ~ (batt_val|round(0)|int) ~ '%',
                '• 預估天數：' ~ eta_text,
                '• 當前/上次款式：' ~ model_curr ~ ' / ' ~ model_prev
              ] %}

              {% if batt_val < 10 %}
                {% set lines = lines + ['• ⚠️ 電量<10%：「自動離家」與「網關系統」可能異常'] %}
              {% endif %}

              {% if batt_val < 1 %}
                {% set lines = lines + ['• 🟥 完全沒電（0%）：已排除客廳門鎖狀態檢查，請儘速更換電池'] %}
              {% endif %}

              {{ lines | join('\n') }}
            {% endif %}

    - trigger:
        - platform: state
          entity_id:
            - input_number.living_room_effective_apparent_temperature
            - input_number.rooftop_effective_apparent_temperature
        - platform: time_pattern   # 保活：避免長時間無狀態更新時 HomeKit 仍能同步
          minutes: "/10"
      sensor:
        - name: 客廳有效體感溫度（HomeKit橋接）
          unique_id: living_room_effective_apparent_temperature_homekit
          unit_of_measurement: "°C"
          device_class: temperature
          state_class: measurement
          state: >-
            {% set current = states('input_number.living_room_effective_apparent_temperature') %}
            {% set invalids = ['unknown','unavailable','none','None',''] %}
            {% if current in invalids %}
              {{ this.state if this.state not in invalids else 0 }}
            {% else %}
              {{ current | float(0) }}
            {% endif %}
          attributes:
            source_entity: input_number.living_room_effective_apparent_temperature

        - name: 頂樓有效體感溫度（HomeKit橋接）
          unique_id: rooftop_effective_apparent_temperature_homekit
          unit_of_measurement: "°C"
          device_class: temperature
          state_class: measurement
          state: >-
            {% set current = states('input_number.rooftop_effective_apparent_temperature') %}
            {% set invalids = ['unknown','unavailable','none','None',''] %}
            {% if current in invalids %}
              {{ this.state if this.state not in invalids else 0 }}
            {% else %}
              {{ current | float(0) }}
            {% endif %}
          attributes:
            source_entity: input_number.rooftop_effective_apparent_temperature

    - trigger:
        - platform: homeassistant
          event: start
        - platform: event
          event_type: automation_reloaded
        - platform: state
          entity_id: automation.ai_auto_leave_system
          attribute: friendly_name
      sensor:
          - name: AI離家版本（Template）
            unique_id: ai_leave_version_template
            icon: mdi:home-export-outline
            state: >-
              {% set friendly = state_attr('automation.ai_auto_leave_system','friendly_name') %}
              {% set invalids = ['unknown','unavailable', '', None] %}
              {{ friendly if friendly not in invalids else 'AI離家 v3.0' }}
            attributes:
              source_automation: automation.ai_auto_leave_system

automation:
  - id: ui_ai_leave_version_sync
    alias: AI離家版本同步器 v3.0
    description: Home Assistant 啟動或自動離家版本更新時同步版本字串
    mode: single
    trigger:
      - platform: homeassistant
        event: start
      - platform: event
        event_type: automation_reloaded
      - platform: state
        entity_id: automation.ai_auto_leave_system
        attribute: friendly_name
    action:
      - variables:
          current_version: >-
            {% set friendly = state_attr('automation.ai_auto_leave_system','friendly_name') %}
            {% set invalids = ['unknown','unavailable', '', None] %}
            {{ friendly if friendly not in invalids else 'AI離家 v3.0' }}
      - service: input_text.set_value
        target:
          entity_id: input_text.ai_leave_version_text
        data:
          value: "{{ current_version }}"
      - service: homeassistant.update_entity
        target:
          entity_id: sensor.ai_li_jia_ban_ben_template

  - id: ui_line_notif_title_refresh
    alias: LINE通知標題同步器 v3.0
    description: 開機/自動化重載時同步 LINE 標題 helpers，避免 initial 版本舊化
    mode: single
    trigger:
      - platform: homeassistant
        event: start
      - platform: event
        event_type: automation_reloaded
      - platform: state
        entity_id:
          - sensor.ai_li_jia_ban_ben_template
          - input_text.ai_leave_version_text
    variables:
      ai_leave_version: >-
        {% set friendly = state_attr('automation.ai_auto_leave_system','friendly_name') %}
        {% set invalids = ['unknown','unavailable','', None, 'none', 'None'] %}
        {% set version = friendly if friendly not in invalids else states('sensor.ai_li_jia_ban_ben_template') %}
        {{ version if version not in invalids else 'AI離家 v3.0' }}
      ai_leave_title: "【{{ ai_leave_version.replace('AI離家', 'AI離家系統') }}】"
      batt_warn_title: "【AI電量告警系統 V3.0】"
      batt_calib_title: "【AI電量計算系統 V3.0】"
      leave_guard_title: "【離家保全系統 V3.0】"
      gateway_alert_title: "【保全告警系統 V3.0】"
    action:
      - service: input_text.set_value
        data:
          entity_id:
            - input_text.notif_title_100b_general
            - input_text.notif_title_100b_urgent
          value: "{{ ai_leave_title }}"
      - service: input_text.set_value
        data:
          entity_id:
            - input_text.notif_title_100c_warn
            - input_text.notif_title_100c_alarm
          value: "{{ batt_warn_title }}"
      - service: input_text.set_value
        target:
          entity_id: input_text.notif_title_100c_calib
        data:
          value: "{{ batt_calib_title }}"
      - service: input_text.set_value
        data:
          entity_id:
            - input_text.notif_title_086_important
            - input_text.notif_title_086_emergency
          value: "{{ leave_guard_title }}"
      - service: input_text.set_value
        target:
          entity_id: input_text.notif_title_gateway_alert
        data:
          value: "{{ gateway_alert_title }}"

