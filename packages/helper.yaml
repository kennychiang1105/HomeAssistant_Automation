template:
    - trigger:
        - platform: homeassistant
          event: start
        - platform: event
          event_type: automation_reloaded
        - platform: state
          entity_id:
            - automation.ai_auto_leave_system
          attribute: friendly_name
        - platform: state
          entity_id:
            - input_text.ai_leave_version_text
      sensor:
        - name: ai_li_jia_ban_ben_template
          unique_id: ai_li_jia_ban_ben_template
          icon: mdi:home-export-outline
          state: >-
            {% set friendly = state_attr('automation.ai_auto_leave_system','friendly_name') %}
            {% set helper_version = states('input_text.ai_leave_version_text') %}
            {% set invalids = ['unknown','unavailable','none','None','', None] %}
            {{ friendly if friendly not in invalids else (helper_version if helper_version not in invalids else 'AI離家 V3.3.1') }}

    - trigger:
        - platform: event
          event_type: ai_version_snapshot_update
      sensor:
        - name: ai_version_snapshot_history
          unique_id: ai_version_snapshot_history
          icon: mdi:source-branch-check
          state: >-
            {{ trigger.event.time_fired.isoformat() if trigger is defined else now().isoformat() }}
          attributes:
            ha_version: >-
              {{ trigger.event.data.ha_version if trigger is defined else 'V0.0' }}
            versions: >-
              {% if trigger is defined %}
                {% set raw_versions = trigger.event.data.get('versions') %}
                {% if raw_versions is mapping %}
                  {{ raw_versions }}
                {% else %}
                  {% set payload = trigger.event.data.versions_json | default('{}') %}
                  {{ payload | from_json }}
                {% endif %}
              {% else %}
                {{ dict() }}
              {% endif %}
            changed_lines_text: >-
              {{ trigger.event.data.changed_lines_text if trigger is defined else '' }}

    - sensor:
        - name: ai_version_snapshot_summary
          unique_id: ai_version_snapshot_summary
          icon: mdi:history
          state: >-
            {% set ha = state_attr('sensor.ai_version_snapshot_history', 'ha_version') | default('V0.0', true) %}
            {% set versions = state_attr('sensor.ai_version_snapshot_history', 'versions') %}
            {% set count = versions | count if versions is mapping else 0 %}
            {{ ha ~ ' / ' ~ count ~ '項版本' }}
          attributes:
            last_snapshot_at: >-
              {{ states('sensor.ai_version_snapshot_history') }}
            changed_lines_text: >-
              {{ state_attr('sensor.ai_version_snapshot_history', 'changed_lines_text') | default('', true) }}

    - sensor:
        - name: ai_version_compare_current
          unique_id: ai_version_compare_current
          icon: mdi:source-branch-sync
          state: >-
            {% set invalid_texts = ['unknown', 'unavailable', 'none', 'None', ''] %}
            {% set core = state_attr('update.home_assistant_core_update', 'installed_version') %}
            {{ core if core not in invalid_texts and core is not none else '未知' }}
          attributes:
            ha_version: >-
              {% set invalid_texts = ['unknown', 'unavailable', 'none', 'None', ''] %}
              {% set core = state_attr('update.home_assistant_core_update', 'installed_version') %}
              {{ core if core not in invalid_texts and core is not none else '未知' }}
            os_version: >-
              {% set invalid_texts = ['unknown', 'unavailable', 'none', 'None', ''] %}
              {% set os = state_attr('update.home_assistant_operating_system_update', 'installed_version') %}
              {{ os if os not in invalid_texts and os is not none else '未知' }}
            versions: >-
              {% set invalid_texts = ['unknown', 'unavailable', 'none', 'None', ''] %}
              {% set versions = state_attr('sensor.ai_version_registry_dynamic', 'versions') %}
              {% set ns = namespace(versions=((versions | tojson | from_json) if versions is mapping else dict())) %}
              {% set ns.versions = dict(ns.versions,
                system_operating_system_version={'name': 'Operating System版本', 'version': (state_attr('update.home_assistant_operating_system_update', 'installed_version') if state_attr('update.home_assistant_operating_system_update', 'installed_version') not in invalid_texts and state_attr('update.home_assistant_operating_system_update', 'installed_version') is not none else '未知'), 'file': 'system_auto'},
                manual_homekit_framework_version={'name': 'HomeKit架構版本', 'version': (states('input_text.homekit_framework_version_manual') if states('input_text.homekit_framework_version_manual') not in invalid_texts else '未設定'), 'file': 'manual_input'},
                manual_automation_package_version={'name': '自動化更新包版本', 'version': (states('input_text.automation_package_version_manual') if states('input_text.automation_package_version_manual') not in invalid_texts else '未設定'), 'file': 'manual_input'},
                manual_automation_framework_version={'name': '自動化架構版本', 'version': (states('input_text.automation_framework_version_manual') if states('input_text.automation_framework_version_manual') not in invalid_texts else '未設定'), 'file': 'manual_input'}
              ) %}
              {{ ns.versions }}
            versions_json: >-
              {% set invalid_texts = ['unknown', 'unavailable', 'none', 'None', ''] %}
              {% set versions = state_attr('sensor.ai_version_registry_dynamic', 'versions') %}
              {% set ns = namespace(versions=((versions | tojson | from_json) if versions is mapping else dict())) %}
              {% set ns.versions = dict(ns.versions,
                system_operating_system_version={'name': 'Operating System版本', 'version': (state_attr('update.home_assistant_operating_system_update', 'installed_version') if state_attr('update.home_assistant_operating_system_update', 'installed_version') not in invalid_texts and state_attr('update.home_assistant_operating_system_update', 'installed_version') is not none else '未知'), 'file': 'system_auto'},
                manual_homekit_framework_version={'name': 'HomeKit架構版本', 'version': (states('input_text.homekit_framework_version_manual') if states('input_text.homekit_framework_version_manual') not in invalid_texts else '未設定'), 'file': 'manual_input'},
                manual_automation_package_version={'name': '自動化更新包版本', 'version': (states('input_text.automation_package_version_manual') if states('input_text.automation_package_version_manual') not in invalid_texts else '未設定'), 'file': 'manual_input'},
                manual_automation_framework_version={'name': '自動化架構版本', 'version': (states('input_text.automation_framework_version_manual') if states('input_text.automation_framework_version_manual') not in invalid_texts else '未設定'), 'file': 'manual_input'}
              ) %}
              {{ ns.versions | tojson }}

    - trigger:
        - platform: state
          entity_id:
            - input_boolean.aqara_zai_jia
            - input_boolean.aqara_wan_an
            - input_boolean.aqara_li_jia
            - input_boolean.aqara_guan_bi
            - input_boolean.aqara_chu_fa
      sensor:
        - name: aqaradang_qian_qing_jing
          unique_id: aqaradang_qian_qing_jing
          icon: mdi:shield-home
          state: >-
            {% set pairs = [
              ('在家情境', is_state('input_boolean.aqara_zai_jia','on')),
              ('晚安情境', is_state('input_boolean.aqara_wan_an','on')),
              ('離家情境', is_state('input_boolean.aqara_li_jia','on')),
              ('網關解除情境', is_state('input_boolean.aqara_guan_bi','on')),
              ('網關觸發情境', is_state('input_boolean.aqara_chu_fa','on'))
            ] %}
            {% set active = pairs | selectattr('1') | map(attribute='0') | list %}
            {% if active|length == 0 %}
              未設定情境
            {% elif active|length == 1 %}
              {{ active[0] }}
            {% else %}
              多個情境衝突：{{ active|join('、') }}
            {% endif %}
          attributes:
            friendly_name: Aqara當前情境
            active_labels: >-
              {% set pairs = [
                ('在家情境', is_state('input_boolean.aqara_zai_jia','on')),
                ('晚安情境', is_state('input_boolean.aqara_wan_an','on')),
                ('離家情境', is_state('input_boolean.aqara_li_jia','on')),
                ('網關解除情境', is_state('input_boolean.aqara_guan_bi','on')),
                ('網關觸發情境', is_state('input_boolean.aqara_chu_fa','on'))
              ] %}
              {% set active = pairs | selectattr('1') | map(attribute='0') | list %}
              {% if active|length == 0 %}
                未設定情境
              {% elif active|length == 1 %}
                {{ active[0] }}
              {% else %}
                多個情境衝突：{{ active|join('、') }}
              {% endif %}

    - trigger:
        - platform: state
          entity_id:
            - sensor.ke_ting_men_suo_dian_liang_guo_lu
            - input_number.doorlock_batt_drop_last_cycle
            - input_text.doorlock_batt_model_current
            - input_text.doorlock_batt_model_last_cycle
        - platform: time_pattern
          minutes: "/15"
      sensor:
        - name: doorlock_batt_days_left_last_model
          unique_id: doorlock_batt_days_left_last_model
          icon: mdi:calendar-clock
          unit_of_measurement: "d"
          state: >-
            {% set batt = states('sensor.ke_ting_men_suo_dian_liang_guo_lu')|float(none) %}
            {% set drop = states('input_number.doorlock_batt_drop_last_cycle')|float(none) %}
            {% set model_now = states('input_text.doorlock_batt_model_current')|trim %}
            {% set model_last = states('input_text.doorlock_batt_model_last_cycle')|trim %}
            {% set invalids = ['unknown','unavailable','none','None','null',''] %}

            {% set model_ok =
              (model_now|lower not in invalids)
              and (model_last|lower not in invalids)
              and (model_now == model_last)
            %}
            {% set batt_ok = batt is not none and batt >= 0 %}
            {% set drop_ok = drop is not none and drop > 0 %}

            {% if batt_ok and drop_ok and model_ok %}
              {% set raw_days = (batt / drop) %}
              {% set last_drop = states('input_datetime.doorlock_batt_last_drop_time') %}
              {% set hold_age_days = ((as_timestamp(now()) - as_timestamp(last_drop)) / 86400) if last_drop not in ['unknown', 'unavailable', 'none'] else 0 %}
              {% set est_days = [raw_days - hold_age_days, 0] | max %}
              {{ est_days|round(1) }}
            {% else %}
              unknown
            {% endif %}
          attributes:
            battery_percent: >-
              {{ states('sensor.ke_ting_men_suo_dian_liang_guo_lu') }}
            drop_percent_per_day: >-
              {{ states('input_number.doorlock_batt_drop_last_cycle') }}
            model_current: >-
              {{ states('input_text.doorlock_batt_model_current') }}
            model_last_cycle: >-
              {{ states('input_text.doorlock_batt_model_last_cycle') }}
            same_model: >-
              {% set model_now = states('input_text.doorlock_batt_model_current')|trim %}
              {% set model_last = states('input_text.doorlock_batt_model_last_cycle')|trim %}
              {% set invalids = ['unknown','unavailable','none','None','null',''] %}
              {{
                (model_now|lower not in invalids)
                and (model_last|lower not in invalids)
                and (model_now == model_last)
              }}

    - trigger:
        - platform: state
          entity_id:
            - sensor.0x54ef4410007ac23c_battery
            - sensor.doorlock_batt_days_left_last_model
            - input_text.doorlock_batt_model_current
            - input_text.doorlock_batt_model_last_cycle
        - platform: time_pattern   # 保活：避免長時間沒回報時 UI 顯示舊態
          minutes: "/15"
      sensor:
        - name: 客廳門鎖電量（過濾）
          # entity_id 將會是 sensor.ke_ting_men_suo_dian_liang_guo_lu
          unit_of_measurement: "%"
          device_class: battery
          state_class: measurement
          icon: mdi:battery
          # （可選）唯一 ID，方便在 UI 調整圖示/名稱
          unique_id: doorlock_battery_filtered_main
          state: >-
            {% set new = states('sensor.0x54ef4410007ac23c_battery') %}
            {% set old = states('sensor.ke_ting_men_suo_dian_liang_guo_lu') %}
            {% set invalids = ['unknown','unavailable','None','none','','nan'] %}
            {% if new in invalids %}
              {{ old if old not in invalids else -1 }}
            {% else %}
              {% set v = new|float(0) %}
              {# 合理範圍 0~100；超出則沿用舊值；若舊值也不可用則 -1 #}
              {% if 0 <= v <= 100 %}
                {{ v }}
              {% else %}
                {{ (old|float(-1)) if old not in invalids else -1 }}
              {% endif %}
            {% endif %}
          attributes:
            source_entity: sensor.0x54ef4410007ac23c_battery
            last_raw: "{{ states('sensor.0x54ef4410007ac23c_battery') }}"
        - name: batt_line_text
          unique_id: doorlock_batt_line_text
          icon: mdi:lock-alert
          state: |-
            {% set batt_raw = states('sensor.ke_ting_men_suo_dian_liang_guo_lu') %}
            {% set eta_raw = states('sensor.doorlock_batt_days_left_last_model') %}
            {% set model_now = states('input_text.doorlock_batt_model_current')|trim %}
            {% set model_last = states('input_text.doorlock_batt_model_last_cycle')|trim %}
            {% set invalids = ['unknown','unavailable','none','None','','nan','-1'] %}
            {% set header = '門鎖電量摘要：' %}

            {% set eta_val = eta_raw|float(none) %}
            {% set eta_valid = eta_val is not none and eta_val >= 0 %}
            {% set eta_text = (eta_val|round(0)|int|string ~ ' 天') if eta_valid else '—（不同款或資料不足）' %}
            {% set model_curr = model_now if model_now not in invalids else '—' %}
            {% set model_prev = model_last if model_last not in invalids else '—' %}

            {% if batt_raw in invalids %}
              {{ [
                header,
                '• 資料暫無（gateway 尚未回報）',
                '• 預估天數：' ~ eta_text,
                '• 當前/上次款式：' ~ model_curr ~ ' / ' ~ model_prev
              ] | join('\n') }}
            {% else %}
              {% set batt_val = batt_raw|float(0) %}
              {% set lines = [
                header,
                '• 客廳門鎖電量：' ~ (batt_val|round(0)|int) ~ '%',
                '• 預估天數：' ~ eta_text,
                '• 當前/上次款式：' ~ model_curr ~ ' / ' ~ model_prev
              ] %}

              {% if batt_val < 10 %}
                {% set lines = lines + ['• ⚠️ 電量<10%：「自動離家」與「網關系統」可能異常'] %}
              {% endif %}

              {% if batt_val < 1 %}
                {% set lines = lines + ['• 🟥 完全沒電（0%）：已排除客廳門鎖狀態檢查，請儘速更換電池'] %}
              {% endif %}

              {{ lines | join('\n') }}
            {% endif %}

    - trigger:
        - platform: state
          entity_id:
            - input_number.living_room_effective_apparent_temperature
            - input_number.rooftop_effective_apparent_temperature
        - platform: time_pattern   # 保活：避免長時間無狀態更新時 HomeKit 仍能同步
          minutes: "/10"
      sensor:
        - name: 客廳有效體感溫度（HomeKit橋接）
          unique_id: living_room_effective_apparent_temperature_homekit
          unit_of_measurement: "°C"
          device_class: temperature
          state_class: measurement
          state: >-
            {% set current = states('input_number.living_room_effective_apparent_temperature') %}
            {% set invalids = ['unknown','unavailable','none','None',''] %}
            {% if current in invalids %}
              {{ this.state if this.state not in invalids else 0 }}
            {% else %}
              {{ current | float(0) }}
            {% endif %}
          attributes:
            source_entity: input_number.living_room_effective_apparent_temperature

        - name: 頂樓有效體感溫度（HomeKit橋接）
          unique_id: rooftop_effective_apparent_temperature_homekit
          unit_of_measurement: "°C"
          device_class: temperature
          state_class: measurement
          state: >-
            {% set current = states('input_number.rooftop_effective_apparent_temperature') %}
            {% set invalids = ['unknown','unavailable','none','None',''] %}
            {% if current in invalids %}
              {{ this.state if this.state not in invalids else 0 }}
            {% else %}
              {{ current | float(0) }}
            {% endif %}
          attributes:
            source_entity: input_number.rooftop_effective_apparent_temperature

    - trigger:
        - platform: homeassistant
          event: start
        - platform: event
          event_type: automation_reloaded
        - platform: state
          entity_id: automation.ai_auto_leave_system
          attribute: friendly_name
      sensor:
          - name: AI離家版本（Template）
            unique_id: ai_leave_version_template
            icon: mdi:home-export-outline
            state: >-
              {% set friendly = state_attr('automation.ai_auto_leave_system','friendly_name') %}
              {% set invalids = ['unknown','unavailable', '', None] %}
              {{ friendly if friendly not in invalids else 'AI離家 V3.0' }}
            attributes:
              source_automation: automation.ai_auto_leave_system

automation:
  - id: ui_ai_version_snapshot_clear
    alias: 版本快照記憶清除器
    description: 按下按鈕後清空 00-2A 更新紀錄比對快照，方便重測推播流程
    mode: single
    trigger:
      - platform: state
        entity_id: input_button.ai_version_snapshot_clear
    variables:
      debug_message: >-
        快照重置內容：
        ha_version=V0.0
        versions_count=0
    action:
      - event: ai_version_snapshot_update
        event_data:
          ha_version: "V0.0"
          versions: {}
          versions_json: "{}"
          changed_lines_text: ""
      - service: persistent_notification.create
        data:
          title: 更新紀錄比對記憶已清除
          message: >-
            已重置 ai_version_snapshot_history 快照。
            下一次執行「00-2A更新紀錄推播AI」會重新建立基準版本。
      - if:
          - condition: state
            entity_id: input_boolean.ai_version_snapshot_debug_enable
            state: "on"
        then:
          - service: persistent_notification.create
            data:
              title: 更新紀錄比對記憶（Debug）
              message: "{{ debug_message }}"

  - id: ui_ai_version_snapshot_set_baseline
    alias: 版本快照基準寫入器
    description: 按下按鈕後以目前版本寫入快照基準，不會觸發 00-2A 更新通知
    mode: single
    trigger:
      - platform: state
        entity_id: input_button.ai_version_snapshot_set_baseline
    variables:
      invalid_texts: ["unknown", "unavailable", "none", "None", ""]
      ha_current_version: >-
        {{ state_attr('sensor.ai_version_compare_current', 'ha_version') | default('未知', true) }}
      os_current_version: >-
        {{ state_attr('sensor.ai_version_compare_current', 'os_version') | default('未知', true) }}
      homekit_framework_version: >-
        {{ states('input_text.homekit_framework_version_manual') if states('input_text.homekit_framework_version_manual') not in invalid_texts else '未設定' }}
      automation_package_version: >-
        {{ states('input_text.automation_package_version_manual') if states('input_text.automation_package_version_manual') not in invalid_texts else '未設定' }}
      automation_framework_version: >-
        {{ states('input_text.automation_framework_version_manual') if states('input_text.automation_framework_version_manual') not in invalid_texts else '未設定' }}
      registry_versions: >-
        {{ state_attr('sensor.ai_version_registry_dynamic', 'versions') if state_attr('sensor.ai_version_registry_dynamic', 'versions') is mapping else dict() }}
      current_versions: >-
        {% set ns = namespace(versions=(registry_versions if registry_versions is mapping else dict())) %}
        {% set ns.versions = dict(ns.versions,
          system_operating_system_version={'name': 'Operating System版本', 'version': os_current_version, 'file': 'system_auto'},
          manual_homekit_framework_version={'name': 'HomeKit架構版本', 'version': homekit_framework_version, 'file': 'manual_input'},
          manual_automation_package_version={'name': '自動化更新包版本', 'version': automation_package_version, 'file': 'manual_input'},
          manual_automation_framework_version={'name': '自動化架構版本', 'version': automation_framework_version, 'file': 'manual_input'}
        ) %}
        {{ ns.versions }}
      current_versions_count: "{{ current_versions | count }}"
      debug_message: >-
        目前基準寫入內容：
        ha_version={{ ha_current_version }}
        versions_count={{ current_versions_count }}
    action:
      - event: ai_version_snapshot_update
        event_data:
          ha_version: "{{ ha_current_version }}"
          versions: "{{ current_versions }}"
          versions_json: "{{ current_versions | tojson }}"
          changed_lines_text: ""
      - service: persistent_notification.create
        data:
          title: 更新紀錄比對基準已寫入
          message: >-
            已將目前版本寫入 ai_version_snapshot_history 作為比對基準。
            下一次執行「00-2A更新紀錄推播AI」不會因相同版本而重複通知。
      - if:
          - condition: state
            entity_id: input_boolean.ai_version_snapshot_debug_enable
            state: "on"
        then:
          - service: persistent_notification.create
            data:
              title: 更新紀錄比對基準（Debug）
              message: "{{ debug_message }}"

  - id: ui_ai_leave_version_sync
    alias: AI離家版本同步器 v3.1
    description: Home Assistant 啟動或自動離家版本更新時同步版本字串
    mode: single
    trigger:
      - platform: homeassistant
        event: start
      - platform: event
        event_type: automation_reloaded
      - platform: state
        entity_id: automation.ai_auto_leave_system
        attribute: friendly_name
    variables:
      automation_version: "V3.1"
      ai_auto_leave_version_fallback: "V3.3.1"
    action:
      - variables:
          current_version: >-
            {% set friendly = state_attr('automation.ai_auto_leave_system','friendly_name') %}
            {% set invalids = ['unknown','unavailable','none','None', '', None] %}
            {{ friendly if friendly not in invalids else 'AI離家 ' ~ ai_auto_leave_version_fallback }}
      - service: input_text.set_value
        target:
          entity_id: input_text.ai_leave_version_text
        data:
          value: "{{ current_version }}"
      - service: homeassistant.update_entity
        target:
          entity_id: sensor.ai_li_jia_ban_ben_template

  - id: ui_line_notif_title_refresh
    alias: LINE通知標題同步器 v3.0
    description: 開機/自動化重載時同步 LINE 標題 helpers，避免 initial 版本舊化
    mode: single
    trigger:
      - platform: homeassistant
        event: start
      - platform: event
        event_type: automation_reloaded
      - platform: state
        entity_id:
          - sensor.ai_li_jia_ban_ben_template
          - input_text.ai_leave_version_text
    variables:
      ai_leave_version: >-
        {% set friendly = state_attr('automation.ai_auto_leave_system','friendly_name') %}
        {% set invalids = ['unknown','unavailable','', None, 'none', 'None'] %}
        {% set version = friendly if friendly not in invalids else states('sensor.ai_li_jia_ban_ben_template') %}
        {{ version if version not in invalids else 'AI離家 V3.0' }}
      ai_leave_title: "【{{ ai_leave_version.replace('AI離家', 'AI離家系統') }}】"
      batt_warn_title: "【AI電量告警系統 V3.1】"
      batt_calib_title: "【AI電量計算系統 V3.1】"
      leave_guard_title: "【離家保全系統 V3.1】"
      gateway_alert_title: "【保全告警系統 V3.1】"
    action:
      - service: input_text.set_value
        data:
          entity_id:
            - input_text.notif_title_100b_general
            - input_text.notif_title_100b_urgent
          value: "{{ ai_leave_title }}"
      - service: input_text.set_value
        data:
          entity_id:
            - input_text.notif_title_100c_warn
            - input_text.notif_title_100c_alarm
          value: "{{ batt_warn_title }}"
      - service: input_text.set_value
        target:
          entity_id: input_text.notif_title_100c_calib
        data:
          value: "{{ batt_calib_title }}"
      - service: input_text.set_value
        data:
          entity_id:
            - input_text.notif_title_086_important
            - input_text.notif_title_086_emergency
          value: "{{ leave_guard_title }}"
      - service: input_text.set_value
        target:
          entity_id: input_text.notif_title_gateway_alert
        data:
          value: "{{ gateway_alert_title }}"

