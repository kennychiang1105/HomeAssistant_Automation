# 新增與強化：
#   • 緊急模式強化：新增多種觸發方式（實體/虛擬按鈕）與詳細通知，並加入自動復位。
#   • 頂樓AI自動化：整合風扇智慧溫控、基於Wi-Fi與攝影機的上下樓情境判斷、以及夜燈亮度修正。
