# ──────────────────────────────────────────────
# Helpers（V3.0）
# ──────────────────────────────────────────────
# 新增與強化 (V3.0):
#   • AI/UI 自動化命名規範統一：AI 以 ai_、UI 以 ui_ 前綴，並移除 ID 版本號。
#   • 雙軌調整：改由 configuration/Automations 直接載入 AI 自動化（移除 automations_active 依賴）。
#   • 標題與相容性同步：LINE Bot 與各系統標題版本統一至 V3.0。
# 新增與強化 (V2.20):
#   • LINE 標題版本同步：預設標題與同步器版本號更新至 100B/08-6/100C/保全告警自動化最新版本，避免 Helper 與自動化不一致。
# 新增與強化 (V2.19):
#   • LINE Bot 控制：版本說明同步至 Line Bot 套件 V1.5，搭配共用目標 ID 感測器使用。
# 新增與強化 (V2.18):
#   • LINE Bot 控制：移除測試模式、自訂 ID 啟用與目標 ID 的 initial 設定，Manual Bot0 標註緊急 Bot，避免覆蓋狀態。
# 新增與強化 (V2.17):
#   • LINE Bot 控制：新增 Bot 模式切換 input_select、測試模式開關與自訂目標 ID 欄位，配合 Line Bot 套件 V1.3。
#   • 配額提示同步：提供手動 Bot0-3 與自動模式實體，支援改向測試帳號。
# 新增與強化 (V2.16):
#   • Aqara 情境標籤命名：調整情境 helper 的 entity_id 為 sensor.aqaradang_qian_qing_jing，避免錯字導致通知空白。
# 新增與強化 (V2.15):
#   • Aqara 情境標籤強化：確保 helper 感測器永遠回傳有效文字（無情境/多情境），供通知穩定取值。
# 新增與強化 (V2.14):
#   • Aqara 情境標籤：新增 template sensor 同步目前情境文字，讓通知可共用一致的情境描述。
#   • 保全告警系統：將網關守護相關標題改為「保全告警系統」，名稱去除 Aqara 字樣。
#   • LPR 關門延遲：預設與步進改為 1.5 分鐘、0.5 分鐘步進，方便細調。
# 新增與強化 (V2.12):
#   • Aqara 網關情境通知：新增離家保全/網關異常的 LINE 標題 helpers，並同步至最新版本字串。
#   • LINE 分級調整：離家保全的鐵門/門鎖告警改為使用重要/緊急開關，可依 Helper 控制是否推播。
#   • 版本同步：AI 離家系統版本同步至 V2.4，標題同步器一併更新。
# 新增與強化 (V2.11):
#   • 災害通知去重：新增 last_disaster_broadcast 與 disaster_last_message helpers，供天氣告知系統記錄上次播報時間與內容，避免重複播報。
# 新增與強化 (V2.10):
#   • LINE 標題自動同步：新增通知標題同步器，開機/自動化重載時自動寫入最新版本字串，避免 initial 版本舊化。
#   • 版本日誌保留：保留 V2.9 以前的歷史更新紀錄供追溯。
# 新增與強化 (V2.9):
#   • AI 離家與電量系統版本同步：更新 LINE 標題 helpers 至 V2.3/V2.2/V2.3，並同步版本字串模板與自動化。
# 新增與強化 (V2.8):
#   • 體感溫度 HomeKit 橋接修正：確保橋接溫度即使來源暫無更新也維持最近有效值，避免 HomeKit 顯示 unknown。
# 新增與強化 (V2.7):
#   • 體感溫度 HomeKit 橋接：新增 template sensors 將客廳/頂樓體感溫度 input_number 映射為溫度感測器，便於 HomeKit 匯入。
# 新增與強化 (V2.6):
#   • 門鎖電量摘要：移除多餘結尾與修正 ETA 行內格式，確保 YAML 可正確解析並恢復電量摘要。
#
# 新增與強化 (V2.5):
#   • 門鎖電量摘要縮排修正：修正 flow collection 縮排錯誤，避免 YAML 解析失敗並恢復電量摘要。
#
# 新增與強化 (V2.4):
#   • 門鎖電量模板縮排修正：修正 template sensor 縮排錯誤，確保客廳門鎖電量與 LINE 電量摘要可正常生成。
#
# 新增與強化 (V2.3):
#   • 體感溫度Helpers：新增 input_number.living_room_effective_apparent_temperature 與 input_number.rooftop_effective_apparent_temperature，用於顯示風扇AI的有效體感溫度。
#
# 新增與強化 (V2.2):
#   • LINE 通知開關：新增 input_boolean.notify_line_general_enable, input_boolean.notify_line_important_enable, input_boolean.notify_line_emergency_enable，用於分級控制 LINE 通知。
#   • 客廳/頂樓風扇模式：分離客廳(21A)與頂樓(22)風扇的「防關閉」和「自動風速」模式，並為客廳風扇新增「夏季模式」與「Debug模式」。
#   • 門鎖電量通知：修復重啟後重複通知問題。
#   • 頂樓風扇AI優化：風速曲線調整，實現更平滑的風量控制。
#   • 緊急模式強化：新增多種觸發方式與自動復位。
#   • 頂樓AI自動化：整合溫控、情境判斷、夜燈修正。
#   • 車牌辨識 (LPR)：新增車牌辨識自動化與相關設定。
# ──────────────────────────────────────────────

