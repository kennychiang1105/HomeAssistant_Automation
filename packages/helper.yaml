template:
    - trigger:
        - platform: state
          entity_id:
            - sensor.0x54ef4410007ac23c_battery
            - sensor.doorlock_batt_days_left_last_model
            - input_text.doorlock_batt_model_current
            - input_text.doorlock_batt_model_last_cycle
        - platform: time_pattern   # 保活：避免長時間沒回報時 UI 顯示舊態
          minutes: "/15"
      sensor:
        - name: 客廳門鎖電量（過濾）
          # entity_id 將會是 sensor.ke_ting_men_suo_dian_liang_guo_lu
          unit_of_measurement: "%"
          device_class: battery
          state_class: measurement
          icon: mdi:battery
          # （可選）唯一 ID，方便在 UI 調整圖示/名稱
          unique_id: doorlock_battery_filtered_main
          state: >-
            {% set new = states('sensor.0x54ef4410007ac23c_battery') %}
            {% set old = states('sensor.ke_ting_men_suo_dian_liang_guo_lu') %}
            {% set invalids = ['unknown','unavailable','None','none','','nan'] %}
            {% if new in invalids %}
              {{ old if old not in invalids else -1 }}
            {% else %}
              {% set v = new|float(0) %}
              {# 合理範圍 0~100；超出則沿用舊值；若舊值也不可用則 -1 #}
              {% if 0 <= v <= 100 %}
                {{ v }}
              {% else %}
                {{ (old|float(-1)) if old not in invalids else -1 }}
              {% endif %}
            {% endif %}
          attributes:
            source_entity: sensor.0x54ef4410007ac23c_battery
            last_raw: "{{ states('sensor.0x54ef4410007ac23c_battery') }}"
        - name: batt_line_text
          unique_id: doorlock_batt_line_text
          icon: mdi:lock-alert
          state: >-
            {% set batt_raw = states('sensor.ke_ting_men_suo_dian_liang_guo_lu') %}
            {% set eta_raw = states('sensor.doorlock_batt_days_left_last_model') %}
            {% set model_now = states('input_text.doorlock_batt_model_current')|trim %}
            {% set model_last = states('input_text.doorlock_batt_model_last_cycle')|trim %}
            {% set invalids = ['unknown','unavailable','none','None','','nan'] %}

            {% if batt_raw in invalids %}
              門鎖電量摘要：\n• 資料暫無（gateway 尚未回報）
            {% else %}
              {% set batt_val = batt_raw|float(0) %}
              {% set eta_val = eta_raw|float(none) %}
              {% set eta_valid = eta_val is not none %}

              門鎖電量摘要：\n• 電量：{{ batt_val|round(1) }}%\n• 預估天數：{{ '約 ' ~ (eta_val|round(1)) ~ ' 天（同款電池）' if eta_valid else '—（不同款或資料不足）' }}\n• 當前/上次款式：{{ model_now or '未填寫' }} / {{ model_last or '未校正' }}
            {% endif %}

