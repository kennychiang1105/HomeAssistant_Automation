command_line:
  - sensor:
      name: ai_version_registry_dynamic
      unique_id: ai_version_registry_dynamic
      scan_interval: 21600
      command_timeout: 60
      command: >-
        sh -c '
          dirs="/config/configuration/Automations /config/configuration/Scripts /config/Automations /config/Scripts ./configuration/Automations ./configuration/Scripts";
          for d in $dirs; do
            [ -d "$d" ] && find "$d" -maxdepth 1 -type f -name "*AI.yaml" -print0
          done | xargs -0 awk '"'"'
            function esc(s){ gsub(/\\/,"\\\\",s); gsub(/"/,"\\\"",s); return s }
            FNR==1 { file=FILENAME }
            /^[[:space:]]*(-[[:space:]]*)?alias:[[:space:]]*/ {
              line=$0
              sub(/^[[:space:]]*(-[[:space:]]*)?alias:[[:space:]]*/, "", line)
              gsub(/^[[:space:]"\047]+|[[:space:]"\047]+$/, "", line)
              if (match(line, /\(V.*\)[[:space:]]*$/)) {
                ver = substr(line, RSTART, RLENGTH)
                gsub(/^[[:space:]]*\(|\)[[:space:]]*$/, "", ver)
                name = substr(line, 1, RSTART - 1)
                sub(/[[:space:]]+$/, "", name)
                key = name
                gsub(/[[:space:]]+/, "_", key)
                versions[key] = "{\"name\":\"" esc(name) "\",\"version\":\"" esc(ver) "\",\"file\":\"" esc(file) "\"}"
              }
            }
            END {
              c = 0
              for (k in versions) c++
              printf "{\"state\":\"ok\",\"count\":%d,\"versions\":{", c
              i=0
              for (k in versions) {
                if (i++) printf ","
                printf "\"%s\":%s", esc(k), versions[k]
              }
              printf "}}"
            }
          '"'"'
        '
      value_template: "{{ value_json.state | default('error') }}"
      json_attributes:
        - count
        - versions
      availability: "{{ value_json.state | default('error') == 'ok' }}"

