# ─────────────────────────────────────────────────────────────
# Scripts (V2.3)   （Helpers V2.19 相容）
# 更新重點（相對 V2.2）：
# 1) LINE user_id 改讀 sensor.line_bot_target_user_id，支援測試模式與自訂 ID 覆蓋。
# 2) 版本同步：對應 Helpers V2.19 / Line Bot 套件 V1.5。
#
# 前版更新：
# 1) EEW 變數安全：將遠端地震等級與秒數寫入 Helpers 後再建構 LINE JSON payload，避免 Unknown。
# 2) 版本號升級：升級至 V2.1，與 Helper V2.2 同步。
# 3) LINE 通知優化：地震預警系統的 LINE 通知已設定為「緊急」等級。
# 4) Helper 整合：新增 input_boolean.helper_line_notification_urgent 開關，可控制是否發送 LINE 緊急通知。
# ─────────────────────────────────────────────────────────────

'99999999999999':
  alias: 地震預警系統(遠端)
  variables:
    lv: '{{ level[:1] | int }}'
    level_text: "{{ level if level is defined and level|string|trim not in ['', 'unknown', 'unavailable'] else '未知' }}"
    seconds_text: "{{ seconds if seconds is defined and seconds|string|trim not in ['', 'unknown', 'unavailable'] else '未知' }}"
  sequence:
  - service: input_text.set_value
    data:
      entity_id: input_text.line_eew_remote_level
      value: "{{ level_text }}"
  - service: input_text.set_value
    data:
      entity_id: input_text.line_eew_remote_seconds
      value: "{{ seconds_text }}"
  - if:
    - condition: device
      type: is_on
      device_id: fdcccfa405461070717b80a56a590960
      entity_id: 61eaa5fb8386221ba077bcb884e74573
      domain: remote
    then:
      - parallel:
          - if:
              - condition: or
                conditions:
                - condition: template
                  value_template: '{{ level == "3" }}'
                  enabled: false
                - condition: template
                  value_template: '{{ level == "4" }}'
                - condition: template
                  value_template: '{{ level == "5-" }}'
                - condition: template
                  value_template: '{{ level == "5+" }}'
                - condition: template
                  value_template: '{{ level == "6-" }}'
                - condition: template
                  value_template: '{{ level == "6+" }}'
                - condition: template
                  value_template: '{{ level == "7" }}'
                - condition: template
                  value_template: '{{ level == ''3'' }}'
                  enabled: false
                - condition: template
                  value_template: '{{ level == ''4'' }}'
                - condition: template
                  value_template: '{{ level == ''5-'' }}'
                - condition: template
                  value_template: '{{ level == ''5+'' }}'
                - condition: template
                  value_template: '{{ level == ''6-'' }}'
                - condition: template
                  value_template: '{{ level == ''6+'' }}'
                - condition: template
                  value_template: '{{ level == ''7'' }}'
            then:
              - parallel:
                  - data:
                      skip_condition: true
                    target:
                      entity_id: automation.jin_ji_mo_shi
                    action: automation.trigger
                  - if:
                      - condition: state
                        entity_id: input_boolean.helper_line_notification_urgent
                        state: 'on'
                    then:
                      - service: script.send_line_to_user
                        data:
                          user_id: "{{ states('sensor.line_bot_target_user_id') }}"
                          payload: >-
                            {{
                              [
                                {"type":"text","text":"【災防系統通知】緊急 Urgent ‼️\n地震預警系統作動⚠️"},
                                {"type":"text","text":"🌍地震預警系統作動⚠️:\n\n發生有感危險地震\U0001FAE8，\n地震預警系統預估地震{{ level_text }}級，{{ seconds_text }}秒後到達。\n\n預估地震大於4級，\n將啟動緊急模式因應。\n\n\n發生地震，請保持冷靜，\n立即就地趴下、掩護、穩住，\n並抓住桌腳，保護頭頸部。"},
                                {"type":"text","text":"【緊急 Urgent ‼️】\U0001FAE8\n地震預警系統作動⚠️，啟動緊急模式‼️"}
                              ] | tojson
                            }}
      - action: input_boolean.turn_on
        metadata: {}
        data: {}
        target:
          entity_id: input_boolean.jin_ji_mo_shi_pan_duan_kai_guan_ii_ha_auto
    else:
      - if:
          - condition: state
            entity_id: input_boolean.helper_line_notification_urgent
