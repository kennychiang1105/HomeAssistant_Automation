# 相容版本：Helpers V3.5（已確認）
'eq99':
  alias: 地震預警系統(遠端)AI (V3.3)
  description: 地震預警通知與分級廣播；4級以上觸發緊急模式。
  variables:
    automation_version: 'V3.3'
    # 修正 1：將 level_text 移至上方，讓後續的 lv 可以正確引用它
    level_text: >-
      {{ level if level is defined and level|string|trim not in ['', 'unknown', 'unavailable'] else '未知' }}
    seconds_text: >-
      {{ seconds if seconds is defined and seconds|string|trim not in ['', 'unknown', 'unavailable'] else '未知' }}
    # 修正 2：使用更安全的 regex 取值方式。就算字串是 "未知" 也不會引發系統崩潰，會安全地給予預設值 0
    lv: >-
      {{ (level_text | regex_findall('\d+') | join('')) | int(0) }}
    line_bot_target_user_id: >-
      {{ states('sensor.line_bot_target_user_id') }}
  sequence:
  - action: input_text.set_value
    target:
      entity_id: input_text.line_eew_remote_level
    data:
      value: '{{ level_text }}'
  - action: input_text.set_value
    target:
      entity_id: input_text.line_eew_remote_seconds
    data:
      value: '{{ seconds_text }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ lv <= 2 }}'
      sequence:
      - if:
        - condition: state
          entity_id: input_boolean.notify_line_important_enable
          state: 'on'
        then:
        - action: script.send_line_to_user
          data:
            user_id: '{{ line_bot_target_user_id | default(''C26ff4e9d30159ba5264a1676f46f8f86'') }}'
            payload: >-
              {% set level_raw = states('input_text.line_eew_remote_level') %}
              {% set level_safe = level_raw if level_raw|trim and level_raw|lower not in ['unknown','unavailable','none'] else level_text | default('未知') %}
              {% set seconds_raw = states('input_text.line_eew_remote_seconds') %}
              {% set seconds_safe = seconds_raw if seconds_raw|trim and seconds_raw|lower not in ['unknown','unavailable','none'] else seconds_text | default('未知') %}
              {% set messages = [
                {"type":"text","text":"【災防系統通知】重要 Important ⚠️"},
                {"type":"text","text":"🌍地震預警系統收到訊息：預估地震" ~ level_safe ~ "級，" ~ seconds_safe ~ "秒後到達。\n\n目前未達廣播門檻（3級）與緊急模式門檻（4級）。"},
                {"type":"text","text":"【重要 Important ⚠️】\n地震" ~ level_safe ~ "級，" ~ seconds_safe ~ "秒後到達（僅通知）"}
              ] %}
              {{ messages | tojson }}
      - action: persistent_notification.create
        data:
          title: 地震預警系統｜重要 Important ⚠️
          message: >-
            地震預警系統收到訊息：預估地震{{ states('input_text.line_eew_remote_level') }}級，
            {{ states('input_text.line_eew_remote_seconds') }}秒後到達。
            本次僅發送通知，不啟動廣播與緊急模式。
    - conditions:
      - condition: template
        value_template: '{{ lv >= 3 }}'
      sequence:
      - if:
        - condition: state
          entity_id: input_boolean.notify_line_emergency_enable
          state: 'on'
        then:
        - action: script.send_line_to_user
          data:
            user_id: '{{ line_bot_target_user_id | default(''C26ff4e9d30159ba5264a1676f46f8f86'') }}'
            payload: >-
              {% set level_raw = states('input_text.line_eew_remote_level') %}
              {% set level_safe = level_raw if level_raw|trim and level_raw|lower not in ['unknown','unavailable','none'] else level_text | default('未知') %}
              {% set seconds_raw = states('input_text.line_eew_remote_seconds') %}
              {% set seconds_safe = seconds_raw if seconds_raw|trim and seconds_raw|lower not in ['unknown','unavailable','none'] else seconds_text | default('未知') %}
              {% if lv >= 4 %}
              {% set status_text = '預估震度達 4 級以上，系統將啟動緊急模式並同步廣播。' %}
              {% else %}
              {% set status_text = '本次將啟動廣播提醒，但不啟動緊急模式。' %}
              {% endif %}
              {% set messages = [
                {"type":"text","text":"【災防系統通知】緊急 Urgent ‼️"},
                {"type":"text","text":"🌍地震預警系統收到訊息：預估地震" ~ level_safe ~ "級，" ~ seconds_safe ~ "秒後到達。\n\n" ~ status_text},
                {"type":"text","text":"【緊急 Urgent ‼️】\n地震" ~ level_safe ~ "級，" ~ seconds_safe ~ "秒後到達"}
              ] %}
              {{ messages | tojson }}
      - if:
        - condition: template
          value_template: '{{ lv >= 4 }}'
        then:
        - action: input_boolean.turn_off
          target:
            entity_id: input_boolean.jin_ji_mo_shi_pan_duan_kai_guan_iii_ha_manual
          data: {}
        - action: input_boolean.turn_on
          target:
            entity_id: input_boolean.jin_ji_mo_shi_pan_duan_kai_guan_ii_ha_auto
          data: {}
        - data:
            skip_condition: true
          target:
            entity_id: automation.jin_ji_mo_shi
          action: automation.trigger
      - action: persistent_notification.create
        data:
          title: 地震預警系統｜緊急 Urgent ‼️
          message: >-
            地震預警系統收到訊息：預估地震{{ states('input_text.line_eew_remote_level') }}級，
            {{ states('input_text.line_eew_remote_seconds') }}秒後到達。
            {% if lv >= 4 %}
            已啟動緊急模式，並將進行廣播提醒。
            {% else %}
            已啟動廣播提醒，未啟動緊急模式。
            {% endif %}
      - action: media_player.volume_set
        data:
          volume_level: 0.65
        target:
          entity_id:
          - media_player.ke_ting_homepod
          - media_player.ding_lou_homepod
      - action: media_player.volume_set
        data:
          volume_level: 0.15
        target:
          entity_id:
          - media_player.sony_bravia_tv
      - action: tts.speak
        metadata: {}
        target:
          device_id: c01a1336ef43795fd0679631c3e6ce62
        data:
          media_player_entity_id: media_player.guang_bo_qun_zu_all
          message: 地震預警系統預估地震{{ level_text }}級，{{ seconds_text }}秒後到達。{{ level_text }}級地震！{{ seconds_text }}秒到達！
          cache: true
      - delay:
          hours: 0
          minutes: 0
          seconds: 30
          milliseconds: 0
      - action: media_player.play_media
        data:
          media_content_id: https://jnas916p.synology.me:8126/local/CWBEEW.mp3
          media_content_type: music
          metadata: {}
        target:
          entity_id: media_player.guang_bo_qun_zu_all
      - delay:
          hours: 0
          minutes: 0
          seconds: 13
          milliseconds: 0
      - action: tts.speak
        metadata: {}
        target:
          device_id: c01a1336ef43795fd0679631c3e6ce62
        data:
          media_player_entity_id: media_player.guang_bo_qun_zu_all
          message: 發生地震，請就地避難掩護！立即就地趴下、掩護、穩住並抓住桌腳，保護頭頸部。
          cache: true
      - delay:
          hours: 0
          minutes: 0
          seconds: 25
          milliseconds: 0
      - repeat:
          until:
          - condition: state
            entity_id: media_player.sony_bravia_tv
            attribute: media_title
            state: TATV-8000
          sequence:
          - action: remote.send_command
            data:
              command: Hdmi1
            target:
              device_id: fdcccfa405461070717b80a56a590960
          - delay:
              hours: 0
              minutes: 0
              seconds: 1
              milliseconds: 0
      - action: remote.send_command
        data:
          command: Confirm
        target:
          device_id: fdcccfa405461070717b80a56a590960
      - action: media_player.volume_set
        data:
          volume_level: 0.4
        target:
          entity_id: media_player.ding_lou_homepod
      - type: turn_off
        device_id: fdcccfa405461070717b80a56a590960
        entity_id: 61eaa5fb8386221ba077bcb884e74573
        domain: remote
      - delay:
          hours: 0
          minutes: 0
          seconds: 30
          milliseconds: 0
      - type: turn_off
        device_id: fdcccfa405461070717b80a56a590960
        entity_id: 61eaa5fb8386221ba077bcb884e74573
        domain: remote
      - repeat:
          until:
          - condition: state
            entity_id: media_player.sony_bravia_tv
            state: 'off'
          sequence:
          - type: turn_off
            device_id: fdcccfa405461070717b80a56a590960
            entity_id: 61eaa5fb8386221ba077bcb884e74573
            domain: remote
  mode: single
  icon: mdi:earth
