  - title: 版本紀錄
    path: release-notes
    icon: mdi:text-box-multiple
    cards:
      - type: markdown
        title: Dashboard 版本資訊
        content: |
          # 家庭中心 Dashboard 版本紀錄
          > 此頁用於維護介面版本與每次更新重點。

          ---
          ## V3.0 Beta 3（2026-04-06）
          - 版本號更新為 **V3.0 Beta 3**。
          - 車庫頁移到首頁後第一個分頁。
          - 首頁補回情境區塊與方塊按鈕。
          - 各房間新增亮燈數統計。
          - 首頁裝置改為方塊按鈕主視覺。
          - 保全狀態改讀取 `alarm_control_panel.54ef44cf58f9_alarm` 與 `sensor.aqaradang_qian_qing_jing`。
          - 修正災防通知區塊、移除不相容通知卡並優化看過清除按鈕大小。

          ## v2.2.0（2026-04-06）
          - 首頁恢復 HomeKit 按鈕模組風格（情境捷徑）。
          - 新增首頁統計區塊：各區亮燈數 / 即時溫度 / 保全狀態。
