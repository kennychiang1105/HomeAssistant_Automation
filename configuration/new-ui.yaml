title: 家庭中心 Beta
views:
  - title: 總覽
    path: all
    icon: mdi:home-analytics
    theme: Backend-selected
    cards:
      - type: markdown
        content: |
          # 🏠 智慧家庭總覽
          依照空間使用情境整理，採用「房間風格分區 + 常用控制優先」：
          - **客廳｜溫暖木質感**：照明、空氣品質、影音
          - **餐廳｜明亮機能風**：燈光、廚房插座與環境
          - **頂樓｜休憩夜間風**：空調、風扇、閱讀與夜燈
          - **伺服器/自動化｜工程面板**：系統開關與設備維運
      - type: grid
        title: 一鍵情境
        columns: 4
        square: false
        cards:
          - type: tile
            entity: input_boolean.google_scene_zao_an_trigger
            name: 早安
            icon: mdi:weather-sunny
          - type: tile
            entity: input_boolean.google_scene_wan_an_trigger
            name: 晚安
            icon: mdi:weather-night
          - type: tile
            entity: input_boolean.google_scene_dao_jia_trigger
            name: 到家
            icon: mdi:home-import-outline
          - type: tile
            entity: input_boolean.google_scene_chu_men_trigger
            name: 出門
            icon: mdi:home-export-outline
      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.kong_qi_qing_jing_ji_temperature
            name: 客廳溫度
            min: 10
            max: 40
          - type: gauge
            entity: sensor.kong_qi_qing_jing_ji_humidity
            name: 客廳濕度
            min: 20
            max: 90
      - type: entities
        title: 常用快速控制
        show_header_toggle: false
        entities:
          - light.ke_ting_deng_zu_1_ha
          - light.can_ting_deng_zu_1_ha
          - climate.ding_lou_kong_diao
          - fan.ke_ting_dian_feng_shan
          - fan.dmaker_p33_eabd_fan
          - cover.garage

  - title: 客廳
    path: living-room
    icon: mdi:sofa
    cards:
      - type: markdown
        content: |
          ## 客廳風格：溫暖木質 × 影音聚會
          主打「燈光層次 + 空氣舒適 + 娛樂控制」。
      - type: entities
        title: 客廳照明
        entities:
          - light.yeelink_color5_4181_light
          - light.ke_ting_deng_zu_1_ha
          - light.ke_ting_deng_zu_2
          - light.ke_ting_deng_zu_3
          - switch.ke_ting_kan_deng
          - switch.ke_ting_bi_deng
          - switch.ke_ting_huan_rao_deng
      - type: entities
        title: 客廳家電與影音
        entities:
          - fan.ke_ting_dian_feng_shan
          - fan.kong_qi_qing_jing_ji
          - media_player.ke_ting_homepod
          - media_player.sonydian_shi
      - type: entities
        title: 客廳環境感測
        entities:
          - sensor.kong_qi_qing_jing_ji_temperature
          - sensor.kong_qi_qing_jing_ji_humidity
          - sensor.livingroom_homepodmini_temperature
          - sensor.livingroom_homepodmini_humidity
          - sensor.ke_ting_you_xiao_ti_gan_wen_du_homekitqiao_jie

  - title: 餐廳與廚房
    path: dining-kitchen
    icon: mdi:silverware-fork-knife
    cards:
      - type: markdown
        content: |
          ## 餐廳風格：明亮機能 × 快速操作
          餐廳、廚房與周邊採「高頻操作優先」。
      - type: entities
        title: 餐廳/廚房照明與插座
        entities:
          - light.can_ting_deng_zu_1_ha
          - switch.chu_fang_deng
          - switch.ce_suo_deng
          - switch.lou_ti_deng
          - switch.can_ting_kan_deng
          - switch.can_ting_bi_deng
          - switch.0x00158d0003923796_plug
      - type: entities
        title: 餐廳/廚房感測
        entities:
          - sensor.kitchenm_wen_du
          - sensor.kitchenm_shi_du
          - sensor.kitchen_illuminance
          - sensor.kitchenm_zhao_du

  - title: 樓梯與車庫
    path: stairs-garage
    icon: mdi:garage-variant
    cards:
      - type: entities
        title: 樓梯燈光
        entities:
          - switch.er_san_lou_lou_ti_deng
          - switch.san_si_lou_lou_ti_deng
          - switch.san_lou_lou_ti_deng
          - light.yeelink_color5_0fb7_light
      - type: entities
        title: 車庫與周邊
        entities:
          - cover.garage
          - switch.che_ku_zhu_deng
          - switch.men_kou_deng
          - switch.lu_deng

  - title: 頂樓
    path: top-floor
    icon: mdi:home-floor-5
    cards:
      - type: markdown
        content: |
          ## 頂樓風格：休憩夜間 × 閱讀沉浸
          以「空調風扇 + 閱讀燈光 + 安防」為核心。
      - type: entities
        title: 頂樓舒適控制
        entities:
          - climate.ding_lou_kong_diao
          - fan.dmaker_p33_eabd_fan
          - switch.dmaker_p33_eabd_horizontal_swing
          - switch.xiang_fen_ji_cha_zuo
      - type: entities
        title: 頂樓照明
        entities:
          - light.yeelink_lamp2_678c_light
          - light.yeelink_bslamp2_4329_light
          - light.ding_lou_deng_zu_1
          - light.ding_lou_deng_zu_2
          - light.ding_lou_kan_deng
          - switch.bi_deng
          - light.yeelink_color5_13b8_light
          - switch.yang_tai_deng
          - switch.sheng_dan_deng_cha_zuo
      - type: entities
        title: 頂樓感測與媒體
        entities:
          - media_player.ding_lou_homepod
          - sensor.5f_homepodmini_temperature
          - sensor.5f_homepodmini_humidity
          - sensor.ding_lou_you_xiao_ti_gan_wen_du_homekitqiao_jie
      - type: entities
        title: 頂樓安全
        entities:
          - automation.106_2_mai_ke_feng
          - automation.08_5_wu_lou_bao_quan_xi_tong

