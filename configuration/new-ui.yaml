title: 家庭中心 V3.0 Beta 3
views:
  - title: 首頁總覽
    path: all
    icon: mdi:home-analytics
    theme: Backend-selected
    cards:
      - type: markdown
        content: |
          # 🏠 智慧家庭總覽
          **版本：V3.0 Beta 3（2026-04-06）**

          目前採用「首頁常用方塊按鈕 + 房間分頁」設計。
      - type: grid
        title: 系統狀態
        columns: 4
        square: false
        cards:
          - type: tile
            entity: alarm_control_panel.54ef44cf58f9_alarm
            name: 保全系統（伺服器）
            icon: mdi:shield-home
            color: teal
          - type: tile
            entity: sensor.aqaradang_qian_qing_jing
            name: Aqara 網關
            icon: mdi:shield-link-variant
            color: cyan
          - type: tile
            entity: sensor.kong_qi_qing_jing_ji_temperature
            name: 客廳環境
            icon: mdi:air-filter
          - type: tile
            entity: sensor.earthquake
            name: 地震通知
            icon: mdi:pulse
            color: red
      - type: markdown
        content: |
          ## 情境
      - type: grid
        title: 情境捷徑（方塊按鈕）
        columns: 5
        square: true
        cards:
          - type: button
            entity: input_boolean.google_scene_zao_an_trigger
            name: 早安
            icon: mdi:weather-sunny
            tap_action:
              action: toggle
          - type: button
            entity: input_boolean.google_scene_dao_jia_trigger
            name: 到家
            icon: mdi:home-import-outline
            tap_action:
              action: toggle
          - type: button
            entity: input_boolean.google_scene_wan_an_trigger
            name: 晚安
            icon: mdi:weather-night
            tap_action:
              action: toggle
          - type: button
            entity: input_boolean.google_scene_chu_men_trigger
            name: 出門
            icon: mdi:home-export-outline
            tap_action:
              action: toggle
      - type: markdown
        title: 多災防 / 地震通知
        content: |
          {% set disaster = states('sensor.disaster') %}
          {% set earthquake = states('sensor.earthquake') %}
          ### 🚨 即時通知
          - 多災防：**{{ disaster }}**
          - 地震：**{{ earthquake }}**
      - type: entities
        title: HA 通知動作
        show_header_toggle: false
        entities:
          - entity: sensor.disaster
            name: 多災防通知
          - entity: sensor.earthquake
            name: 地震通知
          - type: button
            name: 看過清除（清空 HA 永久通知）
            icon: mdi:notification-clear-all
            tap_action:
              action: perform-action
              perform_action: persistent_notification.dismiss_all
      - type: markdown
        title: 區域統計（燈光 / 溫度 / 保全）
        content: |
          {% set garage_lights = expand([
            'switch.che_ku_zhu_deng',
            'switch.men_kou_deng',
            'switch.lu_deng'
          ]) | selectattr('state','eq','on') | list | count %}
          {% set living_lights = expand([
            'light.yeelink_color5_4181_light',
            'light.ke_ting_deng_zu_1_ha',
            'light.ke_ting_deng_zu_2',
            'light.ke_ting_deng_zu_3',
            'switch.ke_ting_kan_deng',
            'switch.ke_ting_bi_deng',
            'switch.ke_ting_huan_rao_deng'
          ]) | selectattr('state','eq','on') | list | count %}
          {% set dining_lights = expand([
            'light.can_ting_deng_zu_1_ha',
            'switch.chu_fang_deng',
            'switch.ce_suo_deng',
            'switch.lou_ti_deng',
            'switch.can_ting_kan_deng',
            'switch.can_ting_bi_deng'
          ]) | selectattr('state','eq','on') | list | count %}
          {% set top_lights = expand([
            'light.yeelink_lamp2_678c_light',
            'light.yeelink_bslamp2_4329_light',
            'light.ding_lou_deng_zu_1',
            'light.ding_lou_deng_zu_2',
            'light.ding_lou_kan_deng',
            'switch.bi_deng',
            'light.yeelink_color5_13b8_light',
            'switch.yang_tai_deng'
          ]) | selectattr('state','eq','on') | list | count %}

          ### 💡 各區域亮燈數
          - 車庫：**{{ garage_lights }}** 盞
          - 客廳：**{{ living_lights }}** 盞
          - 餐廳/廚房：**{{ dining_lights }}** 盞
          - 頂樓：**{{ top_lights }}** 盞

          ### 🌡️ 即時溫度
          - 客廳：**{{ states('sensor.kong_qi_qing_jing_ji_temperature') }}°C**
          - 餐廳/廚房：**{{ states('sensor.kitchenm_wen_du') }}°C**
          - 頂樓：**{{ states('sensor.5f_homepodmini_temperature') }}°C**

          ### 🛡️ 保全狀態
          - 伺服器保全：**{{ states('alarm_control_panel.54ef44cf58f9_alarm') }}**
          - Aqara 網關：**{{ states('sensor.aqaradang_qian_qing_jing') }}**
      - type: grid
        title: 首頁常用裝置（方塊按鈕）
        columns: 5
        square: true
        cards:
          - type: button
            entity: cover.garage
            name: 車庫鐵門
            icon: mdi:garage
          - type: button
            entity: switch.che_ku_zhu_deng
            name: 車庫主燈
            icon: mdi:lightbulb
