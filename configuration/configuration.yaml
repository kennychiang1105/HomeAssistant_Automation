### AI Configuration V1.0 ###

homeassistant:
  packages: !include_dir_named packages
  
# Configure a default setup of Home Assistant (frontend, api, etc)
default_config:
# Text to speech
tts:
  - platform: google_translate
    language: 'zh-tw'
#  - platform: edge_tts
#    language: zh-TW # Default language or voice (Optional)
group: !include groups.yaml
automation: !include automations.yaml
automation ai_managed: !include_dir_merge_list Automations
script: !include scripts.yaml
script ai_managed: !include_dir_merge_named Scripts
scene: !include scenes.yaml
sensor: !include sensors.yaml
frontend:
  themes: !include_dir_merge_named themes

recorder: 
  commit_interval: 10
  purge_keep_days: 180
  
