# ─────────────────────────────────────────────────────────────
# 08-5C頂樓樓梯感應燈AI (V3.0)
# 相容版本：Helpers V3.5（已確認）
# 更新紀錄：
# - V3.0：由 configuration/automations.yaml 拆分為 AI 管理模組，並重編標準 ID。
# ─────────────────────────────────────────────────────────────
- id: ai_08_5c_topfloor_stairs_motion_light
  alias: 08-5C頂樓樓梯感應燈AI (V3.0)
  description: >
    頂樓樓梯感應燈主流程：五樓攝影機偵測到人時開啟樓梯相關燈具，並在延遲後自動熄燈。
  variables:
    automation_version: V3.0
  triggers:
  - entity_id:
    - binary_sensor.wu_lou_she_ying_ji_person_detected
    from:
    to: 'on'
    for:
      hours: 0
      minutes: 0
      seconds: 0
    trigger: state
  conditions:
  - condition: device
    type: is_off
    device_id: ad6e414dc8c87f8bb9deb125b792af19
    entity_id: c527cb918e88297844fb1f3bb8ae3eb6
    domain: switch
    for:
      hours: 0
      minutes: 0
      seconds: 3
    enabled: false
  - condition: state
    entity_id: light.yeelink_color5_13b8_light
    state:
    - 'off'
    for:
      hours: 0
      minutes: 0
      seconds: 5
  actions:
  - if:
    - condition: state
      entity_id: light.ding_lou_kan_deng
      state: 'on'
    then:
    - sequence:
      - parallel:
        - metadata: {}
          data: {}
          target:
            entity_id:
            - switch.ding_lou_lou_ti_deng
            - switch.si_lou_lou_ti_deng
          action: switch.turn_on
          enabled: false
        - action: light.turn_on
          metadata: {}
          data: {}
          target:
            entity_id:
            - light.yeelink_color5_0fb7_light
            - light.yeelink_color5_13b8_light
      - delay:
          hours: 0
          minutes: 2
          seconds: 30
          milliseconds: 0
      - parallel:
        - target:
            entity_id:
            - switch.ding_lou_lou_ti_deng
            - switch.si_lou_lou_ti_deng
          data: {}
          action: switch.turn_off
          enabled: false
        - action: light.turn_off
          metadata: {}
          data: {}
          target:
            entity_id:
            - light.yeelink_color5_0fb7_light
            - light.yeelink_color5_13b8_light
    else:
    - sequence:
      - parallel:
        - metadata: {}
          data: {}
          target:
            entity_id: light.ding_lou_kan_deng
          action: light.turn_on
        - metadata: {}
          data: {}
          target:
            entity_id:
            - switch.ding_lou_lou_ti_deng
            - switch.si_lou_lou_ti_deng
          action: switch.turn_on
          enabled: false
        - action: light.turn_on
          metadata: {}
          data: {}
          target:
            entity_id:
            - light.yeelink_color5_0fb7_light
            - light.yeelink_color5_13b8_light
      - delay:
          hours: 0
          minutes: 2
          seconds: 30
          milliseconds: 0
      - parallel:
        - target:
            entity_id:
            - switch.ding_lou_lou_ti_deng
            - switch.si_lou_lou_ti_deng
          data: {}
          action: switch.turn_off
          enabled: false
        - action: light.turn_off
          metadata: {}
          data: {}
          target:
            entity_id:
            - light.yeelink_color5_13b8_light
            - light.yeelink_color5_0fb7_light
        - if:
          - condition: device
            type: is_off
            device_id: 4122ec72c170e120351bd49403479736
            entity_id: c73da0b9e97fecf75234d59888a3aa2b
            domain: light
          - condition: device
            type: is_off
            device_id: ee03d36f3818a885e539c6120a037c30
            entity_id: 256c8d8fc19e76d1dac615acb4e4e6c4
            domain: light
          then:
          - target:
              entity_id:
              - light.ding_lou_kan_deng
            data: {}
            action: light.turn_off
  mode: restart
- id: ai_08_5c_topfloor_stairs_motion_light_auto_off
  alias: 08-5C頂樓樓梯感應燈自動關閉AI (V3.0)
  description: >
    頂樓樓梯感應燈輔助關閉流程：書房左側感應觸發後，於主流程觸發時間窗內執行補充關燈邏輯。
  variables:
    automation_version: V3.0
  triggers:
  - trigger: state
    entity_id:
    - binary_sensor.shu_fang_gan_ying_kai_guan_motion_left
    to: 'on'
  conditions:
  - condition: template
    value_template: '{{(as_timestamp(now()) - as_timestamp(state_attr(''automation.ai_08_5c_topfloor_stairs_motion_light'',
      ''last_triggered'') | default(0))) < (180) }}'
  - condition: template
    value_template: '{{(as_timestamp(now()) - as_timestamp(state_attr(''automation.ai_08_5c_topfloor_stairs_motion_light'',
      ''last_triggered'') | default(0))) > (2) }}'
    enabled: false
  actions:
  - if:
    - condition: state
      entity_id: light.ding_lou_kan_deng
      state: 'on'
    then:
    - sequence:
      - parallel:
        - metadata: {}
          data: {}
          target:
            entity_id:
            - switch.ding_lou_lou_ti_deng
            - switch.si_lou_lou_ti_deng
          action: switch.turn_on
        enabled: false
      - delay:
          hours: 0
          minutes: 2
          seconds: 30
          milliseconds: 0
        enabled: false
      - parallel:
        - target:
            entity_id:
            - switch.shu_fang_deng
          data: {}
          action: switch.turn_off
          enabled: true
        - action: light.turn_off
          metadata: {}
          data: {}
          target:
            entity_id:
            - light.yeelink_color5_0fb7_light
            - light.yeelink_color5_13b8_light
        - action: light.turn_on
          metadata: {}
          data:
            brightness_pct: 1
            rgb_color:
            - 255
            - 226
            - 214
          target:
            entity_id: light.yeelink_color5_13b8_light
          enabled: false
    else:
    - sequence:
      - parallel:
        - metadata: {}
          data: {}
          target:
            entity_id: light.ding_lou_kan_deng
          action: light.turn_on
        - metadata: {}
          data: {}
          target:
            entity_id:
            - switch.ding_lou_lou_ti_deng
            - switch.si_lou_lou_ti_deng
          action: switch.turn_on
        enabled: false
      - delay:
          hours: 0
          minutes: 2
          seconds: 30
          milliseconds: 0
        enabled: false
      - parallel:
        - target:
            entity_id:
            - switch.shu_fang_deng
          data: {}
          action: switch.turn_off
          enabled: true
        - if:
          - condition: device
            type: is_off
            device_id: 4122ec72c170e120351bd49403479736
            entity_id: c73da0b9e97fecf75234d59888a3aa2b
            domain: light
          - condition: device
            type: is_off
            device_id: ee03d36f3818a885e539c6120a037c30
            entity_id: 256c8d8fc19e76d1dac615acb4e4e6c4
            domain: light
          then:
          - target:
              entity_id:
              - light.ding_lou_kan_deng
            data: {}
            action: light.turn_off
        - action: light.turn_off
          metadata: {}
          data: {}
          target:
            entity_id:
            - light.yeelink_color5_0fb7_light
            - light.yeelink_color5_13b8_light
  mode: single
