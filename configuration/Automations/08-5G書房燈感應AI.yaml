# ─────────────────────────────────────────────────────────────
# 08-5G書房燈感應AI (V3.1)
# 更新紀錄：
# - V3.1：加入 AP 判斷，iPhone 於五樓 AP 時，攝影機判定延長為 20 分鐘。
# - V3.0：由 UI automation 拆分為 AI 模組檔，維持原觸發/條件/動作行為。
# ─────────────────────────────────────────────────────────────
- alias: 08-5G 書房燈感應AI (V3.1)
  id: ai_08_5g_study_motion_light
  description: >
    書房感應燈控制：偵測動作時開啟書房燈，延遲 5 分鐘後自動關閉。
    加入進階判斷：當 iPhone 位於五樓 AP 時，攝影機判定寬限期延長至 20 分鐘；否則維持 2 分鐘。
  mode: restart
  variables:
    automation_version: V3.1
  triggers:
    - trigger: state
      entity_id:
        - binary_sensor.shu_fang_gan_ying_kai_guan_motion_right
      to: 'on'
  conditions:
    - condition: and
      conditions:
        # 1. 確保書房燈目前是關閉的才觸發開燈
        - condition: state
          entity_id: switch.shu_fang_deng
          state: 'off'
        
        # 2. 攝影機與 AP 聯動判斷 (滿足 情況A 或 情況B 皆可放行)
        - condition: or
          conditions:
            # 情況 A：iPhone 在五樓 AP，且過去 20 分鐘內攝影機有拍到人
            - condition: and
              conditions:
                - condition: template
                  value_template: >
                    {% set ap_raw = states('input_text.topfloor_ap_macs_5f') %}
                    {% set ap_list_raw = '70:a7:41:e4:54:1f,70:a7:41:e4:5a:bf,d0:21:f9:f2:fc:4c' if ap_raw in ['unknown','unavailable',''] else ap_raw %}
                    {% set ap_list = (ap_list_raw|lower|replace(' ','')|replace(';',',')|regex_findall('[^,]+')) %}
                    {% set iphone_ap = (state_attr('device_tracker.iphone_17_pro_max_kenny','ap_mac')|default(''))|lower %}
                    {{ iphone_ap in ap_list }}
                - condition: not
                  conditions:
                    - condition: state
                      entity_id: binary_sensor.wu_lou_she_ying_ji_person_detected
                      state: 'off'
                      for:
                        minutes: 20
            
            # 情況 B：iPhone 不在五樓 AP，且過去 2 分鐘內攝影機有拍到人
            - condition: and
              conditions:
                - condition: template
                  value_template: >
                    {% set ap_raw = states('input_text.topfloor_ap_macs_5f') %}
                    {% set ap_list_raw = '70:a7:41:e4:54:1f,70:a7:41:e4:5a:bf,d0:21:f9:f2:fc:4c' if ap_raw in ['unknown','unavailable',''] else ap_raw %}
                    {% set ap_list = (ap_list_raw|lower|replace(' ','')|replace(';',',')|regex_findall('[^,]+')) %}
                    {% set iphone_ap = (state_attr('device_tracker.iphone_17_pro_max_kenny','ap_mac')|default(''))|lower %}
                    {{ iphone_ap not in ap_list }}
                - condition: not
                  conditions:
                    - condition: state
                      entity_id: binary_sensor.wu_lou_she_ying_ji_person_detected
                      state: 'off'
                      for:
                        minutes: 2

        # 3. 手動冷卻判定 (維持你原本的關閉狀態 enabled: false)
        - condition: not
          conditions:
            - condition: template
              value_template: "{{(as_timestamp(now()) - as_timestamp(state_attr('automation.a107_11a_single', 'last_triggered') | default(0))) < (600) }}"
          enabled: false
  actions:
    - sequence:
        - action: switch.turn_on
          target:
            entity_id: switch.shu_fang_deng
        - delay:
            hours: 0
            minutes: 5
            seconds: 0
            milliseconds: 0
        - action: switch.turn_off
          target:
            entity_id: switch.shu_fang_deng
