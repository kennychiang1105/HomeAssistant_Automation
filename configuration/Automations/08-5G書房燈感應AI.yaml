# ─────────────────────────────────────────────────────────────
# 08-5G書房燈感應AI (V3.0)
# 更新紀錄：
# - V3.0：由 UI automation 拆分為 AI 模組檔，維持原觸發/條件/動作行為。
# ─────────────────────────────────────────────────────────────
- alias: 08-5G 書房燈感應
  id: ai_08_5g_study_motion_light
  description: >
    書房感應燈控制：偵測動作時開啟書房燈，延遲 5 分鐘後自動關閉。
    保留原攝影機條件判斷以降低誤觸。
  mode: restart
  variables:
    automation_version: V3.0
  triggers:
    - trigger: state
      entity_id:
        - binary_sensor.shu_fang_gan_ying_kai_guan_motion_right
      to: 'on'
  conditions:
    - condition: and
      conditions:
        - condition: state
          entity_id: switch.shu_fang_deng
          state: 'off'
        - condition: or
          conditions:
            - condition: state
              entity_id: binary_sensor.wu_lou_she_ying_ji_person_detected
              state: 'on'
            - condition: not
              conditions:
                - condition: state
                  entity_id: binary_sensor.wu_lou_she_ying_ji_person_detected
                  state: 'off'
                  for:
                    hours: 0
                    minutes: 2
                    seconds: 0
          enabled: true
        - condition: not
          conditions:
            - condition: template
              value_template: "{{(as_timestamp(now()) - as_timestamp(state_attr('automation.a107_11a_single', 'last_triggered') | default(0)))
                < (600) }}"
          enabled: false
  actions:
    - sequence:
        - action: switch.turn_on
          target:
            entity_id: switch.shu_fang_deng
        - delay:
            hours: 0
            minutes: 5
            seconds: 0
            milliseconds: 0
        - action: switch.turn_off
          target:
            entity_id: switch.shu_fang_deng
