# ─────────────────────────────────────────────────────────────
# 104-2車牌辨識AI (V3.0)
# 相容版本：Helpers V3.5（已確認）
# 更新紀錄：
# - V3.0：正式版；安全緩衝時間由 90 秒下修為 45 秒。
# - V3.0 (RC1)：車輛駛出安全緩衝由 2 分鐘調整為 1.5 分鐘（90 秒），其餘流程不變。
# - V3.0 Beta 3：手動開門後一旦取得駛出憑證立即進入 2 分鐘安全緩衝；憑證等待上限由 10 分鐘下修為 6 分鐘。
# - V3.0 Beta 2：LPR 觸發直接視為具備憑證；取得憑證後安全等待時間統一為 2 分鐘；開門防呆 3 秒；支援 parallel 模式。
# - V3.0 Beta 1：統一命名規範、欄位標準化與通知標題版本同步。
# ─────────────────────────────────────────────────────────────
- alias: 104-2車牌辨識AI (V3.0)
  id: ai_lpr_recognition
  description: >
    兩輛車（EAK8030、REA9519）— 多 Webhook；即時門控監測；可取消式關門評估；
    新增出門防呆與 6 分鐘憑證等待。LPR觸發免憑證，統一給予 45 秒關門緩衝。
  mode: parallel
  max: 5

  trigger:
    # LPR — EAK8030
    - id: t_eak8030
      platform: webhook
      webhook_id: lpr_gate_eak8030
      allowed_methods: [GET, POST]
      local_only: false
    # LPR — REA9519
    - id: t_rea9519
      platform: webhook
      webhook_id: lpr_gate_rea9519
      allowed_methods: [GET, POST]
      local_only: false
    # 鐵門一開就觸發 (代表鐵門已 100% 完全開啟)
    - id: t_gate_open_instant
      platform: state
      entity_id: cover.garage
      to: "open"

  variables:
    automation_version: "V3.0"
    # 來源車牌與名稱
    plate: >-
      {% if trigger.id == 't_eak8030' %}EAK8030
      {% elif trigger.id == 't_rea9519' %}REA9519
      {% else %}未知{% endif %}
    car_name: >-
      {% if plate == 'EAK8030' %}Kenny車
      {% elif plate == 'REA9519' %}家用車
      {% else %}未知車輛{% endif %}

    # 基本環境
    event_time: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
    gate_state: "{{ states('cover.garage') }}"
    debug_on: "{{ is_state('input_boolean.lpr_debug_notify','on') }}"
    auto_close_enabled: "{{ is_state('input_boolean.lpr_auto_close_enable','on') }}"
    
    # 安防與感測器群
    aqara_li_jia_on: "{{ is_state('input_boolean.aqara_li_jia','on') }}"
    person_sensor: binary_sensor.che_ku_she_ying_ji_person_detected
    vehicle_sensor: binary_sensor.che_ku_she_ying_ji_vehicle_detected
    motion_sensor: binary_sensor.g6_instant_motion
    
    arm_away_now: "{{ aqara_li_jia_on }}"
    nobody_now: "{{ is_state(person_sensor, 'off') }}"
    
    # 判斷是否為 LPR 剛觸發的開門 (120 秒內)
    lpr_opened_recently: >-
      {{ 
        '來源:LPR' in states('input_text.lpr_last_event') and 
        (as_timestamp(now()) - as_timestamp(states.input_text.lpr_last_event.last_updated)) < 120 
      }}

    # LPR 當下「開門」預判（需保全 Arm Away）
    should_open_now: "{{ is_state('cover.garage','closed') and arm_away_now }}"

  action:
    - choose:
        # ① LPR 事件（回家或出門觸發自動開門）
        - conditions:
            - condition: template
              value_template: "{{ trigger.id in ['t_eak8030','t_rea9519'] }}"
          sequence:
            - service: input_text.set_value
              data:
                entity_id: input_text.lpr_last_event
                value: >-
                  {{
                    (event_time ~ " | 來源:LPR | 車牌:" ~ plate ~
                    " (" ~ car_name ~ ") | 鐵門:" ~ gate_state)[:255]
                  }}
            - service: input_select.select_option
              data:
                entity_id: input_select.lpr_last_plate
                option: "{{ '未偵測' if plate=='未知' else plate }}"
            
            - choose:
                # 條件符合：關閉狀態 + Arm Away 下收到 LPR -> 等 3 秒 -> 開門
                - conditions:
                    - condition: template
                      value_template: "{{ should_open_now }}"
                  sequence:
                    - delay: "00:00:03"  # 🟢 3 秒防呆
                    - condition: state
                      entity_id: cover.garage
                      state: "closed"
                    - service: cover.open_cover
                      target:
                        entity_id: cover.garage
                    - service: persistent_notification.create
                      data:
                        title: "✅ LPR 開門指令已執行 ({{ automation_version }})"
                        message: >-
                          時間：{{ event_time }}
                          車牌：{{ plate }}（{{ car_name }}）
                          指令：開門 (因鐵門為關閉狀態)
                # 條件不符：門已開或非 Arm Away -> 僅通知
                - conditions:
                    - condition: template
                      value_template: "{{ not should_open_now }}"
                  sequence:
                    - choose:
                        - conditions:
                            - condition: template
                              value_template: "{{ debug_on }}"
                          sequence:
                            - service: persistent_notification.create
                              data:
                                title: "ℹ️ LPR 事件通知 ({{ automation_version }})"
                                message: >-
                                  時間：{{ event_time }}
                                  車牌：{{ plate }}（{{ car_name }}）
                                  狀態：{{ '鐵門已開，不重複執行。' if is_state('cover.garage','open') else '目前非 Arm Away，不執行開門。' }}

        # ② 鐵門開啟 → 進入「可取消」的延遲關門評估
        - conditions:
            - condition: template
              value_template: "{{ trigger.id == 't_gate_open_instant' }}"
          sequence:
            - service: input_text.set_value
              data:
                entity_id: input_text.lpr_last_event
                value: >-
                  {{
                    (event_time ~ " | 來源:GateOpen | 車牌:N/A | 鐵門:" ~ gate_state)[:255]
                  }}
            
            - choose:
                - conditions:
                    - condition: template
                      value_template: "{{ debug_on }}"
                  sequence:
                    - service: persistent_notification.create
                      data:
                        title: "🛗 鐵門已完全打開（{{ automation_version }}）"
                        message: >-
                          {% if lpr_opened_recently %}
                          ✅ 近期已有 LPR 觸發紀錄，視同取得駛出憑證，將於 45 秒後評估關門。
                          {% else %}
                          ⏳ 開始等待駛出憑證 (6分鐘內)。一旦取得憑證即立刻進入 45 秒安全緩衝。
                          {% endif %}

            # —— 階段一：防呆等待，確認車輛真的有移動/駛出 —— #
            - choose:
                - conditions:
                    - condition: template
                      value_template: "{{ not lpr_opened_recently }}"  # 🟢 若 LPR 剛觸發過，跳過這段等待
                  sequence:
                    - wait_for_trigger:
                        # 【憑證一：專屬車輛辨識】
                        - platform: webhook
                          webhook_id: lpr_gate_eak8030
                        - platform: webhook
                          webhook_id: lpr_gate_rea9519
                        - platform: state
                          entity_id: binary_sensor.che_ku_she_ying_ji_vehicle_detected
                          to: "on"
                        - platform: state
                          entity_id: binary_sensor.che_ku_she_ying_ji_vehicle_detected
                          to: "off"
                        # 【憑證二：一般移動偵測】
                        - platform: state
                          entity_id: binary_sensor.g6_instant_motion
                          from: "on"
                          to: "off"
                          for:
                            seconds: 30
                      timeout:
                        minutes: 6
                      continue_on_timeout: true

                    # 如果 6 分鐘都沒有憑證觸發 ⇒ 取消
                    - choose:
                        - conditions:
                            - condition: template
                              value_template: "{{ wait.trigger is none }}"
                          sequence:
                            - choose:
                                - conditions:
                                    - condition: template
                                      value_template: "{{ debug_on }}"
                                  sequence:
                                    - service: persistent_notification.create
                                      data:
                                        title: "⛔ 已取消自動關門 (車輛未駛出)"
                                        message: "鐵門開啟後 6 分鐘內未捕捉到任何駛出憑證，為保護安全已暫停本次自動關門。"
                            - stop: "Canceled because no car left"
                        - conditions:
                            - condition: template
                              value_template: "{{ wait.trigger is not none and debug_on }}"
                          sequence:
                            - service: persistent_notification.create
                              data:
                                title: "✅ 已取得駛出憑證"
                                message: "已取得駛出憑證（{{ wait.trigger.platform }}），立即進入 45 秒安全緩衝，不會繼續等待到 6 分鐘上限。"

            # —— 階段二：確認駛出 (或 LPR 直達)，進入統一 45 秒安全緩衝 —— #
            - wait_for_trigger:
                - platform: state
                  entity_id: binary_sensor.che_ku_she_ying_ji_person_detected
                  to: "on"
              timeout:
                seconds: 45  # 🟢 統一等待時間為 45 秒
              continue_on_timeout: true

            # 緩衝期間偵測到人 ⇒ 取消
            - choose:
                - conditions:
                    - condition: template
                      value_template: "{{ wait.trigger is not none }}"
                  sequence:
                    - choose:
                        - conditions:
                            - condition: template
                              value_template: "{{ debug_on }}"
                          sequence:
                            - service: persistent_notification.create
                              data:
                                title: "⛔ 已取消自動關門 (偵測到人)"
                                message: "等待期間攝影機偵測到人員活動，為保護安全已暫停關門。"
                    - stop: "Canceled by presence"

            # 視窗結束 ⇒ 條件式判斷
            - variables:
                arm_away_later: "{{ is_state('input_boolean.aqara_li_jia','on') }}"
                # 🟢 三重保護：確認現場無人、無車輛狀態、無任何細微移動
                nobody_later: >-
                  {{ 
                    is_state(person_sensor, 'off') and 
                    is_state(vehicle_sensor, 'off') and
                    is_state(motion_sensor, 'off')
                  }}
                gate_still_open: "{{ is_state('cover.garage','open') }}"
            - choose:
                # 符合條件
                - conditions:
                    - condition: template
                      value_template: "{{ gate_still_open and arm_away_later and nobody_later }}"
                  sequence:
                    - choose:
                        - conditions:
                            - condition: template
                              value_template: "{{ auto_close_enabled }}"
                          sequence:
                            - service: cover.close_cover
                              target:
                                entity_id: cover.garage
                            - service: persistent_notification.create
                              data:
                                title: "🤖 自動關門已執行 ({{ automation_version }})"
                                message: "倒數結束：Arm Away + 現場三重靜態確認無動靜 + 門仍開 ⇒ 已下達關門。"
                        - conditions:
                            - condition: template
                              value_template: "{{ not auto_close_enabled }}"
                          sequence:
                            - service: persistent_notification.create
                              data:
                                title: "🤖（預備）條件式關門：會關"
                                message: "預判會關門。目前僅通知；開啟『LPR自動關門』即可生效。"
                # 不符合條件
                - conditions:
                    - condition: template
                      value_template: "{{ not (gate_still_open and arm_away_later and nobody_later) }}"
                  sequence:
                    - service: persistent_notification.create
                      data:
                        title: "🙂（預備）條件式關門：不關"
                        message: >-
                          條件未滿足：保全={{ 'Arm Away' if arm_away_later else '非 Arm Away' }}、
                          現場動靜={{ '平靜無人' if nobody_later else '有動靜' }}、鐵門={{ '仍開啟' if gate_still_open else '已關閉' }}。
      default: []
