- id: '1644394919500'
  alias: 01地震災害系統
  description: ''
  triggers:
  - entity_id:
    - sensor.earthquake
    trigger: state
  conditions:
  - condition: template
    value_template: '{{ ''地震'' in states(''sensor.earthquake'') }}'
  - condition: template
    value_template: '{{ (as_timestamp(now()) - as_timestamp(states(''sensor.earthquake_last_valid_update'')))
      < 1800 }}'
  actions:
  - if:
    - condition: template
      value_template: '{{(as_timestamp(now()) - as_timestamp(states.script.99999999999999.attributes.last_triggered))
        < (3600) }}'
    then:
    - parallel:
      - data:
          user_id: C26ff4e9d30159ba5264a1676f46f8f86
          payload: "[\n      {\n          \"type\":\"text\",\n          \"text\":\"【災防系統通知】一般
            General \U0001FAA7\\n\U0001F30D 地震報告 Earthquake Report\"\n      },\n      {\n\n
            \          \"type\":\"text\",\n          \"text\":\" 地震報告收到以下中央氣象局訊息:\"\n\n
            \      },\n      {\n          \"type\":\"text\",\n          \"text\":\"{{
            states('sensor.earthquake') }}\"\n      }\n  ]\n"
        enabled: true
        action: script.send_line_to_user
      - data:
          message: "地震報告收到以下中央氣象局訊息: \n(同步發送至廣播與LINE)\n{{ states('sensor.earthquake')
            }}"
        action: notify.persistent_notification
      - sequence:
        - data:
            volume_level: 0.5
          action: media_player.volume_set
          target:
            entity_id:
            - media_player.ke_ting_homepod
          enabled: true
        - data:
            announce: true
            media:
              media_content_id: https://jnas916p.synology.me:8126/local/boardcast.mp3
              media_content_type: music
              metadata: {}
          target:
            entity_id: media_player.guang_bo_qun_zu_tong_zhi
          enabled: true
          action: media_player.play_media
        - delay:
            hours: 0
            minutes: 0
            seconds: 13
            milliseconds: 0
          enabled: true
        - data:
            language: zh-tw
            entity_id: media_player.guang_bo_qun_zu_tong_zhi
            message: '地震報告收到以下中央氣象局訊息: {{ states(''sensor.earthquake'') }}'
          enabled: true
          action: tts.google_translate_say
    else:
    - data:
        message: "地震報告收到以下中央氣象局訊息: \n(未影響之小型地震)\n{{ states('sensor.earthquake') }}"
      action: notify.persistent_notification
  mode: single
