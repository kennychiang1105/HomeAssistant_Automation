# ─────────────────────────────────────────────────────────────
# 00-2A更新紀錄推播AI (V3.3)
# 相容版本：Helpers V3.11（已確認）
# 更新紀錄（統一格式）：
# - V3.3：新增手動更新說明欄位，推播時可附加人工補充內容。
# - V3.2：改為動態掃描版本 + trigger-based template snapshot。
# ─────────────────────────────────────────────────────────────
- alias: 00-2A更新紀錄推播AI (V3.3)
  id: ai_00_2a_release_note_push
  description: 每日 18:00 比對 HA/AI 版本，僅在有更新時推播變更摘要（HA + LINE 一般通知）。
  mode: single
  triggers:
    - platform: time
      at: "18:00:00"
  variables:
    automation_version: "V3.3"
    line_bot_target_user_id: "{{ states('sensor.line_bot_target_user_id') }}"
    release_url: "https://github.com/kennychiang1105/HomeAssistant_Automation/releases/"
    invalid_texts: ["unknown", "unavailable", "none", "None", ""]
    manual_update_note: "{{ states('input_text.ai_manual_update_note') if states('input_text.ai_manual_update_note') not in invalid_texts else '' }}"
    manual_note_block: "{{ '📝 簡要更新說明\n' ~ manual_update_note if manual_update_note|trim != '' else '' }}"
    manual_note_block_with_spacing: "{{ '\n\n' ~ manual_note_block if manual_note_block|trim != '' else '' }}"
    ha_current_version: "{{ state_attr('sensor.ai_version_compare_current', 'ha_version') | default('未知', true) }}"
    previous_ha_version: "{{ state_attr('sensor.ai_version_snapshot_history', 'ha_version') | default('V0.0', true) }}"
    os_current_version: "{{ state_attr('sensor.ai_version_compare_current', 'os_version') | default('未知', true) }}"
    homekit_framework_version: "{{ states('input_text.homekit_framework_version_manual') if states('input_text.homekit_framework_version_manual') not in invalid_texts else '未設定' }}"
    automation_package_version: "{{ states('input_text.automation_package_version_manual') if states('input_text.automation_package_version_manual') not in invalid_texts else '未設定' }}"
    automation_framework_version: "{{ states('input_text.automation_framework_version_manual') if states('input_text.automation_framework_version_manual') not in invalid_texts else '未設定' }}"
    registry_versions: "{{ state_attr('sensor.ai_version_registry_dynamic', 'versions') if state_attr('sensor.ai_version_registry_dynamic', 'versions') is mapping else dict() }}"
    current_versions: "{{ dict((registry_versions if registry_versions is mapping else dict()), system_operating_system_version={'name': 'Operating System版本', 'version': os_current_version, 'file': 'system_auto'}, manual_homekit_framework_version={'name': 'HomeKit架構版本', 'version': homekit_framework_version, 'file': 'manual_input'}, manual_automation_package_version={'name': '自動化更新包版本', 'version': automation_package_version, 'file': 'manual_input'}, manual_automation_framework_version={'name': '自動化架構版本', 'version': automation_framework_version, 'file': 'manual_input'}) }}"
    previous_versions: "{{ state_attr('sensor.ai_version_snapshot_history', 'versions') if state_attr('sensor.ai_version_snapshot_history', 'versions') is mapping else dict() }}"
    previous_os_version: >-
      {% set old_item = previous_versions.get('system_operating_system_version') %}
      {{ old_item.version if old_item is mapping else 'V0.0' }}
    ha_status_line: >-
      {{ '• Home Assistant Core：目前版本 ' ~ ha_current_version ~ '（上次記錄：' ~ previous_ha_version ~ '）\n• Home Assistant OS：目前版本 ' ~ os_current_version ~ '（上次記錄：' ~ previous_os_version ~ '）' }}
    changed_lines_text: >-
      {% set ns = namespace(lines=[]) %}
      {% if previous_ha_version != ha_current_version %}
        {% set ns.lines = ns.lines + ['• Home Assistant：已從 ' ~ previous_ha_version ~ ' 更新至 ' ~ ha_current_version] %}
      {% endif %}
      {% if current_versions is mapping %}
        {% for key, item in (current_versions | dictsort) %}
          {% set old_item = previous_versions.get(key) if previous_versions is mapping else none %}
          {% set old_version = old_item.version if old_item is mapping else 'V0.0' %}
          {% set new_version = item.version if item is mapping else '未知' %}
          {% set name = item.name if item is mapping else key %}
          {% if old_version != new_version %}
            {% set ns.lines = ns.lines + ['• ' ~ name ~ '：已從 ' ~ old_version ~ ' 更新至 ' ~ new_version] %}
          {% endif %}
        {% endfor %}
      {% endif %}
      {{ ns.lines | join('\n') }}
    has_changes: "{{ changed_lines_text | trim != '' }}"
  conditions: []
  actions:
    - if:
        - condition: template
          value_template: "{{ has_changes }}"
      then:
        - parallel:
            - action: persistent_notification.create
              data:
                title: 智慧家庭更新紀錄（每日）
                message: >-
                  【偵測到版本更新】

                  {{ ha_status_line }}

                  {{ changed_lines_text }}{{ manual_note_block_with_spacing }}

                  更新紀錄網址：{{ release_url }}
            - if:
                - condition: state
                  entity_id: input_boolean.notify_line_general_enable
                  state: "on"
              then:
                - action: script.send_line_to_user
                  data:
                    user_id: "{{ line_bot_target_user_id if line_bot_target_user_id not in invalid_texts else 'C26ff4e9d30159ba5264a1676f46f8f86' }}"
                    payload: >-
                      {% set messages = [
                        {"type":"text","text":"【智慧家庭通知】一般 General 🪧"},
                        {"type":"text","text":"📘 偵測到版本更新\n\n" ~ ha_status_line ~ "\n" ~ changed_lines_text}
                      ] %}
                      {% if manual_note_block|trim != '' %}
                        {% set messages = messages + [{"type":"text","text":manual_note_block}] %}
                      {% endif %}
                      {% set messages = messages + [{"type":"text","text":"🔗 更新紀錄網址\n" ~ release_url}] %}
                      {{ messages | tojson }}

        - event: ai_version_snapshot_update
          event_data:
            ha_version: "{{ ha_current_version }}"
            versions: "{{ current_versions }}"
            versions_json: "{{ current_versions | tojson }}"
            changed_lines_text: "{{ changed_lines_text }}"
