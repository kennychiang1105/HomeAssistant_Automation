# 相容版本：Helpers V3.8（已確認）
- alias: 00-2A更新紀錄推播AI (V3.2)
  id: ai_00_2a_release_note_push
  description: 每日 18:00 比對 HA/AI 版本，僅在有更新時推播變更摘要（HA + LINE 一般通知）。
  mode: single
  triggers:
    - trigger: time
      at: "18:00:00"
  variables:
    automation_version: "V3.2"
    line_bot_target_user_id: "{{ states('sensor.line_bot_target_user_id') }}"
    release_url: "https://github.com/kennychiang1105/HomeAssistant_Automation/releases/"
    invalid_texts: ["unknown", "unavailable", "none", "None", ""]

    ha_current_version: >-
      {{ states('sensor.current_version') if states('sensor.current_version') not in invalid_texts else '未知' }}
    previous_ha_version: >-
      {{ state_attr('sensor.ai_version_snapshot_history', 'ha_version') | default('V0.0', true) }}

    current_versions: >-
      {% set versions = state_attr('sensor.ai_version_registry_dynamic', 'versions') %}
      {{ versions if versions is mapping else dict() }}
    previous_versions: >-
      {% set versions = state_attr('sensor.ai_version_snapshot_history', 'versions') %}
      {{ versions if versions is mapping else dict() }}
    registry_ready: >-
      {{ states('sensor.ai_version_registry_dynamic') == 'ok' and (current_versions | count > 0) }}

    changed_lines_text: >-
      {% set ns = namespace(lines=[]) %}

      {% if previous_ha_version != ha_current_version %}
        {% set ns.lines = ns.lines + ['• Home Assistant：已從 ' ~ previous_ha_version ~ ' 更新至 ' ~ ha_current_version] %}
      {% endif %}

      {% for key, item in (current_versions | dictsort) %}
        {% set old_item = previous_versions.get(key) %}
        {% set old_version = old_item.version if old_item is mapping else 'V0.0' %}
        {% set new_version = item.version if item is mapping else '未知' %}
        {% set name = item.name if item is mapping else key %}
        {% if old_version != new_version %}
          {% set ns.lines = ns.lines + ['• ' ~ name ~ '：已從 ' ~ old_version ~ ' 更新至 ' ~ new_version] %}
        {% endif %}
      {% endfor %}

      {% for key, old_item in (previous_versions | dictsort) %}
        {% if key not in current_versions %}
          {% set old_name = old_item.name if old_item is mapping else key %}
          {% set old_version = old_item.version if old_item is mapping else '未知' %}
          {% set ns.lines = ns.lines + ['• ' ~ old_name ~ '：已從 ' ~ old_version ~ ' 移除或停用'] %}
        {% endif %}
      {% endfor %}

      {{ ns.lines | join('\n') }}
    has_changes: "{{ registry_ready and (changed_lines_text | trim != '') }}"

  conditions: []

  actions:
    - if:
        - condition: template
          value_template: "{{ has_changes }}"
      then:
        - parallel:
            - action: persistent_notification.create
              data:
                title: 智慧家庭更新紀錄（每日）
                message: >-
                  【偵測到版本更新】

                  {{ changed_lines_text }}

                  更新紀錄網址：{{ release_url }}
            - if:
                - condition: state
                  entity_id: input_boolean.notify_line_general_enable
                  state: "on"
              then:
                - action: script.send_line_to_user
                  data:
                    user_id: "{{ line_bot_target_user_id if line_bot_target_user_id not in invalid_texts else 'C26ff4e9d30159ba5264a1676f46f8f86' }}"
                    payload: >-
                      {% set messages = [
                        {"type":"text","text":"【智慧家庭通知】一般 General 🪧"},
                        {"type":"text","text":"📘 偵測到版本更新\n\n" ~ changed_lines_text},
                        {"type":"text","text":"🔗 更新紀錄網址\n" ~ release_url}
                      ] %}
                      {{ messages | tojson }}
        - event: ai_version_snapshot_update
          event_data:
            ha_version: "{{ ha_current_version }}"
            versions_json: "{{ current_versions | tojson }}"
            changed_lines_text: "{{ changed_lines_text }}"
