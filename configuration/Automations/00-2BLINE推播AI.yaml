# ─────────────────────────────────────────────────────────────
# 00-2BLINE推播AI (V3.3)
# 相容版本：Helpers V3.11（已確認）
# 更新紀錄（統一格式）：
# - V3.3：低額度(<12)只通知 Bot0；例行摘要改每月 1/15 日，不再開機通知。
# ─────────────────────────────────────────────────────────────
- alias: 00-2BLINE推播AI (V3.3)
  id: ai_line_bot_quota_guard
  description: LINE Bot 額度監控與緊急推播
  mode: single
  trigger:
    - id: bot0_low
      trigger: numeric_state
      entity_id: sensor.bot_msg_remaining0
      below: 12
      for: "00:05:00"
    - id: final_low
      trigger: template
      value_template: "{{ states('sensor.line_bot_rotation_target')|int(0) == 0 }}"
      for: "00:05:00"
    - id: monthly_update_1
      trigger: time
      at: "18:00:00"
    - id: monthly_update_15
      trigger: time
      at: "18:00:00"
    - id: bot0_zero
      trigger: numeric_state
      entity_id: sensor.bot_msg_remaining0
      below: 1
  condition:
    - condition: template
      value_template: >-
        {% if trigger.id == 'monthly_update_1' %}
          {{ now().day == 1 }}
        {% elif trigger.id == 'monthly_update_15' %}
          {{ now().day == 15 }}
        {% else %}
          true
        {% endif %}
  variables:
    automation_version: "V3.3"
    notif_title: "【LINE Bot 配額監控 {{ automation_version }}】"
    quota_user_id: U9eeaaf5d404dbde249039924567992d3
    remain0: "{{ states('sensor.bot_msg_remaining0') }}"
    count0: "{{ states('sensor.bot_msg_count0') }}"
    allow_line_warn: "{{ is_state('input_boolean.notify_line_important_enable','on') }}"
    allow_line_final: "{{ is_state('input_boolean.notify_line_emergency_enable','on') }}"
  action:
    - choose:
        - conditions: "{{ trigger.id == 'bot0_zero' }}"
          sequence:
            - service: notify.persistent_notification
              data:
                title: "{{ notif_title }}"
                message: "Bot0 配額已歸零，請立即更換 Token。"
        - conditions: "{{ trigger.id == 'bot0_low' }}"
          sequence:
            - service: notify.persistent_notification
              data:
                title: "{{ notif_title }}"
                message: "Bot0 剩餘 {{ remain0 }} / 200 次（已用 {{ count0 }}）。"
            - if:
                - condition: template
                  value_template: "{{ allow_line_warn }}"
              then:
                - service: script.send_line_to_user
                  data:
                    user_id: "{{ quota_user_id }}"
                    payload: "{{ [{'type':'text','text':notif_title},{'type':'text','text':'重要 Important ⚠️\nBot0 剩餘次數低於 12，請預備更換。'}] | tojson }}"
        - conditions: "{{ trigger.id in ['monthly_update_1','monthly_update_15'] }}"
          sequence:
            - service: notify.persistent_notification
              data:
                title: "{{ notif_title }}"
                message: "例行配額摘要：Bot0 已用 {{ count0 }}，剩餘 {{ remain0 }}。"
        - conditions: "{{ trigger.id == 'final_low' }}"
          sequence:
            - service: notify.persistent_notification
              data:
                title: "{{ notif_title }}"
                message: "所有 Bot 配額已用盡或輪播無可用 Bot。"
            - if:
                - condition: template
                  value_template: "{{ allow_line_final }}"
              then:
                - service: script.send_line_to_user
                  data:
                    user_id: "{{ quota_user_id }}"
                    payload: "{{ [{'type':'text','text':notif_title},{'type':'text','text':'最終告警 ‼️ 所有 Bot 配額已用盡或無可用 Bot。'}] | tojson }}"
