# ─────────────────────────────────────────────────────────────
# 00-2BLINE推播AI (V3.2)
# 相容版本：Helpers V3.2（已確認）
# 更新紀錄（統一格式）：
# - V3.0：統一命名規範、欄位標準化與通知標題版本同步。
# - V3.2：LINE 配額預警/最終告警改為統一分級開關（重要/緊急）；新增「HA AI更新紀錄」網址到 LINE 通知。
# - V3.1：移除每 30 分鐘定期檢查推播，避免高頻率通知干擾。
# ─────────────────────────────────────────────────────────────
- alias: 00-2BLINE推播AI (V3.2)
  id: ai_line_bot_quota_guard
  description: LINE Bot 額度監控與緊急推播
  mode: single

  trigger:
    - id: bot1_low
      trigger: numeric_state
      entity_id: sensor.bot_msg_remaining1
      below: 12
      for: "00:05:00"

    - id: bot2_low
      trigger: numeric_state
      entity_id: sensor.bot_msg_remaining2
      below: 12
      for: "00:05:00"

    - id: bot3_low
      trigger: numeric_state
      entity_id: sensor.bot_msg_remaining3
      below: 12
      for: "00:05:00"

    - id: final_low
      trigger: template
      value_template: >-
        {{ states('sensor.line_bot_rotation_target')|int(0) == 0 }}
      for: "00:05:00"

    - id: daily_update
      trigger: time
      at: "09:00:00"

    - id: startup
      trigger: homeassistant
      event: start

    - id: reload
      trigger: event
      event_type: automation_reloaded

    - id: bot1_zero
      trigger: numeric_state
      entity_id: sensor.bot_msg_remaining1
      below: 1

    - id: bot2_zero
      trigger: numeric_state
      entity_id: sensor.bot_msg_remaining2
      below: 1

    - id: bot3_zero
      trigger: numeric_state
      entity_id: sensor.bot_msg_remaining3
      below: 1

    - id: bot0_zero
      trigger: numeric_state
      entity_id: sensor.bot_msg_remaining0
      below: 1

  variables:
    automation_version: "V3.2"
    limit: 200
    switch_limit: 196
    notif_title: "【LINE Bot 配額監控 {{ automation_version }}】"

    quota_user_id: U9eeaaf5d404dbde249039924567992d3

    bot1_name: "ChiangFamily 智慧家庭 B"
    bot2_name: "ChiangFamily 智慧家庭 C"
    bot3_name: "ChiangFamily 智慧家庭 D"

    invalids: ["unknown", "unavailable", "none", "None"]

    bot1_used: >-
      {% set val = states('sensor.bot_msg_count1') %}
      {{ val|int(0) if val|lower not in invalids else -1 }}
    bot2_used: >-
      {% set val = states('sensor.bot_msg_count2') %}
      {{ val|int(0) if val|lower not in invalids else -1 }}
    bot3_used: >-
      {% set val = states('sensor.bot_msg_count3') %}
      {{ val|int(0) if val|lower not in invalids else -1 }}

    bot1_remain: >-
      {% set val = states('sensor.bot_msg_remaining1') %}
      {{ val|int(0) if val|lower not in invalids else -1 }}
    bot2_remain: >-
      {% set val = states('sensor.bot_msg_remaining2') %}
      {{ val|int(0) if val|lower not in invalids else -1 }}
    bot3_remain: >-
      {% set val = states('sensor.bot_msg_remaining3') %}
      {{ val|int(0) if val|lower not in invalids else -1 }}

    active_bot_idx: >-
      {% set c1 = states('sensor.bot_msg_count1') %}
      {% set c2 = states('sensor.bot_msg_count2') %}
      {% set c3 = states('sensor.bot_msg_count3') %}
      {% if c1|lower not in invalids and c1|int < switch_limit %}
        1
      {% elif c2|lower not in invalids and c2|int < switch_limit %}
        2
      {% elif c3|lower not in invalids and c3|int < switch_limit %}
        3
      {% else %}
        0
      {% endif %}

    active_bot_label: >-
      {% set sensor_label = states('sensor.line_bot_in_use') %}
      {% set invalids = ['unknown','unavailable','none','None'] %}
      {% if sensor_label|lower not in invalids %}
        {{ sensor_label }} (輪播中)
      {% elif active_bot_idx == 1 %}{{ bot1_name }} (輪播中)
      {% elif active_bot_idx == 2 %}{{ bot2_name }} (輪播中)
      {% elif active_bot_idx == 3 %}{{ bot3_name }} (輪播中)
      {% else %}無可用 Bot，請立即更換{% endif %}

    bot_overview_text: >-
      {% set lines = [] %}
      {% if bot1_used >= 0 and bot1_remain >= 0 %}
        {% set lines = lines + ['• ' ~ bot1_name ~ '：已用 ' ~ bot1_used|string ~ ' / ' ~ limit|string ~ '，剩餘 ' ~ bot1_remain|string] %}
      {% else %}
        {% set lines = lines + ['• ' ~ bot1_name ~ '：已用 未知 / ' ~ limit|string ~ '，剩餘 未知'] %}
      {% endif %}
      {% if bot2_used >= 0 and bot2_remain >= 0 %}
        {% set lines = lines + ['• ' ~ bot2_name ~ '：已用 ' ~ bot2_used|string ~ ' / ' ~ limit|string ~ '，剩餘 ' ~ bot2_remain|string] %}
      {% else %}
        {% set lines = lines + ['• ' ~ bot2_name ~ '：已用 未知 / ' ~ limit|string ~ '，剩餘 未知'] %}
      {% endif %}
      {% if bot3_used >= 0 and bot3_remain >= 0 %}
        {% set lines = lines + ['• ' ~ bot3_name ~ '：已用 ' ~ bot3_used|string ~ ' / ' ~ limit|string ~ '，剩餘 ' ~ bot3_remain|string] %}
      {% else %}
        {% set lines = lines + ['• ' ~ bot3_name ~ '：已用 未知 / ' ~ limit|string ~ '，剩餘 未知'] %}
      {% endif %}
      {{ lines | join('\n') }}

    triggered_bot_name: >-
      {% set mapping = {'bot1_low': bot1_name, 'bot2_low': bot2_name, 'bot3_low': bot3_name, 'final_low': 'LINE Bot'} %}
      {{ mapping.get(trigger.id, 'LINE Bot') }}
    triggered_remaining: >-
      {% set mapping = {'bot1_low': bot1_remain, 'bot2_low': bot2_remain, 'bot3_low': bot3_remain} %}
      {{ mapping.get(trigger.id, -1) }}
    triggered_used: >-
      {% set mapping = {'bot1_low': bot1_used, 'bot2_low': bot2_used, 'bot3_low': bot3_used} %}
      {{ mapping.get(trigger.id, -1) }}

    zero_triggered_bot: >-
      {% set mapping = {
        'bot1_zero': bot1_name,
        'bot2_zero': bot2_name,
        'bot3_zero': bot3_name,
        'bot0_zero': 'ChiangFamily 緊急 Bot'
      } %}
      {{ mapping.get(trigger.id, '') }}

    line_mode: "{{ states('input_select.line_bot_mode') }}"
    rotation_target: "{{ states('sensor.line_bot_rotation_target')|int(-1) }}"

    triggered_remaining_text: >-
      {{ triggered_remaining if triggered_remaining >= 0 else '未知' }}
    triggered_used_text: >-
      {{ triggered_used if triggered_used >= 0 else '未知' }}

    allow_line_warn: >-
      {{ is_state('input_boolean.notify_line_important_enable','on') }}
    allow_line_final: >-
      {{ is_state('input_boolean.notify_line_emergency_enable','on') }}

  action:
    - choose:
        - conditions:
            - condition: template
              value_template: >-
                {{ trigger.id in ['bot1_zero','bot2_zero','bot3_zero','bot0_zero'] }}
          sequence:
            - service: homeassistant.update_entity
              target:
                entity_id:
                  - sensor.line_bot_rotation_target
                  - sensor.line_bot_in_use
            - if:
                - condition: template
                  value_template: "{{ line_mode != 'Auto' }}"
              then:
                - service: input_select.select_option
                  target:
                    entity_id: input_select.line_bot_mode
                  data:
                    option: Auto
            - service: notify.persistent_notification
              data:
                title: "{{ notif_title }}"
                message: |-
                  配額為 0 自動切換（{{ automation_version }}）
                  觸發 Bot：{{ zero_triggered_bot }}
                  目前輪播：{{ active_bot_label }}
                  當前目標：{{ rotation_target }}
            - stop: Auto rotation guard executed

        - conditions:
            - condition: template
              value_template: "{{ trigger.id in ['bot1_low','bot2_low','bot3_low'] }}"
          sequence:
            - service: notify.persistent_notification
              data:
                title: "{{ notif_title }}"
                message: |-
                  Bot {{ triggered_bot_name }} 剩餘 {{ triggered_remaining_text }} / {{ limit }} 次（已用 {{ triggered_used_text }}）。
                  目前輪播：{{ active_bot_label }}
                
                  {{ bot_overview_text }}
                
                  （{{ automation_version }}｜switch_limit={{ switch_limit }}）

            - if:
                - condition: template
                  value_template: "{{ allow_line_warn }}"
              then:
                - service: script.send_line_to_user
                  data:
                    user_id: "{{ quota_user_id }}"
                    payload: >-
                      {{
                        [
                          {"type":"text","text": notif_title},
                          {"type":"text","text": "重要 Important ⚠️\nLINE Bot 配額即將用罄，請切換或補充主力 Bot。"},
                          {"type":"text","text": (
                            '• ' ~ triggered_bot_name ~ ' 剩餘 ' ~ triggered_remaining_text ~ ' / ' ~ limit|string ~ '（已用 ' ~ triggered_used_text ~ '）'
                            ~ '\n• 目前輪播：' ~ active_bot_label
                            ~ '\n\n用量摘要：\n' ~ bot_overview_text
                            ~ '\n\nHA AI更新紀錄：\nhttps://github.com/kennychiang1105/HomeAssistant_Automation/releases/'
                          )}
                        ] | tojson
                      }}

        - conditions:
            - condition: template
              value_template: "{{ trigger.id in ['daily_update','startup','reload'] }}"
          sequence:
            - service: notify.persistent_notification
              data:
                title: "{{ notif_title }}"
                message: |-
                  每日配額摘要（{{ automation_version }}）
                  目前輪播：{{ active_bot_label }}
                  {{ bot_overview_text }}

        - conditions:
            - condition: template
              value_template: "{{ trigger.id == 'final_low' }}"
          sequence:
            - service: notify.persistent_notification
              data:
                title: "{{ notif_title }}"
                message: |-
                  所有 Bot 配額已用盡或輪播無可用 Bot，請立即更換 Token。
                  目前輪播：{{ active_bot_label }}
                  {{ bot_overview_text }}
                  （{{ automation_version }}｜switch_limit={{ switch_limit }}）

            - if:
                - condition: template
                  value_template: "{{ allow_line_final }}"
              then:
                - service: script.send_line_to_user
                  data:
                    user_id: "{{ quota_user_id }}"
                    payload: >-
                      {{
                        [
                          {"type":"text","text": notif_title},
                          {"type":"text","text": "最終告警 ‼️ 所有 Bot 配額已用盡或無可用 Bot，請立即更換主力 Token。"},
                          {"type":"text","text": (
                            '• 目前輪播：' ~ active_bot_label
                            ~ '\n• 用量摘要：\n' ~ bot_overview_text
                            ~ '\n\nHA AI更新紀錄：\nhttps://github.com/kennychiang1105/HomeAssistant_Automation/releases/'
                          )}
                        ] | tojson
                      }}
