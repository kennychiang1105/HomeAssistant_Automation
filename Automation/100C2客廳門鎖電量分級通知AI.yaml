# ─────────────────────────────────────────────────────────────
# 100C2客廳門鎖電量分級通知AI (V2.4)   （Helpers V2.19 相容）
# 更新重點（相對 V2.3）：
# 1) LINE user_id 改讀 sensor.line_bot_target_user_id，支援測試模式與自訂 ID 覆蓋。
# 2) 版本同步：對應 Helpers V2.19 / Line Bot 套件 V1.5。
# 更新重點（相對 V2.2）：
# 1) 版本號同步：更新校正通知標題預設為 V2.3，對齊 Helper V2.9。
# 2) 版本日誌保留：保留 V2.2 以前的更新紀錄供追溯。
#
# 前版更新（V2.1 → V2.2）：
# 1) LINE 校正通知：改用 script.send_line_to_user JSON payload 並使用 Helpers 變數，避免 Unknown。
#
# 更早版本（V2.0 → V2.1）：
# 1) 命名修正：修正 alias 以符合檔案名稱格式。
# ─────────────────────────────────────────────────────────────
alias: 100C2客廳門鎖電量分級通知AI (V2.4)
id: automation.ai_100c2_doorlock_battery_cycle_calibration
description: 當門鎖電量由低回升至 ≥80% 時，視為換電池；同步更新上次校正款式與耗電率（％/日），並重置通知等級為 OK，供 35/15/5% 通知系統使用。
mode: single

triggers:
  - trigger: numeric_state
    entity_id: sensor.ke_ting_men_suo_dian_liang_guo_lu
    above: 80
    for: "00:00:30"

conditions:
  - condition: template
    alias: 過濾 unknown/unavailable/-1 等假觸發；且前值必須 <20%
    value_template: >-
      {% set prev = trigger.from_state.state if trigger is defined and trigger.from_state is not none else '100' %}
      {% set invalids = ['unknown','unavailable','none','None','-1'] %}
      {{ prev not in invalids and prev|float(100) < 20 }}

variables:
  automation_version: "V2.4.0"
  notif_title_base: 【AI電量計算系統 V2.4】
  notif_title_calib: |-
    {{ notif_title_base }}
    門鎖耗電率校正 ✅
  line_bot_target_user_id: "{{ states('sensor.line_bot_target_user_id') }}"
  mean_deriv: "{{ states('sensor.doorlock_battery_drop_mean_7d')|float(0) }}"
  drop_last: >-
    {% set val = 0 - (states('sensor.doorlock_battery_drop_mean_7d')|float(0)) %}
    {% if val <= 0 or val > 30 %}
      0
    {% else %}
      {{ val|round(2) }}
    {% endif %}

actions:
  # 1) 寫回「上次校正款式」
  - action: input_text.set_value
    data:
      entity_id: input_text.doorlock_batt_model_last_cycle
      value: "{{ states('input_text.doorlock_batt_model_current') }}"

  # 2) 寫回「上次日耗電率（%/日）」
  - action: input_number.set_value
    data:
      entity_id: input_number.doorlock_batt_drop_last_cycle
      value: "{{ drop_last }}"

  # 3) 重置通知等級為 OK（換電池後重新開始分級通知循環）
  - action: input_text.set_value
    data:
      entity_id: input_text.doorlock_batt_last_stage
      value: "OK"

  # 4) 發送 LINE（tojson 防亂碼）
  - if:
      - condition: state
        entity_id: input_boolean.notify_line_emergency_enable
        state: "on"
    then:
      - service: script.send_line_to_user
        data:
          user_id: "{{ line_bot_target_user_id }}"
          payload: >-
            {{
              [
                {"type":"text","text": (states('input_text.notif_title_100c_calib') if states('input_text.notif_title_100c_calib')|trim and states('input_text.notif_title_100c_calib')|lower not in ['unknown','unavailable','none'] else '【AI電量計算系統 V2.3】')},
                {"type":"text","text":"🔧 偵測到門鎖電量已由低回升至 80%以上，視為完成換電池。\n已更新『上次校正款式』與『上次日耗電率』，並重置通知等級（OK）。"},
                {"type":"text","text":"狀態摘要：\n• 新電池款式：" ~ (states('input_text.doorlock_batt_model_current') or '未填寫') ~ "\n• 校正後日耗電率：" ~ (states('input_number.doorlock_batt_drop_last_cycle')) ~ " %/日"}
              ] | tojson
            }}

  # 5) 永久通知（如你已改用 persistent_notification.create，可自行切換）
  - action: notify.persistent_notification
    data:
      title: "{{ notif_title_calib }}"
      message: >-
        🛠️ 門鎖換電池偵測：已自動完成校正並將通知等級重置為 OK。
        新電池款式＝「{{ states('input_text.doorlock_batt_model_current') or '未填寫' }}」；
        校正日耗電率＝{{ states('input_number.doorlock_batt_drop_last_cycle') }} %/日。
