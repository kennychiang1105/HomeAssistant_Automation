# ─────────────────────────────────────────────────────────────
# 22頂樓電風扇自動化AI (V2.2)   （Helpers V2.2 相容）
# 更新重點:
# 1) 體感溫度修正：即使自動模式關閉，只要感測值有效也會寫回體感溫度 Helper，避免卡在 10°C。
#
# ----- 上次更新紀錄 -----
# V2.1：
# 1) 修正縮排：修正先前版本中一處 if/then 的 YAML 縮排錯誤問題。
# V2.0：
# 1) 版本號升級：升級至 V2.0，與 Helper V2.2 同步，並統一更新日誌格式。
# 2) 程式碼優化：移除舊版 Helpers 清單，使程式碼更簡潔。
# ─────────────────────────────────────────────────────────────

alias: 22頂樓電風扇自動化AI (V2.2)
id: automation.22ding_lou_dian_feng_shan_zi_dong_hua_ai
mode: restart
max: 10

trigger:
  - platform: state
    entity_id:
      - climate.ding_lou_kong_diao
      - sensor.5f_homepodmini_temperature
      - sensor.5f_homepodmini_humidity
    for: "00:00:15"
  - platform: state
    entity_id: climate.ding_lou_kong_diao
    attribute: current_temperature
    for: "00:00:15"
  - platform: state
    entity_id: input_boolean.ding_lou_shang_lou_qing_jing
    to: "on"
  - platform: state
    entity_id: fan.dmaker_p33_eabd_fan
  - platform: state
    entity_id: input_boolean.ding_lou_fan_manual_hold
    to: "on"
    for: "01:00:00"

action:
  - variables:
      debug_notify: "{{ is_state('input_boolean.ding_lou_fan_debug_notify','on') }}"
      manual_hold: "{{ is_state('input_boolean.ding_lou_fan_manual_hold','on') }}"

      # ---- Helpers ----
      enter_low_close_c: "{{ states('input_number.enter_low_close_c') | float(26.9) }}"
      enter_high_open_c_ui: "{{ states('input_number.enter_high_open_c') | float(29.0) }}"
      night_cold_off_c: "{{ states('input_number.night_cold_off_c') | float(27.5) }}"
      morning_reopen_c: "{{ states('input_number.morning_reopen_c') | float(28.8) }}"
      ac_weight_add_c: "{{ states('input_number.ac_weight_add_c') | float(1.0) }}"
      ac_fast_rise_th_c: "{{ states('input_number.ac_fast_rise_th_c') | float(0.4) }}"
      ac_fast_rise_bonus_c: "{{ states('input_number.ac_fast_rise_bonus_c') | float(0.5) }}"

      # ---- 狀態 ----
      ac_state: "{{ states('climate.ding_lou_kong_diao') }}"
      ac_temp: "{{ state_attr('climate.ding_lou_kong_diao','current_temperature') | float(0) }}"
      fan_state: "{{ states('fan.dmaker_p33_eabd_fan') }}"
      fan_pct_now: "{{ state_attr('fan.dmaker_p33_eabd_fan','percentage') | int(0) }}"
      ac_on: "{{ ac_state == 'cool' }}"
      hhmm: "{{ now().strftime('%H:%M') }}"

      # ---- HomePod 安全取值 (含濕度) ----
      hp_raw_temp: "{{ states('sensor.5f_homepodmini_temperature') }}"
      hp_temp_base: >
        {% set s = states('sensor.5f_homepodmini_temperature') %}
        {% if s not in ['unknown','unavailable','none',''] %}
          {{ s | float }}
        {% else %}
          {{ -9999 }}
        {% endif %}
      hp_raw_humidity: "{{ states('sensor.5f_homepodmini_humidity') }}"
      hp_humidity: >
        {% set h = states('sensor.5f_homepodmini_humidity') %}
        {% if h not in ['unknown','unavailable','none',''] %}
          {{ h | float }}
        {% else %}
          {{ -9999 }}
        {% endif %}

      # ---- 體感溫度計算 (簡易加權) ----
      # 濕度 > 75% -> +1.5°C; > 60% -> +1.0°C; > 50% -> +0.5°C
      humidity_bonus_c: >
        {% if hp_humidity > 75 %} 1.5
        {% elif hp_humidity > 60 %} 1.0
        {% elif hp_humidity > 50 %} 0.5
        {% else %} 0 {% endif %}
      hp_temp_feels_like: "{{ hp_temp_base + humidity_bonus_c }}"

      hp_valid_now: >
        {% set obj_t = states.sensor['5f_homepodmini_temperature'] if states.sensor is defined else none %}
        {% set ts_t = as_timestamp(obj_t.last_changed) if obj_t and obj_t.last_changed else none %}
        {% set age_t = (now().timestamp() - ts_t) | int if ts_t else 999999 %}
        {% set obj_h = states.sensor['5f_homepodmini_humidity'] if states.sensor is defined else none %}
        {% set ts_h = as_timestamp(obj_h.last_changed) if obj_h and obj_h.last_changed else none %}
        {% set age_h = (now().timestamp() - ts_h) | int if ts_h else 999999 %}
        {{ (hp_temp_base != -9999) and (hp_temp_base > 10) and (hp_temp_base < 45) and (age_t < 3600) and
           (hp_humidity != -9999) and (hp_humidity > 0) and (hp_humidity <= 100) and (age_h < 3600) }}

      # 15 分內短暫失效 → 凍結溫控
      hp_soft_hold: >
        {% set obj_t = states.sensor['5f_homepodmini_temperature'] if states.sensor is defined else none %}
        {% set ts_t = as_timestamp(obj_t.last_changed) if obj_t and obj_t.last_changed else none %}
        {% set age_t = (now().timestamp() - ts_t) | int if ts_t else 999999 %}
        {% set obj_h = states.sensor['5f_homepodmini_humidity'] if states.sensor is defined else none %}
        {% set ts_h = as_timestamp(obj_h.last_changed) if obj_h and obj_h.last_changed else none %}
        {% set age_h = (now().timestamp() - ts_h) | int if ts_h else 999999 %}
        {{ (not hp_valid_now) and ((age_t < 900) or (age_h < 900)) }}

      # ---- 睡眠時段（夜間）：23:00–07:30 ----
      is_sleep: >
        {{ ('23:00' <= hhmm <= '23:59') or ('00:00' <= hhmm <= '07:30') }}

      # ---- 上樓必開門檻（固定 26.1°C）----
      enter_high_open_c_dyn: 26.1

      # ---- 快速升溫加權（AC 感溫跳升）----
      ac_rise_fast: >
        {% set has = (trigger is defined and trigger.to_state is defined and trigger.from_state is defined) %}
        {% if has and trigger.entity_id == 'climate.ding_lou_kong_diao' %}
          {{ (trigger.to_state.attributes.current_temperature | float(0))
             - (trigger.from_state.attributes.current_temperature | float(0)) >= ac_fast_rise_th_c }}
        {% else %} false {% endif %}

      # ---- AC 優先條件 ----
      # 規則A (新)：AC on 且 AC 溫度顯著高於體感溫度 (≥1.5°C) → 以 AC 為主
      ac_prio_override: >
        {{ ac_on and hp_valid_now and (ac_temp - hp_temp_feels_like >= 1.5) }}

      # 規則B (舊/保護)：AC on 且 ac_temp > 29，且（HP 無效 或 體感 < 28）→ 以 AC 為主 (清晨保護)
      ac_override_until_hp28: >
        {{ ac_on and (ac_temp > 29.0) and ( (not hp_valid_now) or (hp_temp_feels_like < 28.0) ) }}

      # 規則C (舊/保護)：AC on 且（AC+權重 - 體感）≥ 1.5 且 體感<28 → 以 AC 為主（HP 偏低保護）
      ac_hp_diff_override: >
        {{ ac_on and hp_valid_now and ( (ac_temp + ac_weight_add_c) - hp_temp_feels_like >= 1.5 ) and (hp_temp_feels_like < 28.0) }}

      # ---- 有效溫度 t_eff ----
      # 優先序：凍結 none → 規則A/B/C → 一般整合（AC: max(體感, AC+權重)+快速升溫；OFF: 體感 或退 AC）
      t_eff: >
        {% if hp_soft_hold %}
          none
        {% else %}
          {% if ac_prio_override or ac_override_until_hp28 or ac_hp_diff_override %}
            {{ (ac_temp + ac_weight_add_c + (ac_fast_rise_bonus_c if ac_rise_fast else 0)) | float }}
          {% else %}
            {% if ac_on %}
              {% set hp_use = (hp_temp_feels_like if hp_valid_now else none) %}
              {% set base = [ (hp_use if hp_use is not none else -9999), ac_temp + ac_weight_add_c ] | max %}
              {{ (base + (ac_fast_rise_bonus_c if ac_rise_fast else 0)) | float }}
            {% else %}
              {{ hp_temp_feels_like if hp_valid_now else ac_temp }}
            {% endif %}
          {% endif %}
        {% endif %}
      t_eff_valid: "{{ t_eff is not none }}"

      # ---- 風量曲線（日間基準；終極平滑 profile；≤2.5% 級距；0.2°C 階梯）----
      pct_base_day: >
        {% if not t_eff_valid %}
          {{ fan_pct_now }}
        {% else %}
          {% set t = t_eff | float %}
          {% if t >= 31.3 %} 100
          {% elif t >= 31.1 %} 97.5
          {% elif t >= 30.9 %} 95
          {% elif t >= 30.7 %} 92.5
          {% elif t >= 30.5 %} 90
          {% elif t >= 30.3 %} 87.5
          {% elif t >= 30.1 %} 85
          {% elif t >= 29.9 %} 82.5
          {% elif t >= 29.7 %} 80
          {% elif t >= 29.5 %} 77.5
          {% elif t >= 29.3 %} 75
          {% elif t >= 29.1 %} 72.5
          {% elif t >= 28.9 %} 70
          {% elif t >= 28.7 %} 67.5
          {% elif t >= 28.5 %} 65
          {% elif t >= 28.3 %} 62.5
          {% elif t >= 28.1 %} 60
          {% elif t >= 27.9 %} 57.5
          {% elif t >= 27.7 %} 55
          {% elif t >= 27.5 %} 52.5
          {% elif t >= 27.3 %} 50
          {% elif t >= 27.1 %} 47.5
          {% elif t >= 26.9 %} 45
          {% elif t >= 26.7 %} 42.5
          {% elif t >= 26.5 %} 40
          {% elif t >= 26.3 %} 37.5
          {% elif t >= 26.1 %} 35
          {% elif t >= 25.9 %} 32.5
          {% elif t >= 25.7 %} 30
          {% else %} 30 {% endif %}
        {% endif %}
      # 夜間 -5%，最低 25%
      pct_sleep_tuned: >
        {% if not t_eff_valid %}
          {{ pct_base_day }}
        {% else %}
          {% set p = (pct_base_day | float) - (5 if is_sleep else 0) %}
          {% set p2 = [p, 25] | max %}
          {{ p2 }}
        {% endif %}
      # 對齊到 2.5%（最後依 HA 要求轉 int）
      desired_pct_curve: >
        {% set p = pct_sleep_tuned | float %}
        {% set step = 2.5 %}
        {% set snapped = ((p / step) | round(0) * step) %}
        {{ [snapped, 100] | min }}

  - if:
      - condition: template
        value_template: "{{ t_eff_valid }}"
      - condition: template
        value_template: "{{ t_eff != states('input_number.rooftop_effective_apparent_temperature') | float(0) }}"
    then:
      - service: input_number.set_value
        target:
          entity_id: input_number.rooftop_effective_apparent_temperature
        data:
          value: "{{ t_eff }}"

  # 若自動模式關閉：只更新 Helper，不做後續控制
  - if:
      - condition: state
        entity_id: input_boolean.top_floor_fan_auto_mode
        state: "off"
    then:
      - stop: "Top-floor fan auto mode is off; skip control actions"

  # 0) 手動保留超時（1 小時）→ 恢復自動管理
  - choose:
      - conditions:
          - condition: template
            value_template: >
              {{ (trigger is defined)
                 and (trigger.entity_id == 'input_boolean.ding_lou_fan_manual_hold')
                 and (trigger.to_state is defined and trigger.to_state.state == 'on')
                 and (states('input_boolean.ding_lou_fan_manual_hold') == 'on') }}
        sequence:
          - service: input_boolean.turn_off
            target:
              entity_id: input_boolean.ding_lou_fan_manual_hold
          - if:
              - condition: template
                value_template: "{{ debug_notify }}"
            then:
              - service: notify.persistent_notification
                data:
                  title: "手動保留已自動解除（1 小時）"
                  message: "⏱️ 手動保留超過 1 小時，已恢復溫控自動判斷。"

  # 0) 外部/手動關機 → 清除回溫記憶（需 t_eff 有效且非過冷）
  - choose:
      - conditions:
          - condition: template
            value_template: >
              {{ (trigger is defined)
                 and (trigger.entity_id == 'fan.dmaker_p33_eabd_fan')
                 and (trigger.to_state is defined and trigger.to_state.state == 'off')
                 and (trigger.from_state is defined and trigger.from_state.state == 'on') }}
          - condition: template
            value_template: "{{ t_eff_valid and (t_eff | float >= night_cold_off_c) and is_state('input_boolean.ding_lou_fan_cold_off_memory', 'off') }}"
        sequence:
          - service: input_boolean.turn_off
            target:
              entity_id: input_boolean.ding_lou_fan_cold_off_memory
          - service: input_boolean.turn_off
            target:
              entity_id: input_boolean.ding_lou_fan_manual_hold
          - if:
              - condition: template
                value_template: "{{ debug_notify }}"
            then:
              - service: notify.persistent_notification
                data:
                  title: "已偵測外部/手動關機 → 清除回溫記憶"
                  message: >
                    📴 t_eff={{ '%.1f'|format(t_eff|float) }}°C ≥ 過冷門檻 {{ night_cold_off_c }}°C

  # 0.1) 手動保留期間關機 → 直接解除保留
  - choose:
      - conditions:
          - condition: template
            value_template: >
              {{ (trigger is defined)
                 and (trigger.entity_id == 'fan.dmaker_p33_eabd_fan')
                 and (trigger.to_state is defined and trigger.to_state.state == 'off')
                 and (trigger.from_state is defined and trigger.from_state.state == 'on') }}
          - condition: state
            entity_id: input_boolean.ding_lou_fan_manual_hold
            state: 'on'
        sequence:
          - service: input_boolean.turn_off
            target:
              entity_id: input_boolean.ding_lou_fan_manual_hold
          - if:
              - condition: template
                value_template: "{{ debug_notify }}"
            then:
              - service: notify.persistent_notification
                data:
                  title: "手動保留已提前解除"
                  message: "🙋‍♂️ 在手動保留期間關閉風扇，已立即解除保留狀態。"

  # 0.1) HP 短暫失效 → 凍結提示（僅 Debug）
  - if:
      - condition: template
        value_template: "{{ debug_notify and hp_soft_hold }}"
    then:
      - service: notify.persistent_notification
        data:
          title: "HomePod 溫濕度短暫失效（≤15 分）— 已凍結溫控"
          message: >
            ⚠️ hp_raw_temp={{ hp_raw_temp }}, hp_raw_humidity={{ hp_raw_humidity }}；15 分內不依溫/濕度做關/開與調速，避免誤判。

  # 1) 上樓情境（t_eff 有效才判斷；介於門檻至少 40%）
  - choose:
      - conditions:
          - condition: state
            entity_id: input_boolean.ding_lou_shang_lou_qing_jing
            state: "on"
          - condition: template
            value_template: "{{ t_eff_valid }}"
        sequence:
          - variables:
              t_enter: "{{ t_eff | float }}"
              high_open_c: "{{ enter_high_open_c_dyn }}"
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ t_enter >= high_open_c }}"
                sequence:
                  - service: fan.turn_on
                    target:
                      entity_id: fan.dmaker_p33_eabd_fan
                  - if:
                      - condition: template
                        value_template: "{{ debug_notify }}"
                    then:
                      - service: notify.persistent_notification
                        data:
                          title: "頂樓風扇自動開啟（上樓）"
                          message: >
                            🚶‍♂️ t_eff={{ '%.1f'|format(t_enter) }}°C ≥ {{ high_open_c }}°C
              - conditions:
                  - condition: template
                    value_template: "{{ t_enter <= enter_low_close_c }}"
                sequence: []
              - conditions: []
                sequence:
                  - choose:
                      - conditions:
                          - condition: state
                            entity_id: fan.dmaker_p33_eabd_fan
                            state: "off"
                        sequence:
                          - service: fan.turn_on
                            target:
                              entity_id: fan.dmaker_p33_eabd_fan
                          - service: fan.set_percentage
                            target:
                              entity_id: fan.dmaker_p33_eabd_fan
                            data:
                              percentage: >
                                {% set p = [40, (desired_pct_curve|float)] | max %}
                                {{ ((p / 2.5) | round(0) * 2.5) | int }}
                          - if:
                              - condition: template
                                value_template: "{{ debug_notify }}"
                            then:
                              - service: notify.persistent_notification
                                data:
                                  title: "頂樓風扇微風開啟（上樓介於門檻）"
                                  message: >
                                    🌡 t_eff={{ '%.1f'|format(t_enter) }}°C；
                                    風速≥40%，實際={{ desired_pct_curve }}%
                      - conditions:
                          - condition: state
                            entity_id: fan.dmaker_p33_eabd_fan
                            state: "on"
                        sequence:
                          - service: fan.set_percentage
                            target:
                              entity_id: fan.dmaker_p33_eabd_fan
                            data:
                              percentage: >
                                {{ ((desired_pct_curve|float / 2.5) | round(0) * 2.5) | int }}

  # 2) 手動開啟但低於門檻 → 暫停自動關閉 1 小時
  - choose:
      - conditions:
          - condition: template
            value_template: >
              {{ (trigger is defined)
                 and (trigger.entity_id == 'fan.dmaker_p33_eabd_fan')
                 and (trigger.to_state is defined and trigger.to_state.state == 'on')
                 and (trigger.from_state is defined and trigger.from_state.state == 'off') }}
          - condition: template
            value_template: "{{ t_eff_valid and (t_eff | float < night_cold_off_c) }}"
          - condition: template
            value_template: "{{ not manual_hold }}"
        sequence:
          - service: input_boolean.turn_on
            target:
              entity_id: input_boolean.ding_lou_fan_manual_hold
          - if:
              - condition: template
                value_template: "{{ debug_notify }}"
            then:
              - service: notify.persistent_notification
                data:
                  title: "手動開啟 — 已啟用保留 1 小時"
                  message: >
                    🙋‍♂️ t_eff={{ '%.1f'|format(t_eff|float) }}°C 低於 {{ night_cold_off_c }}°C；為避免立即自動關閉，已暫時保留 1 小時。

  # 3) 任意時段「過冷關機」：需 t_eff 有效；執行後本輪 stop 防回彈
  - choose:
      - conditions:
          - condition: state
            entity_id: fan.dmaker_p33_eabd_fan
            state: "on"
          - condition: template
            value_template: "{{ t_eff_valid and (t_eff | float < night_cold_off_c) }}"
          - condition: template
            value_template: "{{ not manual_hold }}"
        sequence:
          - service: fan.turn_off
            target:
              entity_id: fan.dmaker_p33_eabd_fan
          - service: input_boolean.turn_on
            target:
              entity_id: input_boolean.ding_lou_fan_cold_off_memory
          - if:
              - condition: template
                value_template: "{{ debug_notify }}"
            then:
              - service: notify.persistent_notification
                data:
                  title: "頂樓風扇自動關閉（過冷）"
                  message: >
                    🌙 t_eff={{ '%.1f'|format(t_eff|float) }}°C < 門檻 {{ night_cold_off_c }}°C（記憶=on）
          - stop: "Stopped after cold_off to avoid immediate reopen in same run"

  # 4) 任意時段「回溫再開」：記憶=on 且 t_eff ≥ 門檻
  - choose:
      - conditions:
          - condition: state
            entity_id: fan.dmaker_p33_eabd_fan
            state: "off"
          - condition: state
            entity_id: input_boolean.ding_lou_fan_cold_off_memory
            state: "on"
          - condition: template
            value_template: "{{ t_eff_valid and (t_eff | float >= morning_reopen_c) }}"
        sequence:
          - service: fan.turn_on
            target:
              entity_id: fan.dmaker_p33_eabd_fan
          - service: input_boolean.turn_off
            target:
              entity_id: input_boolean.ding_lou_fan_cold_off_memory
          - if:
              - condition: template
                value_template: "{{ debug_notify }}"
            then:
              - service: notify.persistent_notification
                data:
                  title: "頂樓風扇自動開啟（回溫）"
                  message: >
                    ☀️ t_eff={{ '%.1f'|format(t_eff|float) }}°C ≥ {{ morning_reopen_c }}°C（清除記憶）

  # 4) 冷氣開啟 → 風扇同步 on（凍結與否皆可執行）
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ ac_on and not is_state('fan.dmaker_p33_eabd_fan','on') }}"
        sequence:
          - service: fan.turn_on
            target:
              entity_id: fan.dmaker_p33_eabd_fan
          - if:
              - condition: template
                value_template: "{{ debug_notify }}"
            then:
              - service: notify.persistent_notification
                data:
                  title: "頂樓風扇自動開啟（冷氣同步）"
                  message: "❄️ 冷氣=COOL，ac_temp={{ ac_temp }}°C"

  # 5) 自動調速（差≥5% 才調；凍結時不調）
  - if:
      - condition: state
        entity_id: fan.dmaker_p33_eabd_fan
        state: "on"
      - condition: template
        value_template: "{{ t_eff_valid }}"
    then:
      - variables:
          desired_pct: "{{ ((desired_pct_curve|float / 2.5) | round(0) * 2.5) | int }}"
          need_update: "{{ (desired_pct - fan_pct_now) | abs >= 5 }}"
      - if:
          - condition: template
            value_template: "{{ need_update }}"
        then:
          - service: fan.set_percentage
            target:
              entity_id: fan.dmaker_p33_eabd_fan
            data:
              percentage: "{{ desired_pct }}"
          - if:
              - condition: template
                value_template: "{{ debug_notify }}"
            then:
              - service: notify.persistent_notification
                data:
                  title: "頂樓風扇風速調整"
                  message: >
                    🔄 新風速={{ desired_pct }}%｜t_eff={{ '%.1f'|format(t_eff|float) }}°C
