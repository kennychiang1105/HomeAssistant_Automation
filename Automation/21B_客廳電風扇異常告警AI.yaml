# ─────────────────────────────────────────────────────────────
# 21B_客廳電風扇異常告警AI (V2 Beta 3)   （Helpers V2.6 相容）
# 更新重點（相對 V2 Beta 2）：
# 1) LINE 通知格式：改用 script.send_line_to_user 的 JSON payload 並引用 Helpers 標題，避免 Unknown。
#
# 前版更新（V1 Beta 2 → V2 Beta 2）：
# 1) 版本號升級：升級至 V2 Beta 2，與 Helper V2.2 同步，並統一更新日誌格式。
# 2) 命名修正：修正 alias 以符合檔案名稱格式。
# 更新重點（V2 Beta 4）：
# 1) LINE 通知目標改讀 sensor.line_bot_target_user_id，支援測試模式與自訂 ID 覆蓋。
# ─────────────────────────────────────────────────────────────

alias: 21B_客廳電風扇異常告警AI (V2 Beta 4)
id: ai_living_room_fan_anomaly_alert
description: "當風扇在自動模式下離線或關閉時發出警報"
mode: single

variables:
  automation_version: "V2.0.0-beta.4"
  line_bot_target_user_id: "{{ states('sensor.line_bot_target_user_id') }}"

triggers:
  - platform: state
    entity_id: fan.ke_ting_dian_feng_shan
    to: unavailable
    for:
      minutes: 1
    id: became_unavailable
  - platform: state
    entity_id: fan.ke_ting_dian_feng_shan
    to: "off"
    for:
      seconds: 10
    id: turned_off

condition:
  - condition: or
    conditions:
      # 條件一：風扇直接變為 unavailable
      - condition: trigger
        id: became_unavailable
      # 條件二：風扇被關閉，且「防關閉模式」是開啟的
      - condition: and
        conditions:
          - condition: trigger
            id: turned_off
          - condition: state
            entity_id: input_boolean.living_room_fan_prevent_off_mode
            state: "on"
          - condition: state
            entity_id: timer.living_room_fan_light_sync_snooze
            state: idle

actions:
  - data:
      message: "智慧家庭警告: 客廳電風扇電源連線異常，請確認！"
    action: notify.persistent_notification
    enabled: true
  - if:
      - condition: state
        entity_id: input_boolean.notify_line_important_enable
        state: "on"
    then:
      - service: script.send_line_to_user
        data:
          user_id: "{{ line_bot_target_user_id }}"
          payload: >-
            {{
              [
                {"type":"text","text":"【智慧家庭通知】重要 Important ❗"},
                {"type":"text","text":"⚠️智慧家庭告警:\n🛜客廳電風扇電源連線異常 🔴，\n請確認 ⚡ ⚠️"}
              ] | tojson
            }}
  - if:
      - condition: device
        type: is_on
        device_id: fdcccfa405461070717b80a56a590960
        entity_id: 61eaa5fb8386221ba077bcb884e74573
        domain: remote
    then:
      - parallel:
          - data:
              volume_level: 0.8
            action: media_player.volume_set
            target:
              entity_id: media_player.ke_ting_homepod
          - data:
              message: "智慧家庭警告: 客廳電風扇電源連線異常，請確認！"
              title: 智慧家庭告警
            action: notify.persistent_notification
          - data:
              volume_level: 0.15
            target:
              entity_id: media_player.sony_bravia_tv
            action: media_player.volume_set
      - data:
          media:
            media_content_id: https://jnas916p.synology.me:8126/local/CWBEEW.mp3
            media_content_type: music
            metadata: {}
        target:
          entity_id:
            - media_player.guang_bo_qun_zu_tong_zhi
            - media_player.sonydian_shi
        action: media_player.play_media
      - delay:
          hours: 0
          minutes: 0
          seconds: 13
          milliseconds: 0
        enabled: true
      - parallel:
          - data:
              message: >-
                智慧家庭警告: 客廳電風扇電源連線異常，請確認！智慧家庭警告: 客廳電風扇電源連線異常，請確認！智慧家庭警告:
                客廳電風扇電源連線異常，請確認！
              media_player_entity_id: media_player.guang_bo_qun_zu_tong_zhi
              cache: true
            action: tts.speak
            metadata: {}
            target:
              device_id: c01a1336ef43795fd0679631c3e6ce62
          - data:
              message: >-
                智慧家庭警告: 客廳電風扇電源連線異常，請確認！智慧家庭警告: 客廳電風扇電源連線異常，請確認！智慧家庭警告:
                客廳電風扇電源連線異常，請確認！
              media_player_entity_id: media_player.sonydian_shi
              cache: true
            action: tts.speak
            metadata: {}
            target:
              device_id: c01a1336ef43795fd0679631c3e6ce62
      - delay:
          hours: 0
          minutes: 0
          seconds: 25
          milliseconds: 0
      - repeat:
          until:
            - condition: state
              entity_id: media_player.sony_bravia_tv
              attribute: media_title
              state: TATV-8000
          sequence:
            - data:
                command: Hdmi1
              target:
                device_id: fdcccfa405461070717b80a56a590960
              action: remote.send_command
            - delay:
                hours: 0
                minutes: 0
                seconds: 1
                milliseconds: 0
      - data:
          command: Confirm
        target:
          device_id: fdcccfa405461070717b80a56a590960
        enabled: true
        action: remote.send_command
      - data:
          volume_level: 0.5
        action: media_player.volume_set
        target:
          entity_id: media_player.ke_ting_homepod
    else:
      - parallel:
          - type: turn_on
            device_id: fdcccfa405461070717b80a56a590960
            entity_id: 61eaa5fb8386221ba077bcb884e74573
            domain: remote
      - parallel:
          - data:
              volume_level: 0.8
            action: media_player.volume_set
            target:
              entity_id: media_player.ke_ting_homepod
          - data:
              message: "智慧家庭警告: 客廳電風扇電源連線異常，請確認！"
              title: 智慧家庭告警
            action: notify.persistent_notification
          - data:
              volume_level: 0.15
            target:
              entity_id: media_player.sony_bravia_tv
            action: media_player.volume_set
      - data:
          media:
            media_content_id: https://jnas916p.synology.me:8126/local/CWBEEW.mp3
            media_content_type: music
            metadata: {}
        target:
          entity_id:
            - media_player.guang_bo_qun_zu_tong_zhi
        action: media_player.play_media
      - delay:
          hours: 0
          minutes: 0
          seconds: 13
          milliseconds: 0
        enabled: true
      - parallel:
          - data:
              message: >-
                智慧家庭警告: 客廳電風扇電源連線異常，請確認！智慧家庭警告: 客廳電風扇電源連線異常，請確認！智慧家庭警告:
                客廳電風扇電源連線異常，請確認！
              media_player_entity_id: media_player.guang_bo_qun_zu_tong_zhi
              cache: true
            action: tts.speak
            metadata: {}
            target:
              device_id: c01a1336ef43795fd0679631c3e6ce62
          - data:
              message: >-
                智慧家庭警告: 客廳電風扇電源連線異常，請確認！智慧家庭警告: 客廳電風扇電源連線異常，請確認！智慧家庭警告:
                客廳電風扇電源連線異常，請確認！
              media_player_entity_id: media_player.sonydian_shi
              cache: true
            action: tts.speak
            metadata: {}
            target:
              device_id: c01a1336ef43795fd0679631c3e6ce62
      - delay:
          hours: 0
          minutes: 0
          seconds: 25
          milliseconds: 0
      - repeat:
          until:
            - condition: state
              entity_id: media_player.sony_bravia_tv
              attribute: media_title
              state: TATV-8000
          sequence:
            - data:
                command: Hdmi1
              target:
                device_id: fdcccfa405461070717b80a56a590960
              action: remote.send_command
            - delay:
                hours: 0
                minutes: 0
                seconds: 1
                milliseconds: 0
      - data:
          command: Confirm
        target:
          device_id: fdcccfa405461070717b80a56a590960
        enabled: true
        action: remote.send_command
      - type: turn_off
        device_id: fdcccfa405461070717b80a56a590960
        entity_id: 61eaa5fb8386221ba077bcb884e74573
        domain: remote
      - delay:
          hours: 0
          minutes: 0
          seconds: 30
          milliseconds: 0
        enabled: true
      - type: turn_off
        device_id: fdcccfa405461070717b80a56a590960
        entity_id: 61eaa5fb8386221ba077bcb884e74573
        domain: remote
      - repeat:
          until:
            - condition: state
              entity_id: media_player.sony_bravia_tv
              state: "off"
          sequence:
            - type: turn_off
              device_id: fdcccfa405461070717b80a56a590960
              entity_id: 61eaa5fb8386221ba077bcb884e74573
              domain: remote
      - data:
          volume_level: 0.5
        action: media_player.volume_set
        target:
          entity_id: media_player.ke_ting_homepod
