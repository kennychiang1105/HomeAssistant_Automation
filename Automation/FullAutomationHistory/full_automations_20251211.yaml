                    - condition: template
                      value_template: "{{ (not upstairs_present_down) and lights_off_or_dim
                        and\n   ((as_timestamp(now()) - __start_cam_dn) >= 20) }}\n"
                    - condition: template
                      value_template: '{{ upstairs_present_down or (not lights_off_or_dim)
                        }}

                        '
                  sequence:
                  - delay: 00:00:05
                  - choose:
                    - conditions:
                      - condition: template
                        value_template: '{{ upstairs_present_down or (not lights_off_or_dim)
                          }}

                          '
                      sequence:
                      - variables:
                          __start_cam_dn: '{{ as_timestamp(now()) }}'
              - choose:
                - conditions:
                  - condition: template
                    value_template: "{{ (not upstairs_present_down) and lights_off_or_dim
                      and\n   ((as_timestamp(now()) - __start_cam_dn) >= 20) }}\n"
                  sequence:
                  - action: input_boolean.turn_on
                    target:
                      entity_id: input_boolean.ding_lou_xia_lou_qing_jing_kenny
                  - action: input_boolean.turn_off
                    target:
                      entity_id: input_boolean.ding_lou_shang_lou_qing_jing_kenny
                  - action: timer.start
                    target:
                      entity_id: timer.topfloor_lock_after_down
                    data:
                      duration: 90
                  - action: input_text.set_value
                    target:
                      entity_id: input_text.topfloor_debug_last_decision
                    data:
                      value: 下樓成立（視窗內 20s 連續燈關/極暗）
                  - choose:
                    - conditions:
                      - condition: template
                        value_template: '{{ debug_on }}'
                      sequence:
                      - action: persistent_notification.create
                        data:
                          title: '[DEBUG] 決策'
                          message: 下樓成立（視窗內 20s 連續燈關/極暗）
                  - stop: 下樓成立（視窗內）
          - delay: 00:00:10
      - choose:
        - conditions:
          - condition: state
            entity_id: timer.topfloor_lock_after_down
            state: idle
          - condition: template
            value_template: '{{ tail_grace_up_sec|int > 0 }}'
          - condition: template
            value_template: '{{ lights_all_off }}'
          - condition: template
            value_template: '{{ not sleep_silent_active }}'
          sequence:
          - wait_template: "{{ upstairs_present_up and ((not recent_light_off) or
              dark_15s) and\n   (not guard_active) and lights_all_off and (not sleep_silent_active)
              }}\n"
            timeout: '{{ ''%02d:%02d:%02d''|format((tail_grace_up_sec//3600), ((tail_grace_up_sec%3600)//60),
              (tail_grace_up_sec%60)) }}

              '
            continue_on_timeout: true
          - choose:
            - conditions:
              - condition: template
                value_template: '{{ wait.completed }}'
              sequence:
              - action: input_boolean.turn_on
                target:
                  entity_id: input_boolean.ding_lou_shang_lou_qing_jing_kenny
              - action: input_boolean.turn_off
                target:
                  entity_id: input_boolean.ding_lou_xia_lou_qing_jing_kenny
              - action: timer.start
                target:
                  entity_id: timer.topfloor_lock_after_up
                data:
                  duration: 90
              - action: input_text.set_value
                target:
                  entity_id: input_text.topfloor_debug_last_decision
                data:
                  value: 上樓成立（尾隨寬限，全黑 + 非睡眠窗，黑≥15s 或非剛關燈）
              - choose:
                - conditions:
                  - condition: template
                    value_template: '{{ debug_on }}'
                  sequence:
                  - action: persistent_notification.create
                    data:
                      title: '[DEBUG] 決策'
                      message: 上樓成立（尾隨寬限，全黑 + 非睡眠窗，黑≥15s 或非剛關燈）
              - stop: 上樓成立（尾隨寬限）
      - choose:
        - conditions:
          - condition: state
            entity_id: timer.topfloor_lock_after_up
            state: idle
          - condition: template
            value_template: '{{ tail_grace_down_sec|int > 0 }}'
          sequence:
          - wait_template: '{{ (not upstairs_present_down) and lights_off_or_dim }}'
            timeout: '{{ ''%02d:%02d:%02d''|format((tail_grace_down_sec//3600), ((tail_grace_down_sec%3600)//60),
              (tail_grace_down_sec%60)) }}

              '
            continue_on_timeout: true
          - choose:
            - conditions:
              - condition: template
                value_template: '{{ wait.completed }}'
              sequence:
              - action: input_boolean.turn_on
                target:
                  entity_id: input_boolean.ding_lou_xia_lou_qing_jing_kenny
              - action: input_boolean.turn_off
                target:
                  entity_id: input_boolean.ding_lou_shang_lou_qing_jing_kenny
              - action: timer.start
                target:
                  entity_id: timer.topfloor_lock_after_down
                data:
                  duration: 90
              - action: input_text.set_value
                target:
                  entity_id: input_text.topfloor_debug_last_decision
                data:
                  value: 下樓成立（尾隨寬限）
              - choose:
                - conditions:
                  - condition: template
                    value_template: '{{ debug_on }}'
                  sequence:
                  - action: persistent_notification.create
                    data:
                      title: '[DEBUG] 決策'
                      message: 下樓成立（尾隨寬限）
              - stop: 下樓成立（尾隨寬限）
  mode: restart
  max: 10
  variables:
    iphone_entity: '{% set s = states(''input_text.iphone_tracker_entity_kenny'')
      %} {{ ''device_tracker.iphone_17_pro_max_kenny'' if s in [''unknown'',''unavailable'','''']
      else s }}

      '
    watch_entity: '{% set s = states(''input_text.watch_tracker_entity_kenny'') %}
      {{ ''device_tracker.apple_watch_ultra_3_kenny'' if s in [''unknown'',''unavailable'','''']
      else s }}

      '
    ap_list_raw: '{% set s = states(''input_text.topfloor_ap_macs_5f'') %} {{ ''70:a7:41:e4:54:1f,70:a7:41:e4:5a:bf,d0:21:f9:f2:fc:4c''
      if s in [''unknown'',''unavailable'',''''] else s }}

      '
    ap_list: '{{ ap_list_raw | lower | replace('' '','''') | replace('';'','','')
      | regex_findall(''[^,]+'') }}

      '
    iphone_ap: '{{ (state_attr(iphone_entity, ''ap_mac'') | default('''')) | lower
      }}'
    watch_ap: '{{ (state_attr(watch_entity,  ''ap_mac'') | default('''')) | lower
      }}'
    upstairs_phone_raw: '{{ iphone_ap in ap_list }}'
    upstairs_watch: '{{ watch_ap in ap_list }}'
    iphone_ap_valid: '{{ iphone_ap not in ['''', ''unknown'', ''unavailable'', none]
      }}'
    upstairs_present_up: '{{ upstairs_phone_raw or upstairs_watch }}'
    upstairs_present_down: "{% if iphone_ap_valid %}\n  {{ upstairs_phone_raw }}\n{%
      else %}\n  true\n{% endif %}\n"
    lamp1_on: '{{ is_state(''light.yeelink_lamp2_678c_light'', ''on'') }}'
    lamp2_on: '{{ is_state(''light.yeelink_bslamp2_4329_light'', ''on'') }}'
    lamp2_bri: '{{ (state_attr(''light.yeelink_bslamp2_4329_light'', ''brightness'')
      | int(0)) }}'
    lights_all_off: '{{ (not lamp1_on) and (not lamp2_on) }}'
    lights_off_or_dim: '{{ (not lamp1_on) and (not lamp2_on or lamp2_bri <= 3) }}'
    light_off_cooldown_sec: '{{ states(''input_number.topfloor_light_off_cooldown_sec_kenny'')|int(30)
      }}'
    recent_light_off: '{% set now_ts = as_timestamp(now()) %} {% set l1 = states.light.yeelink_lamp2_678c_light
      %} {% set l2 = states.light.yeelink_bslamp2_4329_light %} {% set off1 = (l1.state
      == ''off'') and ((now_ts - as_timestamp(l1.last_changed)) < (light_off_cooldown_sec|int))
      %} {% set off2 = (l2.state == ''off'') and ((now_ts - as_timestamp(l2.last_changed))
      < (light_off_cooldown_sec|int)) %} {{ off1 or off2 }}

      '
    dark_15s: '{% set now_ts = as_timestamp(now()) %} {% set l1 = states.light.yeelink_lamp2_678c_light
      %} {% set l2 = states.light.yeelink_bslamp2_4329_light %} {% set l1_ok = (l1.state
      == ''off'') and ((now_ts - as_timestamp(l1.last_changed)) >= 15) %} {% set l2_ok
      = ((l2.state == ''off'') or ((state_attr(''light.yeelink_bslamp2_4329_light'',''brightness'')|int(0))
      <= 3)) and ((now_ts - as_timestamp(l2.last_changed)) >= 15) %} {{ l1_ok and
      l2_ok }}

      '
    monitor_window_sec: '{{ (states(''input_number.topfloor_cam_window_min_kenny'')|int(6))
      * 60 }}'
    tail_grace_up_sec: '{{ (states(''input_number.topfloor_tail_grace_up_min_kenny'')|int(3))
      * 60 }}'
    tail_grace_down_sec: '{{ (states(''input_number.topfloor_tail_grace_down_min_kenny'')|int(3))
      * 60 }}'
    up_stable_hms: 00:00:15
    down_stable_hms: 00:00:20
    down_no_light_grace_sec: '{{ states(''input_number.topfloor_down_no_light_grace_sec_kenny'')|int(120)
      }}'
    down_no_light_hms: '{{ ''%02d:%02d:%02d''|format((down_no_light_grace_sec//3600),
      ((down_no_light_grace_sec%3600)//60), (down_no_light_grace_sec%60)) }}

      '
    down_assist_wait_sec: '{{ states(''input_number.topfloor_down_assist_wait_sec_kenny'')|int(180)
      }}'
    down_assist_hms: '{{ ''%02d:%02d:%02d''|format((down_assist_wait_sec//3600), ((down_assist_wait_sec%3600)//60),
      (down_assist_wait_sec%60)) }}

      '
    lamp_was_on_recently: '{% set now_ts = as_timestamp(now()) %} {% set l1 = states.light.yeelink_lamp2_678c_light
      %} {% set l2 = states.light.yeelink_bslamp2_4329_light %} {% set on1 = (l1.state
      == ''on'') or ((now_ts - as_timestamp(l1.last_changed)) < 60 and l1.state ==
      ''off'') %} {% set on2 = (l2.state == ''on'') or ((now_ts - as_timestamp(l2.last_changed))
      < 60 and l2.state == ''off'') %} {{ on1 or on2 }}

      '
    sleep_silent_start_min: '{{ states(''input_number.sleep_silent_start_min'')|int(150)
      }}'
    sleep_silent_end_min: '{{ states(''input_number.sleep_silent_end_min'')|int(540)
      }}'
    _now_minute_of_day: '{{ now().hour*60 + now().minute }}'
    sleep_silent_active: "{% set s = sleep_silent_start_min|int %} {% set e = sleep_silent_end_min|int
      %} {% set n = _now_minute_of_day|int %} {% if s <= e %}\n  {{ n >= s and n <
      e }}\n{% else %}\n  {{ n >= s or  n < e }}\n{% endif %}\n"
    guard_active: '{{ not is_state(''timer.topfloor_down_intent_guard'',''idle'')
      }}'
    lock_up_active: '{{ not is_state(''timer.topfloor_lock_after_up'',''idle'') }}'
    lock_down_active: '{{ not is_state(''timer.topfloor_lock_after_down'',''idle'')
      }}'
    debug_on: '{{ is_state(''input_boolean.debug_topfloor_kenny'', ''on'') }}'
- &id003
  id: automation.100b_ai_leave_v1beta9
  alias: 100B自動離家AI_Beta (V1 Beta 9)
  description: ''
  triggers:
  - entity_id: device_tracker.iphone_17_pro_max_kenny
    to: not_home
    for:
      seconds: 10
    trigger: state
  - entity_id: device_tracker.iphone_13_pro_max_iris_2
    to: not_home
    for:
      seconds: 10
    trigger: state
  - entity_id: device_tracker.iphone_16_jerry
    to: not_home
    for:
      seconds: 10
    trigger: state
  - entity_id: device_tracker.unifi_16_cc_a1_4d_4f_42_default
    to: not_home
    for:
      seconds: 10
    trigger: state
  conditions:
  - condition: and
    conditions:
    - condition: state
      entity_id: device_tracker.unifi_16_cc_a1_4d_4f_42_default
      state: not_home
    - condition: state
      entity_id: device_tracker.iphone_17_pro_max_kenny
      state: not_home
    - condition: state
      entity_id: device_tracker.iphone_13_pro_max_iris_2
      state: not_home
    - condition: state
      entity_id: device_tracker.iphone_16_jerry
      state: not_home
  - condition: or
    conditions:
    - condition: not
      conditions:
      - condition: state
        entity_id: device_tracker.unifi_16_cc_a1_4d_4f_42_default
        state: not_home
        for:
          minutes: 10
    - condition: not
      conditions:
      - condition: state
        entity_id: device_tracker.iphone_17_pro_max_kenny
        state: not_home
        for:
          minutes: 10
    - condition: not
      conditions:
      - condition: state
        entity_id: device_tracker.iphone_13_pro_max_iris_2
        state: not_home
        for:
          minutes: 10
    - condition: not
      conditions:
      - condition: state
        entity_id: device_tracker.iphone_16_jerry
        state: not_home
        for:
          minutes: 10
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ not debounce_ok }}'
      sequence:
      - stop: 防抖中（{{ debounce_sec }} 秒內重複觸發）—已跳過通知
  - event: ai_leave_confirmed
    event_data:
      who: kenny
      reason: automation.100b_ai_leave_v1beta9 conditions passed — {{ automation_version
        }} / {{ helpers_compat }}
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ states(''alarm_control_panel.54ef44cf58f9_alarm'') !=
          ''armed_away'' }}

          '
      sequence:
      - target:
          entity_id: automation.101li_jia_qing_jing
        data:
          skip_condition: true
        action: automation.trigger
      - wait_template: '{{ states(''alarm_control_panel.54ef44cf58f9_alarm'') == ''armed_away''
          }}

          '
        timeout: 00:00:{{ arm_away_timeout_sec }}
        continue_on_timeout: true
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ states(''alarm_control_panel.54ef44cf58f9_alarm'')
              != ''armed_away'' }}

              '
          sequence:
          - data:
              title: '{{ notif_title_urgent }}'
              message: "{{\n  {\n    \"messages\": [\n      {\"type\":\"text\",\"text\":
                notif_title_urgent},\n      {\"type\":\"text\",\"text\": \"已判定離家，已執行離家情境，但保全系統未成功設定外出模式（目前狀態：\"\n
                \                            ~ states('alarm_control_panel.54ef44cf58f9_alarm')
                ~ \"）。\"},\n      {\"type\":\"text\",\"text\": batt_line_text if batt_line_text|trim
                else \"（無門鎖電量異常）\"}\n    ]\n  } | tojson\n}}"
            action: notify.line_bot_chiangfamilygroup
  - choose:
    - conditions:
      - condition: and
        conditions:
        - condition: state
          entity_id: cover.garage
          state: closed
        - condition: or
          conditions:
          - condition: state
            entity_id: input_boolean.er_lou_men_suo_tong_bu_kai_guan
            state: 'off'
          - condition: template
            value_template: '{{ batt0 }}'
        - condition: state
          entity_id: alarm_control_panel.54ef44cf58f9_alarm
          state: armed_away
      sequence:
      - data:
          title: '{{ notif_title_general }}'
          message: '{{ line_payload_general }}'
        action: notify.line_bot_chiangfamilygroup
    - conditions:
      - condition: and
        conditions:
        - condition: template
          value_template: '{% set garage_open = is_state(''cover.garage'',''open'')
            %} {% set lock_on = is_state(''input_boolean.er_lou_men_suo_tong_bu_kai_guan'',''on'')
            %} {{ garage_open or (lock_on and (not batt0)) }}'
        - condition: state
          entity_id: alarm_control_panel.54ef44cf58f9_alarm
          state: armed_away
      sequence:
      - data:
          title: '{{ notif_title_urgent }}'
          message: '{{ line_payload_urgent }}'
        action: notify.line_bot_chiangfamilygroup
  mode: single
  variables:
    automation_version: V1 Beta 9
    helpers_compat: Helpers V1 Beta 13
    notif_title_base: 【AI離家系統 V1 Beta 9】
    notif_title_general: "{{ notif_title_base }}\n一般 General \U0001FAA7"
    notif_title_urgent: '{{ notif_title_base }}

      緊急 Urgent ‼️'
    debounce_sec: 120
    debounce_ok: '{% set last = state_attr(this.entity_id, ''last_triggered'') %}
      {% set delta = (as_timestamp(now()) - as_timestamp(last)) if last else 999999
      %} {{ delta > debounce_sec }}'
    arm_away_timeout_sec: 5
    doorlock_batt: '{{ states(''sensor.ke_ting_men_suo_dian_liang_guo_lu'')|float(-1)
      }}'
    batt_valid: '{{ doorlock_batt >= 0 }}'
    batt50: '{{ batt_valid and doorlock_batt < 50 }}'
    batt10: '{{ batt_valid and doorlock_batt < 10 }}'
    batt0: '{{ batt_valid and doorlock_batt < 1 }}'
    batt_line_text: "{% if not batt_valid %} 門鎖電量摘要： • 資料暫無（gateway 尚未回報） {% else
      %} {% set lines = [] %} {% if batt50 %}{% set lines = lines + ['• 客廳門鎖電量：' ~
      (doorlock_batt|round(0)) ~ '%'] %}{% endif %} {% if batt10 %}{% set lines =
      lines + ['• ⚠️ 電量<10%：「自動離家」與「網關系統」可能異常'] %}{% endif %} {% if batt0  %}{% set
      lines = lines + ['• \U0001F7E5 完全沒電（0%）：已排除客廳門鎖狀態檢查，請儘速更換電池'] %}{% endif %}
      {% if lines|length > 0 %} 門鎖電量摘要： {{ lines | join('\\n') }} {% else %}{{ ''
      }}{% endif %} {% endif %}"
    line_payload_general: "{{\n  {\n    \"messages\": (\n      [ {\"type\":\"text\",\"text\":
      notif_title_general},\n        {\"type\":\"text\",\"text\":\"系統偵測所有人已離家，家電皆為關閉狀態，且門鎖皆已上鎖，已啟動離家模式。\"}
      ] +\n      ( [ {\"type\":\"text\",\"text\": batt_line_text } ] if batt_line_text|trim
      else [] )\n    )\n  } | tojson\n}}"
    line_payload_urgent: "{{\n  {\n    \"messages\": (\n      [ {\"type\":\"text\",\"text\":
      notif_title_urgent},\n        {\"type\":\"text\",\"text\":\"系統偵測所有人已離家，家電皆為關閉狀態但門鎖尚未上鎖！請確認鐵門及二樓門鎖狀況！\"}
      ] +\n      ( [ {\"type\":\"text\",\"text\": batt_line_text } ] if batt_line_text|trim
      else [] )\n    )\n  } | tojson\n}}"
