- id: '1695260104831'
  alias: 03E苗栗疏散警報
  description: ''
  triggers:
  - entity_id: sensor.disaster
    attribute: updated
    trigger: state
  conditions:
  - condition: time
    after: 06:00:00
    before: '22:00:00'
    enabled: false
  - condition: template
    value_template: '{{ ''疏散'' in states.sensor.disaster.state }}'
  - condition: template
    value_template: '{{ ''苗栗'' in states.sensor.disaster.state }}'
  - condition: template
    value_template: '{{ (as_timestamp(now()) - as_timestamp(states(''sensor.disaster_last_valid_update'')))
      < 300 }}'
  actions:
  - if:
    - condition: device
      type: is_on
      device_id: fdcccfa405461070717b80a56a590960
      entity_id: 61eaa5fb8386221ba077bcb884e74573
      domain: remote
    then:
    - parallel:
      - data:
          skip_condition: true
        target:
          entity_id: automation.jin_ji_mo_shi
        action: automation.trigger
      - data:
          volume_level: 0.65
        target:
          entity_id:
          - media_player.ke_ting_homepod
          - media_player.ding_lou_homepod
        action: media_player.volume_set
      - data:
          message: "{\n  \"messages\":[\n      {\n          \"type\":\"text\",\n          \"text\":\"【災防系統通知】緊急
            Urgent ‼️\\n\U0001F30D 疏散避難警報 Evacuation Alarm\"\n      },\n      {\n
            \         \"type\":\"text\",\n          \"text\":\" 政府發布疏散避難警報:\"\n      },\n
            \     {\n          \"type\":\"text\",\n          \"text\":\"{{ states('sensor.disaster')
            }}\"\n      }\n  ]\n}\n"
        enabled: true
        action: notify.line_bot_chiangfamilygroup
      - data:
          message: "政府發布疏散避難警報: \n\n{{ states('sensor.disaster') }}"
        enabled: true
        action: persistent_notification.create
      - data:
          volume_level: 0.15
        target:
          entity_id: media_player.sony_bravia_tv
        action: media_player.volume_set
    - data:
        media:
          media_content_id: https://jnas916p.synology.me:8126/local/CWBEEW.mp3
          media_content_type: music
          metadata: {}
      enabled: true
      target:
        entity_id: media_player.guang_bo_qun_zu_all
      action: media_player.play_media
    - delay:
        hours: 0
        minutes: 0
        seconds: 13
        milliseconds: 0
      enabled: true
    - data:
        message: 災防系統通知 政府發布緊急疏散避難警報 {{ states('sensor.disaster') }}
        media_player_entity_id: media_player.guang_bo_qun_zu_all
        cache: true
      enabled: true
      action: tts.speak
      metadata: {}
      target:
        device_id: c01a1336ef43795fd0679631c3e6ce62
    - delay:
        hours: 0
        minutes: 0
        seconds: 30
        milliseconds: 0
      enabled: true
    - data:
        media:
          media_content_id: https://jnas916p.synology.me:8126/local/CWBEEW.mp3
          media_content_type: music
          metadata: {}
      enabled: true
      target:
        entity_id: media_player.guang_bo_qun_zu_all
      action: media_player.play_media
    - delay:
        hours: 0
        minutes: 0
        seconds: 10
        milliseconds: 0
      enabled: true
    - data:
        message: 災防系統通知 政府發布緊急疏散避難警報 {{ states('sensor.disaster') }}
        media_player_entity_id: media_player.guang_bo_qun_zu_all
        cache: true
      enabled: true
      action: tts.speak
      metadata: {}
      target:
        device_id: c01a1336ef43795fd0679631c3e6ce62
    - delay:
        hours: 0
        minutes: 0
        seconds: 25
        milliseconds: 0
    - repeat:
        until:
        - condition: state
          entity_id: media_player.sony_bravia_tv
          attribute: media_title
          state: TATV-8000
        sequence:
        - data:
