  id: 104-2_lpr_ai_beta
  alias: 104-2車牌辨識AI_Beta (V1 Beta 1)
  description: '兩輛車（EAK8030、REA9519）— 多 Webhook；即時門控監測；可取消式關門評估； UI 可切換「只通知 / 實際關門」。不含加密。

    '
  triggers:
  - id: t_eak8030
    webhook_id: lpr_gate_eak8030
    allowed_methods:
    - GET
    - POST
    local_only: false
    trigger: webhook
  - id: t_rea9519
    webhook_id: lpr_gate_rea9519
    allowed_methods:
    - GET
    - POST
    local_only: false
    trigger: webhook
  - id: t_gate_open_instant
    entity_id: cover.garage
    to: open
    trigger: state
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ trigger.id in [''t_eak8030'',''t_rea9519''] }}'
      sequence:
      - data:
          entity_id: input_text.lpr_last_event
          value: "{{\n  (event_time ~ \" | 來源:LPR | 車牌:\" ~ plate ~\n  \" (\" ~ car_name
            ~ \") | 鐵門:\" ~ gate_state)[:255]\n}}"
        action: input_text.set_value
      - data:
          entity_id: input_select.lpr_last_plate
          option: '{{ ''未偵測'' if plate==''未知'' else plate }}'
        action: input_select.select_option
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ should_open_now }}'
          sequence:
          - target:
              entity_id: cover.garage
            action: cover.open_cover
          - data:
              title: ✅ LPR 開門指令已執行 (Beta 1)
              message: 時間：{{ event_time }} 車牌：{{ plate }}（{{ car_name }}） 指令：開門 (因鐵門為關閉狀態)
            action: persistent_notification.create
        - conditions:
          - condition: template
            value_template: '{{ not should_open_now }}'
          sequence:
          - choose:
            - conditions:
              - condition: template
                value_template: '{{ debug_on }}'
              sequence:
              - data:
                  title: ℹ️ LPR 事件通知 (Beta 1)
                  message: 時間：{{ event_time }} 車牌：{{ plate }}（{{ car_name }}） 狀態：鐵門已開，不重複執行開門。
                action: persistent_notification.create
    - conditions:
      - condition: template
        value_template: '{{ trigger.id == ''t_gate_open_instant'' }}'
      sequence:
      - data:
          entity_id: input_text.lpr_last_event
          value: "{{\n  (event_time ~ \" | 來源:GateOpen | 車牌:N/A | 鐵門:\" ~ gate_state)[:255]\n}}"
        action: input_text.set_value
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ debug_on }}'
          sequence:
          - data:
              title: "\U0001F6D7 鐵門已開啟（Beta 1）"
              message: 開始 {{ delay_minutes }} 分鐘關門評估視窗。 若期間偵測到人或新 LPR 事件，將取消自動關門。
            action: persistent_notification.create
      - wait_for_trigger:
        - entity_id: binary_sensor.che_ku_she_ying_ji_person_detected
          to: 'on'
          trigger: state
        - webhook_id: lpr_gate_eak8030
          trigger: webhook
        - webhook_id: lpr_gate_rea9519
          trigger: webhook
        timeout:
          seconds: '{{ delay_minutes | int(3) * 60 }}'
        continue_on_timeout: true
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ wait.trigger is not none }}'
          sequence:
          - choose:
            - conditions:
              - condition: template
                value_template: '{{ debug_on }}'
              sequence:
              - data:
                  title: ⛔ 已取消關門評估
                  message: 原因：{{ '偵測到人' if wait.trigger.platform=='state' else '收到新
                    LPR 事件' }}。 本次不執行自動關門。
                action: persistent_notification.create
          - stop: Canceled by presence/LPR
      - variables:
          arm_away_later: '{{ is_state(alarm_entity, ''armed_away'') }}'
          nobody_later: '{{ is_state(person_sensor, ''off'') }}'
          gate_still_open: '{{ is_state(''cover.garage'',''open'') }}'
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ gate_still_open and arm_away_later and nobody_later
              }}'
          sequence:
          - choose:
            - conditions:
              - condition: template
                value_template: '{{ auto_close_enabled }}'
              sequence:
              - target:
                  entity_id: cover.garage
                action: cover.close_cover
              - data:
                  title: "\U0001F916 自動關門已執行"
                  message: 視窗結束：Arm Away + 無人 + 門仍開 ⇒ 已下達關門。
                action: persistent_notification.create
            - conditions:
              - condition: template
                value_template: '{{ not auto_close_enabled }}'
              sequence:
              - data:
                  title: "\U0001F916（預備）條件式關門：會關"
                  message: 視窗結束：Arm Away + 無人 + 門仍開 ⇒ 預判會關門。 （目前僅通知；開啟『LPR自動關門』即可生效）
                action: persistent_notification.create
        - conditions:
          - condition: template
            value_template: '{{ not (gate_still_open and arm_away_later and nobody_later)
              }}'
          sequence:
          - data:
              title: "\U0001F642（預備）條件式關門：不關"
              message: 視窗結束但條件未滿足：保全={{ 'Arm Away' if arm_away_later else '非 Arm Away'
                }}、 人形={{ '無人' if nobody_later else '有人' }}、鐵門={{ '仍開啟' if gate_still_open
                else '已關閉' }}。 本次不關門（或已關）。
            action: persistent_notification.create
    default: []
  mode: single
  max_exceeded: silent
  variables:
    plate: '{% if trigger.id == ''t_eak8030'' %}EAK8030 {% elif trigger.id == ''t_rea9519''
      %}REA9519 {% else %}未知{% endif %}'
    car_name: '{% if plate == ''EAK8030'' %}Kenny車 {% elif plate == ''REA9519'' %}家用車
      {% else %}未知車輛{% endif %}'
    event_time: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
    gate_state: '{{ states(''cover.garage'') }}'
    debug_on: '{{ is_state(''input_boolean.lpr_debug_notify'',''on'') }}'
    auto_close_enabled: '{{ is_state(''input_boolean.lpr_auto_close_enable'',''on'')
      }}'
    delay_minutes: '{{ states(''input_number.lpr_auto_close_delay_min'') | int(3)
      }}'
    alarm_entity: alarm_control_panel.home
    person_sensor: binary_sensor.che_ku_she_ying_ji_person_detected
    arm_away_now: '{{ is_state(alarm_entity, ''armed_away'') }}'
    nobody_now: '{{ is_state(person_sensor, ''off'') }}'
    arm_away_text: '{{ ''Arm Away'' if arm_away_now else ''非 Arm Away'' }}'
    nobody_text: '{{ ''無人'' if nobody_now else ''有人'' }}'
    should_open_now: '{{ is_state(''cover.garage'',''closed'') }}'
    open_decision_text: '{{ ''預判：會開門'' if should_open_now else ''預判：不開門（門已開或條件不符）''
      }}'
- *id004
