                      message: 上樓成立（視窗內立即，全黑 + 非睡眠窗，黑≥15s 或非剛關燈）
              - stop: 上樓成立（視窗內立即）
          - choose:
            - conditions:
              - condition: state
                entity_id: timer.topfloor_lock_after_up
                state: idle
              - condition: template
                value_template: '{{ (not upstairs_present_down) and lights_off_or_dim
                  }}'
              - condition: template
                value_template: '{{ not upstairs_present_up }}'
              sequence:
              - variables:
                  __start_cam_dn: '{{ as_timestamp(now()) }}'
              - repeat:
                  until:
                  - condition: or
