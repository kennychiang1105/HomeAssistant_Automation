- &id002
  id: automation.100C2_doorlock_batt_cycle_detect
  alias: 100C-2門鎖換電池偵測與校正寫回AI_Beta (V1 Beta 8)
  description: 當門鎖電量由低回升至 ≥80% 時，視為換電池；同步更新上次校正款式與耗電率（％/日），並重置通知等級為 OK，供 35/15/5%
    通知系統使用。
  triggers:
  - trigger: numeric_state
    entity_id: sensor.ke_ting_men_suo_dian_liang_guo_lu
    above: 80
    for: 00:00:30
  conditions:
  - condition: template
    alias: 過濾 unknown/unavailable/-1 等假觸發；且前值必須 <20%
    value_template: '{% set prev = trigger.from_state.state if trigger is defined
      and trigger.from_state is not none else ''100'' %} {% set invalids = [''unknown'',''unavailable'',''none'',''None'',''-1'']
      %} {{ prev not in invalids and prev|float(100) < 20 }}'
  actions:
  - action: input_text.set_value
    data:
      entity_id: input_text.doorlock_batt_model_last_cycle
      value: '{{ states(''input_text.doorlock_batt_model_current'') }}'
  - action: input_number.set_value
    data:
      entity_id: input_number.doorlock_batt_drop_last_cycle
      value: '{{ drop_last }}'
  - action: input_text.set_value
    data:
      entity_id: input_text.doorlock_batt_last_stage
      value: OK
  - action: notify.line_bot_chiangfamilygroup
    data:
      title: '{{ notif_title_calib }}'
      message: "{{\n  {\n    \"messages\": [\n      {\"type\":\"text\",\"text\": notif_title_calib},\n
        \     {\"type\":\"text\",\"text\":\"\U0001F527 偵測到門鎖電量已由低回升至 80%以上，視為完成換電池。\\n已更新『上次校正款式』與『上次日耗電率』，並重置通知等級（OK）。\"},\n
        \     {\"type\":\"text\",\"text\":\"狀態摘要：\\n• 新電池款式：\" ~ (states('input_text.doorlock_batt_model_current')
        or '未填寫') ~ \"\\n• 校正後日耗電率：\" ~ (states('input_number.doorlock_batt_drop_last_cycle'))
