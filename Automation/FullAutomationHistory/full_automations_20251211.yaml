        or '未填寫' }}」； 校正日耗電率＝{{ states('input_number.doorlock_batt_drop_last_cycle')
        }} %/日。 （版本：{{ automation_version }}｜相容：{{ helpers_compat }}）"
  mode: single
  variables:
    automation_version: V1 Beta 8
    helpers_compat: Helpers V1 Beta 13
    notif_title_base: 【AI電量計算系統V1 Beta8】
    notif_title_calib: '{{ notif_title_base }}

      門鎖耗電率校正 ✅'
    mean_deriv: '{{ states(''sensor.doorlock_battery_drop_mean_7d'')|float(0) }}'
    drop_last: "{% set val = 0 - (states('sensor.doorlock_battery_drop_mean_7d')|float(0))
