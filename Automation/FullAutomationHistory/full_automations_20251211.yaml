- id: automation.100cmen_suo_di_dian_liang_tong_zhi_ai
  alias: 100C客廳門鎖電量分級通知AI_Beta (V1 Beta 10)
  description: 門鎖電量到 35/15/5% 時分級通知；同款電池才顯示預估天數；僅等級變化時通知一次
  triggers:
  - id: t35
    trigger: numeric_state
    entity_id: sensor.ke_ting_men_suo_dian_liang_guo_lu
    below: 35
    for: 00:05:00
  - id: t15
    trigger: numeric_state
    entity_id: sensor.ke_ting_men_suo_dian_liang_guo_lu
    below: 15
    for: 00:03:00
  - id: t5
    trigger: numeric_state
    entity_id: sensor.ke_ting_men_suo_dian_liang_guo_lu
    below: 5
    for: 00:01:00
  actions:
  - choose:
    - conditions:
      - condition: template
        alias: 過濾 unknown → -1 假觸發
        value_template: '{% set from = trigger.from_state.state if trigger.from_state
          is not none else ''unknown'' %} {% set to   = trigger.to_state.state   if
          trigger.to_state   is not none else ''unknown'' %} {% set invalids = [''unknown'',''unavailable'',''none'',''None'']
          %} {{ not (from in invalids and to == ''-1'') }}'
      sequence:
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ stage_changed }}'
          sequence:
          - choose:
            - conditions:
              - condition: template
                value_template: '{{ stage_now == ''EQ0'' }}'
              sequence:
              - data:
                  title: '{{ notif_title_alarm }}'
                  message: '{{ line_payload_alarm }}'
                action: notify.line_bot_chiangfamilygroup
            - conditions:
              - condition: template
                value_template: '{{ stage_now == ''LT15'' }}'
              sequence:
              - data:
                  title: '{{ notif_title_warn }}'
                  message: '{{ line_payload_warn }}'
                action: notify.line_bot_chiangfamilygroup
            - conditions:
              - condition: template
                value_template: '{{ stage_now == ''LT35'' }}'
              sequence:
              - data:
                  title: '{{ notif_title_warn }}'
                  message: '{{ line_payload_35 }}'
                action: notify.line_bot_chiangfamilygroup
          - data:
              entity_id: input_text.doorlock_batt_last_stage
              value: '{{ stage_now }}'
            action: input_text.set_value
        default:
        - stop: 等級未變化（stage={{ stage_now }}），不重覆通知
    default:
    - stop: 忽略：unknown → -1 假觸發（未送出任何通知）
  mode: single
  variables:
    automation_version: V1 Beta 10
    helpers_compat: Helpers V1 Beta 13
    notif_title_base: 【AI電量告警系統 V1 Beta10】
    notif_title_warn: "{{ notif_title_base }}\n門鎖電量提醒 \U0001F6AA\U0001F50B"
    notif_title_alarm: "{{ notif_title_base }}\n門鎖電量告警 \U0001F6AA\U0001F50B"
    doorlock_batt: '{{ states(''sensor.ke_ting_men_suo_dian_liang_guo_lu'')|float(-1)
      }}'
    batt_valid: '{{ doorlock_batt >= 0 }}'
    lvl: '{{ (doorlock_batt if batt_valid else 0)|round(1) }}'
    stage_now: "{% if not batt_valid %}\n  OK\n{% elif doorlock_batt < 1 %}\n  EQ0\n{%
      elif doorlock_batt < 15 %}\n  LT15\n{% elif doorlock_batt < 35 %}\n  LT35\n{%
      else %}\n  OK\n{% endif %}"
    stage_last: '{{ states(''input_text.doorlock_batt_last_stage'')|default(''OK'')
      }}'
    stage_changed: '{{ stage_now != stage_last }}'
    eta_days: '{% set s = states(''sensor.doorlock_batt_days_left_last_model'') %}
      {% if s is number %}{{ s|float(0)|round(1) }}{% else %}unknown{% endif %}'
    model_now: '{{ states(''input_text.doorlock_batt_model_current'')|trim }}'
    model_last: '{{ states(''input_text.doorlock_batt_model_last_cycle'')|trim }}'
    batt_line_text: '{% if not batt_valid -%} 門鎖電量摘要： • 電量：資料暫無（gateway 尚未回報） {%-
      else -%} 門鎖電量摘要： • 電量：{{ doorlock_batt|round(1) }}% • 預估天數：{%- if eta_days !=
      ''unknown'' -%}約 {{ eta_days }} 天（同款電池）{%- else -%}—（不同款或資料不足）{%- endif -%}
      • 當前/上次款式：{{ model_now or ''未填寫'' }} / {{ model_last or ''未校正'' }} {%- endif
      %}'
    line_payload_warn: "{{\n  {\"messages\":[\n    {\"type\":\"text\",\"text\": notif_title_warn},\n
      \   {\"type\":\"text\",\"text\":\"\U0001F7E7 門鎖電量低於 15%，可能無法遠端或手機解鎖，請儘速更換或準備行動電源。\"},\n
      \   {\"type\":\"text\",\"text\": batt_line_text}\n  ]} | tojson\n}}"
    line_payload_35: "{{\n  {\"messages\":[\n    {\"type\":\"text\",\"text\": notif_title_warn},\n
      \   {\"type\":\"text\",\"text\":\"\U0001F7E8 門鎖電量 35% 以下，建議安排電池更換。\"},\n    {\"type\":\"text\",\"text\":
      batt_line_text}\n  ]} | tojson\n}}"
    line_payload_alarm: "{{\n  {\"messages\":[\n    {\"type\":\"text\",\"text\": notif_title_alarm},\n
      \   {\"type\":\"text\",\"text\":\"\U0001F7E5 門鎖電量完全沒電（0%）！\\n請以行動電源供電後解鎖。\\n此時「自動離家」與「網關保護」可能異常。\"},\n
      \   {\"type\":\"text\",\"text\": batt_line_text}\n  ]} | tojson\n}}"
- id: automation.08_5f_ding_lou_shang_xia_lou_qing_jing_ai
  alias: 08-5F頂樓自動上下樓情境AI_Beta (V1 Beta 13)
  description: 'V1 Beta 13 — Helper 相容性更新至 V1 Beta 13，修正實體 ID。其餘沿用：上樓需全黑且（黑≥15s 或非剛關燈）；保護窗僅擋上樓、不擋下樓。
    下樓以 iPhone 為主，需連續 N 秒不在 5F AP；視窗內下樓=連續 20s 全暗/極暗；雙黏著鎖 90s。 Debug：可讀版快照 + JSON
    + 可讀版決策卡；JSON 寫入 input_text 前截斷 250 字。

    '
  triggers:
  - id: t_leave_ai_confirmed
    event_type: ai_leave_confirmed
    event_data:
      who: kenny
    trigger: event
  - id: t_cam
    entity_id: binary_sensor.wu_lou_she_ying_ji_person_detected
    to: 'on'
    trigger: state
  - id: t_ap_immediate_up
    value_template: '{% set s1 = states(''input_text.iphone_tracker_entity_kenny'')
      %} {% set s2 = states(''input_text.watch_tracker_entity_kenny'') %} {% set iphone_ent
      = ''device_tracker.iphone_17_pro_max_kenny'' if s1 in [''unknown'',''unavailable'','''']
      else s1 %} {% set watch_ent  = ''device_tracker.apple_watch_ultra_3_kenny''
      if s2 in [''unknown'',''unavailable'',''''] else s2 %} {% set iphone_ap  = (state_attr(iphone_ent,''ap_mac'')|default(''''))|lower
      %} {% set watch_ap   = (state_attr(watch_ent,''ap_mac'')|default(''''))|lower
      %} {% set ap_raw     = states(''input_text.topfloor_ap_macs_5f'') %} {% set
      ap_list_raw = ''70:a7:41:e4:54:1f,70:a7:41:e4:5a:bf,d0:21:f9:f2:fc:4c'' if ap_raw
      in [''unknown'',''unavailable'',''''] else ap_raw %} {% set ap_list = (ap_list_raw|lower|replace(''
      '','''')|replace('';'','','')|regex_findall(''[^,]+'')) %} {{ (iphone_ap in
      ap_list) or (watch_ap in ap_list) }}

      '
    trigger: template
  - id: t_ap_left_phone
    value_template: '{% set s1 = states(''input_text.iphone_tracker_entity_kenny'')
      %} {% set iphone_ent = ''device_tracker.iphone_17_pro_max_kenny'' if s1 in [''unknown'',''unavailable'','''']
      else s1 %} {% set iphone_ap  = (state_attr(iphone_ent,''ap_mac'')|default(''''))|lower
      %} {% set ap_raw     = states(''input_text.topfloor_ap_macs_5f'') %} {% set
      ap_list_raw = ''70:a7:41:e4:54:1f,70:a7:41:e4:5a:bf,d0:21:f9:f2:fc:4c'' if ap_raw
      in [''unknown'',''unavailable'',''''] else ap_raw %} {% set ap_list = (ap_list_raw|lower|replace(''
      '','''')|replace('';'','','')|regex_findall(''[^,]+'')) %} {{ iphone_ap not
      in ap_list }}

      '
    trigger: template
  - id: t_ap_left_watch
    value_template: '{% set s2 = states(''input_text.watch_tracker_entity_kenny'')
      %} {% set watch_ent = ''device_tracker.apple_watch_ultra_3_kenny'' if s2 in
      [''unknown'',''unavailable'',''''] else s2 %} {% set watch_ap  = (state_attr(watch_ent,''ap_mac'')|default(''''))|lower
      %} {% set ap_raw     = states(''input_text.topfloor_ap_macs_5f'') %} {% set
      ap_list_raw = ''70:a7:41:e4:54:1f,70:a7:41:e4:5a:bf,d0:21:f9:f2:fc:4c'' if ap_raw
      in [''unknown'',''unavailable'',''''] else ap_raw %} {% set ap_list = (ap_list_raw|lower|replace(''
      '','''')|replace('';'','','')|regex_findall(''[^,]+'')) %} {{ watch_ap not in
      ap_list }}

      '
    trigger: template
  conditions:
  - condition: state
    entity_id: device_tracker.iphone_17_pro_max_kenny
    state: home
  actions:
  - variables:
      _trig: '{{ (trigger.id | default(''unknown'')) | string }}'
      _iphone_ap_s: '{{ (iphone_ap | default(''none'')) | string }}'
      _watch_ap_s: '{{ (watch_ap  | default(''none'')) | string }}'
      _snap_json: "{{\n  {\n    \"ts\": now().isoformat(),\n    \"trigger\": _trig,\n
        \   \"iphone_ap\": _iphone_ap_s,\n    \"watch_ap\": _watch_ap_s,\n    \"iphone_ap_valid\":
        (iphone_ap_valid | bool),\n    \"up_phone_raw\": (upstairs_phone_raw | bool),\n
        \   \"up_watch\": (upstairs_watch | bool),\n    \"up_for_up\": (upstairs_present_up
        | bool),\n    \"up_for_down\": (upstairs_present_down | bool),\n    \"l1\":
        (lamp1_on | bool),\n    \"l2\": (lamp2_on | bool),\n    \"l2_bri\": (lamp2_bri
        | int),\n    \"all_dark\": (lights_all_off | bool),\n    \"off_or_dim\": (lights_off_or_dim
        | bool),\n    \"recent_light_off\": (recent_light_off | bool),\n    \"dark_15s\":
        (dark_15s | bool),\n    \"sleep_silent\": (sleep_silent_active | bool),\n
        \   \"guard_active\": (guard_active | bool),\n    \"lock_up_active\": (lock_up_active
        | bool),\n    \"lock_down_active\": (lock_down_active | bool)\n  } | tojson\n}}\n"
  - variables:
      _pretty: "{% set Y = '✅' %}{% set N = '❌' %} \U0001F552 {{ now().strftime('%Y-%m-%d
        %H:%M:%S') }} \U0001F514 Trigger: {{ _trig }} ─────────────────────────────
        \U0001F4F6 AP 狀態 • iPhone AP: {{ _iphone_ap_s }}（有效? {{ Y if iphone_ap_valid
        else N }}）→ 5F? {{ Y if upstairs_phone_raw else N }} • Watch  AP: {{ _watch_ap_s
        }} → 5F? {{ Y if upstairs_watch else N }} • 上樓用(OR): {{ Y if upstairs_present_up
        else N }}　下樓用(Phone-保守): {{ Y if upstairs_present_down else N }} ─────────────────────────────
        \U0001F4A1 燈光 • L1: {{ 'ON' if lamp1_on else 'off' }}　L2: {{ 'ON' if lamp2_on
        else 'off' }}　L2亮度: {{ lamp2_bri }} • 全黑(all off): {{ Y if lights_all_off
        else N }}　極暗/全暗(off_or_dim): {{ Y if lights_off_or_dim else N }} • 連續黑≥15s:
        {{ Y if dark_15s else N }}　燈剛關({{ light_off_cooldown_sec }}s內): {{ Y if recent_light_off
        else N }} ───────────────────────────── \U0001F4A4 睡眠靜默 • Sleep Window 啟用?
        {{ Y if sleep_silent_active else N }}（{{ sleep_silent_start_min }}→{{ sleep_silent_end_min
        }} 分） ───────────────────────────── \U0001F6E1️ 保護窗 / 黏著鎖 • guard_active:
        {{ Y if guard_active else N }} • lock_up_active(上樓鎖): {{ Y if lock_up_active
        else N }} • lock_down_active(下樓鎖): {{ Y if lock_down_active else N }}\n"
  - action: input_text.set_value
    target:
      entity_id: input_text.topfloor_debug_last_json
    data:
      value: '{{ (_snap_json | string)[:250] }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ debug_on }}'
      sequence:
      - action: persistent_notification.create
        data:
          title: '[DEBUG] 頂樓偵測（可讀版）'
          message: '{{ _pretty }}'
      - action: persistent_notification.create
        data:
          title: '[DEBUG] 頂樓偵測快照（JSON）'
          message: '{{ _snap_json }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ trigger.id in [''t_cam''] and lamp_was_on_recently }}'
      sequence:
      - action: timer.start
        target:
          entity_id: timer.topfloor_down_intent_guard
        data:
          duration: '{{ states(''input_number.topfloor_cam_ambiguous_sec_kenny'')|int(45)
            }}'
  - choose:
    - conditions:
        condition: trigger
        id: t_leave_ai_confirmed
      sequence:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.ding_lou_xia_lou_qing_jing_kenny
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.ding_lou_shang_lou_qing_jing_kenny
      - action: timer.start
        target:
          entity_id: timer.topfloor_lock_after_down
        data:
          duration: 90
      - action: input_text.set_value
        target:
          entity_id: input_text.topfloor_debug_last_decision
        data:
          value: AI離家→下樓
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ debug_on }}'
          sequence:
          - action: persistent_notification.create
            data:
              title: '[DEBUG] 決策'
              message: AI離家→下樓
      - stop: AI離家→下樓完成
    - conditions:
      - condition: state
        entity_id: timer.topfloor_lock_after_down
        state: idle
      - condition: or
        conditions:
        - condition: trigger
          id: t_ap_immediate_up
        - condition: template
          value_template: '{{ upstairs_present_up }}'
      - condition: template
        value_template: '{{ (not recent_light_off) or (dark_15s) }}'
      - condition: template
        value_template: '{{ not guard_active }}'
      - condition: template
        value_template: '{{ lights_all_off }}'
      - condition: template
        value_template: '{{ not sleep_silent_active }}'
      sequence:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.ding_lou_shang_lou_qing_jing_kenny
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.ding_lou_xia_lou_qing_jing_kenny
      - action: timer.start
        target:
          entity_id: timer.topfloor_lock_after_up
        data:
          duration: 90
      - action: input_text.set_value
        target:
          entity_id: input_text.topfloor_debug_last_decision
        data:
          value: 上樓成立（AP即時/OR，全黑 + 非睡眠窗，黑≥15s 或非剛關燈）
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ debug_on }}'
          sequence:
          - action: persistent_notification.create
            data:
              title: '[DEBUG] 決策'
              message: 上樓成立（AP即時/OR，全黑 + 非睡眠窗，黑≥15s 或非剛關燈）
      - stop: 上樓成立（即時/OR）
    - conditions:
      - condition: state
        entity_id: timer.topfloor_lock_after_up
        state: idle
      - condition: or
        conditions:
        - condition: trigger
          id: t_ap_left_phone
        - condition: template
          value_template: '{{ (down_no_light_grace_sec|int) > 0 and (not upstairs_present_down)
            }}'
      sequence:
      - variables:
          __start: '{{ as_timestamp(now()) }}'
      - repeat:
          until:
          - condition: or
            conditions:
            - condition: template
              value_template: "{{ (not upstairs_present_down) and\n   ((as_timestamp(now())
                - __start) >= (down_no_light_grace_sec | int)) }}\n"
            - condition: template
              value_template: '{{ upstairs_present_down }}'
          sequence:
          - delay: 00:00:05
          - choose:
            - conditions:
              - condition: template
                value_template: '{{ upstairs_present_down }}'
              sequence:
              - variables:
                  __start: '{{ as_timestamp(now()) }}'
      - choose:
        - conditions:
          - condition: template
            value_template: "{{ (not upstairs_present_down) and\n   ((as_timestamp(now())
              - __start) >= (down_no_light_grace_sec | int)) }}\n"
          sequence:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.ding_lou_xia_lou_qing_jing_kenny
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.ding_lou_shang_lou_qing_jing_kenny
          - action: timer.start
            target:
              entity_id: timer.topfloor_lock_after_down
            data:
              duration: 90
          - action: input_text.set_value
            target:
              entity_id: input_text.topfloor_debug_last_decision
            data:
              value: 下樓成立（iPhone 連續 {{ down_no_light_hms }} 不在頂樓 AP）
          - choose:
            - conditions:
              - condition: template
                value_template: '{{ debug_on }}'
              sequence:
              - action: persistent_notification.create
                data:
                  title: '[DEBUG] 決策'
                  message: 下樓成立（iPhone 連續 {{ down_no_light_hms }} 不在頂樓 AP）
          - stop: 下樓成立（iPhone 連續不在頂樓 AP）
    - conditions:
      - condition: state
        entity_id: timer.topfloor_lock_after_up
        state: idle
      - condition: or
        conditions:
        - condition: trigger
          id: t_ap_left_watch
        - condition: trigger
          id: t_cam
      sequence:
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ lamp_was_on_recently }}'
          sequence:
          - action: timer.start
            target:
              entity_id: timer.topfloor_down_intent_guard
            data:
              duration: '{{ states(''input_number.topfloor_cam_ambiguous_sec_kenny'')|int(45)
                }}'
      - variables:
          __assist_end: '{{ as_timestamp(now()) + (down_assist_wait_sec | int) }}'
          __start: '{{ as_timestamp(now()) }}'
      - repeat:
          until:
          - condition: or
            conditions:
            - condition: template
              value_template: "{{ (not upstairs_present_down) and\n   ((as_timestamp(now())
                - __start) >= (down_no_light_grace_sec | int)) }}\n"
            - condition: template
              value_template: '{{ as_timestamp(now()) >= (__assist_end | float) }}'
          sequence:
          - delay: 00:00:05
          - choose:
            - conditions:
              - condition: template
                value_template: '{{ upstairs_present_down }}'
              sequence:
              - variables:
                  __start: '{{ as_timestamp(now()) }}'
      - choose:
        - conditions:
          - condition: template
            value_template: "{{ (not upstairs_present_down) and\n   ((as_timestamp(now())
              - __start) >= (down_no_light_grace_sec | int)) }}\n"
          sequence:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.ding_lou_xia_lou_qing_jing_kenny
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.ding_lou_shang_lou_qing_jing_kenny
          - action: timer.start
            target:
              entity_id: timer.topfloor_lock_after_down
            data:
              duration: 90
          - action: input_text.set_value
            target:
              entity_id: input_text.topfloor_debug_last_decision
            data:
