- &id001
  id: automation.22ding_lou_dian_feng_shan_zi_dong_hua_ai
  alias: 22頂樓電風扇自動化_AI_Beta (V1 Beta 14)
  description: ''
  triggers:
  - entity_id:
    - climate.ding_lou_kong_diao
    - sensor.5f_homepodmini_temperature
    for: 00:00:15
    trigger: state
  - entity_id: climate.ding_lou_kong_diao
    attribute: current_temperature
    for: 00:00:15
    trigger: state
  - entity_id: input_boolean.ding_lou_shang_lou_qing_jing_kenny
    to: 'on'
    trigger: state
  - entity_id: fan.dmaker_p33_eabd_fan
    trigger: state
  - entity_id: input_boolean.ding_lou_fan_manual_hold
    to: 'on'
    for: 01:00:00
    trigger: state
  actions:
  - variables:
      debug_notify: '{{ is_state(''input_boolean.ding_lou_fan_debug_notify'',''on'')
        }}'
      manual_hold: '{{ is_state(''input_boolean.ding_lou_fan_manual_hold'',''on'')
        }}'
      enter_low_close_c: '{{ states(''input_number.enter_low_close_c'') | float(26.9)
        }}'
      enter_high_open_c_ui: '{{ states(''input_number.enter_high_open_c'') | float(29.0)
        }}'
      night_cold_off_c: '{{ states(''input_number.night_cold_off_c'') | float(27.5)
        }}'
      morning_reopen_c: '{{ states(''input_number.morning_reopen_c'') | float(28.8)
        }}'
      ac_weight_add_c: '{{ states(''input_number.ac_weight_add_c'') | float(1.0) }}'
      ac_fast_rise_th_c: '{{ states(''input_number.ac_fast_rise_th_c'') | float(0.4)
        }}'
      ac_fast_rise_bonus_c: '{{ states(''input_number.ac_fast_rise_bonus_c'') | float(0.5)
        }}'
      ac_state: '{{ states(''climate.ding_lou_kong_diao'') }}'
      ac_temp: '{{ state_attr(''climate.ding_lou_kong_diao'',''current_temperature'')
        | float(0) }}'
      fan_state: '{{ states(''fan.dmaker_p33_eabd_fan'') }}'
      fan_pct_now: '{{ state_attr(''fan.dmaker_p33_eabd_fan'',''percentage'') | int(0)
        }}'
      ac_on: '{{ ac_state == ''cool'' }}'
      hhmm: '{{ now().strftime(''%H:%M'') }}'
      hp_raw: '{{ states(''sensor.5f_homepodmini_temperature'') }}'
      hp_temp: "{% set s = states('sensor.5f_homepodmini_temperature') %} {% if s
        not in ['unknown','unavailable','none',''] %}\n  {{ s | float }}\n{% else
        %}\n  {{ -9999 }}\n{% endif %}\n"
      hp_valid_now: '{% set obj = states.sensor[''5f_homepodmini_temperature''] if
        states.sensor is defined else none %} {% set ts = as_timestamp(obj.last_changed)
        if obj and obj.last_changed else none %} {% set age = (now().timestamp() -
        ts) | int if ts else 999999 %} {{ (hp_temp != -9999) and (hp_temp > 10) and
        (hp_temp < 45) and (age < 3600) }}

        '
      hp_soft_hold: '{% set obj = states.sensor[''5f_homepodmini_temperature''] if
        states.sensor is defined else none %} {% set ts = as_timestamp(obj.last_changed)
        if obj and obj.last_changed else none %} {% set age = (now().timestamp() -
        ts) | int if ts else 999999 %} {{ (not hp_valid_now) and (age < 900) }}

        '
      is_sleep: '{{ (''23:00'' <= hhmm <= ''23:59'') or (''00:00'' <= hhmm <= ''07:30'')
        }}

        '
      enter_high_open_c_dyn: 26.1
      ac_rise_fast: "{% set has = (trigger is defined and trigger.to_state is defined
        and trigger.from_state is defined) %} {% if has and trigger.entity_id == 'climate.ding_lou_kong_diao'
        %}\n  {{ (trigger.to_state.attributes.current_temperature | float(0))\n     -
        (trigger.from_state.attributes.current_temperature | float(0)) >= ac_fast_rise_th_c
        }}\n{% else %} false {% endif %}\n"
      ac_override_until_hp28: '{{ ac_on and (ac_temp > 29.0) and ( (not hp_valid_now)
        or (hp_temp < 28.0) ) }}

        '
      ac_hp_diff_override: '{{ ac_on and hp_valid_now and ( (ac_temp + ac_weight_add_c)
        - hp_temp >= 1.5 ) and (hp_temp < 28.0) }}

        '
      t_eff: "{% if hp_soft_hold %}\n  none\n{% else %}\n  {% if ac_override_until_hp28
        %}\n    {{ (ac_temp + ac_weight_add_c + (ac_fast_rise_bonus_c if ac_rise_fast
        else 0)) | float }}\n  {% else %}\n    {% if ac_on %}\n      {% if ac_hp_diff_override
        %}\n        {{ (ac_temp + ac_weight_add_c + (ac_fast_rise_bonus_c if ac_rise_fast
        else 0)) | float }}\n      {% else %}\n        {% set hp_use = (hp_temp if
        hp_valid_now else none) %}\n        {% set base = [ (hp_use if hp_use is not
        none else -9999), ac_temp + ac_weight_add_c ] | max %}\n        {{ (base +
        (ac_fast_rise_bonus_c if ac_rise_fast else 0)) | float }}\n      {% endif
        %}\n    {% else %}\n      {{ hp_temp if hp_valid_now else ac_temp }}\n    {%
        endif %}\n  {% endif %}\n{% endif %}\n"
      t_eff_valid: '{{ t_eff is not none }}'
      pct_base_day: "{% if not t_eff_valid %}\n  {{ fan_pct_now }}\n{% else %}\n  {%
        set t = t_eff | float %}\n  {% if t >= 31.3 %} 100\n  {% elif t >= 31.1 %}
        97.5\n  {% elif t >= 30.9 %} 95\n  {% elif t >= 30.7 %} 92.5\n  {% elif t
        >= 30.5 %} 90\n  {% elif t >= 30.3 %} 87.5\n  {% elif t >= 30.1 %} 85\n  {%
        elif t >= 29.9 %} 82.5\n  {% elif t >= 29.7 %} 80\n  {% elif t >= 29.5 %}
        77.5\n  {% elif t >= 29.3 %} 75\n  {% elif t >= 29.1 %} 72.5\n  {% elif t
        >= 28.9 %} 70\n  {% elif t >= 28.7 %} 67.5\n  {% elif t >= 28.5 %} 65\n  {%
        elif t >= 28.3 %} 62.5\n  {% elif t >= 28.1 %} 60\n  {% elif t >= 27.9 %}
        57.5\n  {% elif t >= 27.7 %} 55\n  {% elif t >= 27.5 %} 52.5\n  {% elif t
        >= 27.3 %} 50\n  {% elif t >= 27.1 %} 47.5\n  {% elif t >= 26.9 %} 45\n  {%
        elif t >= 26.7 %} 42.5\n  {% elif t >= 26.5 %} 40\n  {% elif t >= 26.3 %}
        37.5\n  {% elif t >= 26.1 %} 35\n  {% elif t >= 25.9 %} 32.5\n  {% elif t
        >= 25.7 %} 30\n  {% else %} 30 {% endif %}\n{% endif %}\n"
      pct_sleep_tuned: "{% if not t_eff_valid %}\n  {{ pct_base_day }}\n{% else %}\n
        \ {% set p = (pct_base_day | float) - (5 if is_sleep else 0) %}\n  {% set
        p2 = [p, 25] | max %}\n  {{ p2 }}\n{% endif %}\n"
      desired_pct_curve: '{% set p = pct_sleep_tuned | float %} {% set step = 2.5
        %} {% set snapped = ((p / step) | round(0) * step) %} {{ [snapped, 100] |
        min }}

        '
  - choose:
    - conditions:
      - condition: template
        value_template: "{{ (trigger is defined)\n   and (trigger.entity_id == 'input_boolean.ding_lou_fan_manual_hold')\n
          \  and (trigger.to_state is defined and trigger.to_state.state == 'on')\n
          \  and (states('input_boolean.ding_lou_fan_manual_hold') == 'on') }}\n"
      sequence:
      - target:
          entity_id: input_boolean.ding_lou_fan_manual_hold
        action: input_boolean.turn_off
      - if:
        - condition: template
          value_template: '{{ debug_notify }}'
        then:
        - data:
            title: 手動保留已自動解除（1 小時）
            message: ⏱️ 手動保留超過 1 小時，已恢復溫控自動判斷。
          action: notify.persistent_notification
  - choose:
    - conditions:
      - condition: template
        value_template: "{{ (trigger is defined)\n   and (trigger.entity_id == 'fan.dmaker_p33_eabd_fan')\n
          \  and (trigger.to_state is defined and trigger.to_state.state == 'off')\n
          \  and (trigger.from_state is defined and trigger.from_state.state == 'on')
          }}\n"
      - condition: template
        value_template: '{{ t_eff_valid and (t_eff | float >= night_cold_off_c) }}'
      sequence:
      - target:
          entity_id: input_boolean.ding_lou_fan_cold_off_memory
        action: input_boolean.turn_off
      - target:
          entity_id: input_boolean.ding_lou_fan_manual_hold
        action: input_boolean.turn_off
      - if:
        - condition: template
          value_template: '{{ debug_notify }}'
        then:
        - data:
            title: 已偵測外部/手動關機 → 清除回溫記憶
            message: "\U0001F4F4 t_eff={{ '%.1f'|format(t_eff|float) }}°C ≥ 過冷門檻 {{
              night_cold_off_c }}°C\n"
          action: notify.persistent_notification
  - if:
    - condition: template
      value_template: '{{ debug_notify and hp_soft_hold }}'
    then:
    - data:
        title: HomePod 溫度短暫失效（≤15 分）— 已凍結溫控
        message: '⚠️ hp_raw={{ hp_raw }}；15 分內不依溫度做關/開與調速，避免誤判。

          '
      action: notify.persistent_notification
  - choose:
    - conditions:
      - condition: state
        entity_id: input_boolean.ding_lou_shang_lou_qing_jing_kenny
        state: 'on'
      - condition: template
        value_template: '{{ t_eff_valid }}'
      sequence:
      - variables:
          t_enter: '{{ t_eff | float }}'
          high_open_c: '{{ enter_high_open_c_dyn }}'
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ t_enter >= high_open_c }}'
          sequence:
          - target:
              entity_id: fan.dmaker_p33_eabd_fan
            action: fan.turn_on
          - if:
            - condition: template
              value_template: '{{ debug_notify }}'
            then:
            - data:
                title: 頂樓風扇自動開啟（上樓）
                message: "\U0001F6B6‍♂️ t_eff={{ '%.1f'|format(t_enter) }}°C ≥ {{
                  high_open_c }}°C\n"
              action: notify.persistent_notification
        - conditions:
          - condition: template
            value_template: '{{ t_enter <= enter_low_close_c }}'
          sequence: []
        - conditions: []
          sequence:
          - choose:
            - conditions:
              - condition: state
                entity_id: fan.dmaker_p33_eabd_fan
                state: 'off'
              sequence:
              - target:
                  entity_id: fan.dmaker_p33_eabd_fan
                action: fan.turn_on
              - target:
                  entity_id: fan.dmaker_p33_eabd_fan
                data:
                  percentage: '{% set p = [40, (desired_pct_curve|float)] | max %}
                    {{ ((p / 2.5) | round(0) * 2.5) | int }}

                    '
                action: fan.set_percentage
              - if:
                - condition: template
                  value_template: '{{ debug_notify }}'
                then:
                - data:
                    title: 頂樓風扇微風開啟（上樓介於門檻）
                    message: "\U0001F321 t_eff={{ '%.1f'|format(t_enter) }}°C； 風速≥40%，實際={{
                      desired_pct_curve }}%\n"
                  action: notify.persistent_notification
            - conditions:
              - condition: state
                entity_id: fan.dmaker_p33_eabd_fan
                state: 'on'
              sequence:
              - target:
                  entity_id: fan.dmaker_p33_eabd_fan
                data:
                  percentage: '{{ ((desired_pct_curve|float / 2.5) | round(0) * 2.5)
                    | int }}

                    '
                action: fan.set_percentage
  - choose:
    - conditions:
      - condition: template
        value_template: "{{ (trigger is defined)\n   and (trigger.entity_id == 'fan.dmaker_p33_eabd_fan')\n
          \  and (trigger.to_state is defined and trigger.to_state.state == 'on')\n
          \  and (trigger.from_state is defined and trigger.from_state.state == 'off')
          }}\n"
      - condition: template
        value_template: '{{ t_eff_valid and (t_eff | float < night_cold_off_c) }}'
      - condition: template
        value_template: '{{ not manual_hold }}'
      sequence:
      - target:
          entity_id: input_boolean.ding_lou_fan_manual_hold
        action: input_boolean.turn_on
      - if:
        - condition: template
          value_template: '{{ debug_notify }}'
        then:
        - data:
            title: 手動開啟 — 已啟用保留 1 小時
            message: "\U0001F64B‍♂️ t_eff={{ '%.1f'|format(t_eff|float) }}°C 低於 {{
              night_cold_off_c }}°C；為避免立即自動關閉，已暫時保留 1 小時。\n"
          action: notify.persistent_notification
  - choose:
    - conditions:
      - condition: state
        entity_id: fan.dmaker_p33_eabd_fan
        state: 'on'
      - condition: template
        value_template: '{{ t_eff_valid and (t_eff | float < night_cold_off_c) }}'
      - condition: template
        value_template: '{{ not manual_hold }}'
      sequence:
      - target:
          entity_id: fan.dmaker_p33_eabd_fan
        action: fan.turn_off
      - target:
          entity_id: input_boolean.ding_lou_fan_cold_off_memory
        action: input_boolean.turn_on
      - if:
        - condition: template
          value_template: '{{ debug_notify }}'
        then:
        - data:
            title: 頂樓風扇自動關閉（過冷）
            message: "\U0001F319 t_eff={{ '%.1f'|format(t_eff|float) }}°C < 門檻 {{
              night_cold_off_c }}°C（記憶=on）\n"
          action: notify.persistent_notification
      - stop: Stopped after cold_off to avoid immediate reopen in same run
  - choose:
    - conditions:
      - condition: state
        entity_id: fan.dmaker_p33_eabd_fan
        state: 'off'
      - condition: state
        entity_id: input_boolean.ding_lou_fan_cold_off_memory
        state: 'on'
      - condition: template
        value_template: '{{ t_eff_valid and (t_eff | float >= morning_reopen_c) }}'
      sequence:
      - target:
          entity_id: fan.dmaker_p33_eabd_fan
        action: fan.turn_on
      - target:
          entity_id: input_boolean.ding_lou_fan_cold_off_memory
        action: input_boolean.turn_off
      - if:
        - condition: template
          value_template: '{{ debug_notify }}'
        then:
        - data:
            title: 頂樓風扇自動開啟（回溫）
            message: '☀️ t_eff={{ ''%.1f''|format(t_eff|float) }}°C ≥ {{ morning_reopen_c
              }}°C（清除記憶）

              '
          action: notify.persistent_notification
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ ac_on and not is_state(''fan.dmaker_p33_eabd_fan'',''on'')
          }}'
      sequence:
      - target:
          entity_id: fan.dmaker_p33_eabd_fan
        action: fan.turn_on
      - if:
        - condition: template
          value_template: '{{ debug_notify }}'
        then:
        - data:
            title: 頂樓風扇自動開啟（冷氣同步）
            message: ❄️ 冷氣=COOL，ac_temp={{ ac_temp }}°C
          action: notify.persistent_notification
  - if:
    - condition: state
      entity_id: fan.dmaker_p33_eabd_fan
      state: 'on'
    - condition: template
      value_template: '{{ t_eff_valid }}'
    then:
    - variables:
        desired_pct: '{{ ((desired_pct_curve|float / 2.5) | round(0) * 2.5) | int
          }}'
        need_update: '{{ (desired_pct - fan_pct_now) | abs >= 5 }}'
    - if:
      - condition: template
        value_template: '{{ need_update }}'
      then:
      - target:
          entity_id: fan.dmaker_p33_eabd_fan
        data:
          percentage: '{{ desired_pct }}'
        action: fan.set_percentage
      - if:
        - condition: template
          value_template: '{{ debug_notify }}'
        then:
        - data:
            title: 頂樓風扇風速調整
            message: "\U0001F504 新風速={{ desired_pct }}%｜t_eff={{ '%.1f'|format(t_eff|float)
              }}°C\n"
          action: notify.persistent_notification
  mode: restart
  max: 10
