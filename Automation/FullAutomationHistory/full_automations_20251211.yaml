      - repeat:
          until:
          - condition: template
            value_template: '{{ (as_timestamp(now()) - start_ts) > (monitor_window_sec|int)
              }}

              '
          sequence:
          - choose:
            - conditions:
              - condition: state
                entity_id: timer.topfloor_lock_after_down
                state: idle
              - condition: template
                value_template: '{{ upstairs_present_up and ((not recent_light_off)
                  or dark_15s) and (not guard_active) }}

                  '
              - condition: template
                value_template: '{{ lights_all_off }}'
              - condition: template
                value_template: '{{ not sleep_silent_active }}'
              sequence:
              - action: input_boolean.turn_on
                target:
                  entity_id: input_boolean.ding_lou_shang_lou_qing_jing_kenny
              - action: input_boolean.turn_off
                target:
                  entity_id: input_boolean.ding_lou_xia_lou_qing_jing_kenny
              - action: timer.start
                target:
                  entity_id: timer.topfloor_lock_after_up
                data:
                  duration: 90
              - action: input_text.set_value
                target:
                  entity_id: input_text.topfloor_debug_last_decision
                data:
                  value: 上樓成立（視窗內立即，全黑 + 非睡眠窗，黑≥15s 或非剛關燈）
              - choose:
                - conditions:
                  - condition: template
