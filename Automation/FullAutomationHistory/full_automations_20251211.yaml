- id: '1721459962917'
  alias: 100A自動啟動到家早安情境
  description: ''
  triggers:
  - entity_id:
    - light.yeelink_color5_4181_light
    for:
      hours: 0
      minutes: 0
      seconds: 15
    trigger: state
  - entity_id:
    - light.yeelink_color5_53ed_light
    for:
      hours: 0
      minutes: 0
      seconds: 45
    trigger: state
  - entity_id:
    - switch.chu_fang_deng
    for:
      hours: 0
      minutes: 5
      seconds: 0
    trigger: state
    enabled: false
  - minutes: /10
    trigger: time_pattern
    enabled: false
  - entity_id:
    - fan.ke_ting_dian_feng_shan
    for:
      hours: 0
      minutes: 0
      seconds: 15
    trigger: state
    to: 'on'
  - entity_id:
    - cover.garage
    to: closed
    for:
      hours: 0
      minutes: 8
      seconds: 0
    trigger: state
  - entity_id:
    - cover.garage
    to: closed
    for:
      hours: 0
      minutes: 2
      seconds: 0
    trigger: state
  conditions:
  - condition: and
    conditions:
    - condition: time
      after: 05:30:00
      before: '23:59:00'
    - condition: or
      conditions:
      - condition: state
        entity_id: alarm_control_panel.54ef44cf58f9_alarm
        state: armed_night
      - condition: state
        entity_id: alarm_control_panel.54ef44cf58f9_alarm
        state: armed_away
      - condition: state
        entity_id: alarm_control_panel.54ef44cf58f9_alarm
        state: disarmed
    - condition: or
      conditions:
      - condition: device
        type: is_on
        device_id: b2cc0e2bcef2b1aab52dd0a881c16fbd
        entity_id: 768da0ba0daed651f60249ede9b80f42
        domain: light
      - condition: device
        type: is_on
        device_id: 06c41a1060821fec0d9a660acb3ee9fa
        entity_id: 9923a06b8ac533e3014744fb76c54cca
        domain: light
      - condition: device
        type: is_on
        device_id: de4044f4d156d13b885a1be8eb61c85b
        entity_id: dccf102b1809104a2cc8f08dfbd6c669
        domain: switch
      - condition: state
        entity_id: fan.ke_ting_dian_feng_shan
        state: 'on'
      - condition: and
        conditions:
        - condition: state
          entity_id: cover.garage
          state: closed
          for:
            hours: 8
            minutes: 0
            seconds: 0
        - condition: state
          entity_id: switch.lou_ti_deng
          state: 'on'
        enabled: true
  actions:
  - if:
    - condition: time
      after: 05:00:00
      before: '17:00:00'
      weekday:
      - sat
      - fri
      - thu
      - wed
      - tue
      - mon
      - sun
    then:
    - data:
        skip_condition: true
      target:
        entity_id: automation.101zao_an_qing_jing
      action: automation.trigger
    else:
    - data:
        skip_condition: true
      target:
        entity_id: automation.103dao_jia_qing_jing
      action: automation.trigger
  mode: single
