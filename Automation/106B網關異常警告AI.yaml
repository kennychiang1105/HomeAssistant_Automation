# ─────────────────────────────────────────────────────────────
# 106B網關異常警告AI (V1.3)   （Helpers V2.15 相容）
# 更新重點（相對 V1.2）：
# 1) 情境標籤再強化：以 helper state/attribute 雙重 fallback，避免通知情境空白。
# 2) 版本同步：對應 Helpers V2.15 情境標籤更新。
# 前版更新（V1.0 → V1.2）：
# 1) 情境標籤穩定：通知直接讀取 Aqara 情境 helper 並強制 fallback，避免顯示空白情境。
# 2) 狀態判斷安全：情境布林改為明確布林與去空白，異常訊息能正確呈現當前狀態。
# 3) 命名優化：通知標題改為「保全告警系統」，去除 Aqara/網關守護字樣；情境健檢+自動修復同步。
# ─────────────────────────────────────────────────────────────
alias: 106B網關異常警告AI (V1.3)
id: automation.gateway_anomaly_guard_ai
description: 保全情境重置與異常告警
mode: single

triggers:
  - platform: state
    entity_id:
      - input_boolean.aqara_zai_jia
      - input_boolean.aqara_wan_an
      - input_boolean.aqara_li_jia
      - input_boolean.aqara_guan_bi
      - input_boolean.aqara_chu_fa
  - platform: homeassistant
    event: start
  - platform: event
    event_type: automation_reloaded

variables:
  automation_version: "V1.3"
  helpers_compat: "Helpers V2.15"
  notif_title_base: "【保全告警系統 V1.0】"
  notif_title_alert: >-
    {% set title = states('input_text.notif_title_gateway_alert') %}
    {{ title if title|trim and title|lower not in ['unknown','unavailable','none'] else notif_title_base }}
  aqara_zai_jia_on: "{{ is_state('input_boolean.aqara_zai_jia','on') | bool }}"
  aqara_wan_an_on: "{{ is_state('input_boolean.aqara_wan_an','on') | bool }}"
  aqara_li_jia_on: "{{ is_state('input_boolean.aqara_li_jia','on') | bool }}"
  aqara_guan_bi_on: "{{ is_state('input_boolean.aqara_guan_bi','on') | bool }}"
  aqara_chu_fa_on: "{{ is_state('input_boolean.aqara_chu_fa','on') | bool }}"
  aqara_scene_label_helper_raw: "{{ states('sensor.aqara_dang_qian_qing_jing')|string }}"
  aqara_scene_label_attr_raw: "{{ state_attr('sensor.aqara_dang_qian_qing_jing','active_labels')|string }}"
  aqara_scene_label_helper: >-
    {% set label = aqara_scene_label_helper_raw|trim %}
    {% set invalids = ['unknown','unavailable','none','null','', None, 'None', '未設定情境'] %}
    {% if label|lower in invalids %}
      {{ '' }}
    {% else %}
      {{ label }}
    {% endif %}
  aqara_scene_label_attr: >-
    {% set label = aqara_scene_label_attr_raw|trim %}
    {% set invalids = ['unknown','unavailable','none','null','', None, 'None'] %}
    {% if label|lower in invalids %}
      {{ '' }}
    {% else %}
      {{ label }}
    {% endif %}
  aqara_state_label: >-
    {% if is_state('input_boolean.aqara_li_jia','on') %}離家情境
    {% elif is_state('input_boolean.aqara_wan_an','on') %}晚安情境
    {% elif is_state('input_boolean.aqara_zai_jia','on') %}在家情境
    {% elif is_state('input_boolean.aqara_guan_bi','on') %}網關解除情境
    {% elif is_state('input_boolean.aqara_chu_fa','on') %}網關觸發情境
    {% else %}情境未知{% endif %}
  aqara_active_labels: >-
    {% set labels = [] %}
    {% if is_state('input_boolean.aqara_zai_jia','on') %}{% set _ = labels.append('在家情境') %}{% endif %}
    {% if is_state('input_boolean.aqara_wan_an','on') %}{% set _ = labels.append('晚安情境') %}{% endif %}
    {% if is_state('input_boolean.aqara_li_jia','on') %}{% set _ = labels.append('離家情境') %}{% endif %}
    {% if is_state('input_boolean.aqara_guan_bi','on') %}{% set _ = labels.append('網關解除情境') %}{% endif %}
    {% if is_state('input_boolean.aqara_chu_fa','on') %}{% set _ = labels.append('網關觸發情境') %}{% endif %}
    {{ labels|join('、') if labels else '' }}
  aqara_scene_label_safe: >-
    {% if aqara_scene_label_helper|trim %}{{ aqara_scene_label_helper|trim }}
    {% elif aqara_scene_label_attr|trim %}{{ aqara_scene_label_attr|trim }}
    {% elif aqara_active_labels|trim %}{{ aqara_active_labels|trim }}
    {% else %}{{ aqara_state_label }}{% endif %}
  anomaly_detected: >-
    {{
      (
        (1 if aqara_zai_jia_on else 0)
        + (1 if aqara_wan_an_on else 0)
        + (1 if aqara_li_jia_on else 0)
        + (1 if aqara_guan_bi_on else 0)
        + (1 if aqara_chu_fa_on else 0)
      ) >= 2
    }}

conditions:
  - condition: template
    value_template: "{{ anomaly_detected }}"

actions:
  - service: notify.persistent_notification
    data:
      title: "{{ notif_title_alert }}"
      message: |-
        保全情境異常（{{ automation_version }}）
        目前同時開啟：{{ aqara_scene_label_safe }}
        將自動切換為「在家情境」，並同步伺服器網關為 arm_home。

  - if:
      - condition: state
        entity_id: input_boolean.notify_line_emergency_enable
        state: "on"
    then:
      - service: script.send_line_to_user
        data:
          user_id: C26ff4e9d30159ba5264a1676f46f8f86
          payload: >-
            {% set scene_raw = states('sensor.aqara_dang_qian_qing_jing')|string %}
            {% set scene = scene_raw|trim %}
            {% set invalids = ['unknown','unavailable','none','null','', None, 'None'] %}
            {% set scene_safe = scene if scene|lower not in invalids else aqara_state_label %}
            {% set messages = [
              {"type":"text","text": notif_title_alert},
              {"type":"text","text": '緊急 Urgent ‼️'},
              {"type":"text","text": (
                '⚠️ 保全系統偵測到多個情境同時開啟。'
                ~ "\n目前狀態：" ~ scene_safe
                ~ "\n將自動切換為在家情境並同步伺服器網關。"
              )}
            ] %}
            {{ messages | tojson }}

  - service: input_boolean.turn_on
    target:
      entity_id: input_boolean.aqara_zai_jia

  - service: input_boolean.turn_off
    target:
      entity_id:
        - input_boolean.aqara_wan_an
        - input_boolean.aqara_li_jia
        - input_boolean.aqara_guan_bi
        - input_boolean.aqara_chu_fa

  - service: alarm_control_panel.alarm_arm_home
    target:
      entity_id: alarm_control_panel.54ef44cf58f9_alarm

  - delay:
      seconds: 2

  - variables:
      resolved_labels: >-
        {% set labels = [] %}
        {% if is_state('input_boolean.aqara_zai_jia','on') %}{% set _ = labels.append('在家情境') %}{% endif %}
        {% if is_state('input_boolean.aqara_wan_an','on') %}{% set _ = labels.append('晚安情境') %}{% endif %}
        {% if is_state('input_boolean.aqara_li_jia','on') %}{% set _ = labels.append('離家情境') %}{% endif %}
        {% if is_state('input_boolean.aqara_guan_bi','on') %}{% set _ = labels.append('網關解除情境') %}{% endif %}
        {% if is_state('input_boolean.aqara_chu_fa','on') %}{% set _ = labels.append('網關觸發情境') %}{% endif %}
        {{ labels|join('、') if labels else '' }}
      resolved_count: >-
        {% set labels = [] %}
        {% if is_state('input_boolean.aqara_zai_jia','on') %}{% set _ = labels.append(1) %}{% endif %}
        {% if is_state('input_boolean.aqara_wan_an','on') %}{% set _ = labels.append(1) %}{% endif %}
        {% if is_state('input_boolean.aqara_li_jia','on') %}{% set _ = labels.append(1) %}{% endif %}
        {% if is_state('input_boolean.aqara_guan_bi','on') %}{% set _ = labels.append(1) %}{% endif %}
        {% if is_state('input_boolean.aqara_chu_fa','on') %}{% set _ = labels.append(1) %}{% endif %}
        {{ labels|length }}

  - service: notify.persistent_notification
    data:
      title: "{{ notif_title_alert }}"
      message: |-
        保全情境異常已自動排除。
        目前啟用：{{ aqara_scene_label_safe }}
        伺服器網關已同步為 arm_home。

  - if:
      - condition: state
        entity_id: input_boolean.notify_line_emergency_enable
        state: "on"
    then:
      - service: script.send_line_to_user
        data:
          user_id: C26ff4e9d30159ba5264a1676f46f8f86
          payload: >-
            {% set scene_raw = states('sensor.aqara_dang_qian_qing_jing')|string %}
            {% set scene = scene_raw|trim %}
            {% set invalids = ['unknown','unavailable','none','null','', None, 'None'] %}
            {% set scene_safe = scene if scene|lower not in invalids else aqara_state_label %}
            {% set messages = [
              {"type":"text","text": notif_title_alert},
              {"type":"text","text": '緊急 Urgent ‼️'},
              {"type":"text","text": (
                '✅ 保全情境異常已自動排除。'
                ~ "\n目前啟用：" ~ scene_safe
                ~ "\n伺服器網關已同步為 arm_home。"
              )}
            ] %}
            {{ messages | tojson }}
