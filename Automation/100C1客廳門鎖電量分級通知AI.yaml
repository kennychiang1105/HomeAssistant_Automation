# ─────────────────────────────────────────────────────────────
# 100C1客廳門鎖電量分級通知AI (V3.0)
# 相容版本：Helpers V3.0
# 更新紀錄（統一格式）：
# - V3.0：統一命名規範、欄位標準化與通知標題版本同步。
# ─────────────────────────────────────────────────────────────
alias: 100C1客廳門鎖電量分級通知AI (V3.0)
id: ai_doorlock_battery_stage_notify
description: 門鎖電量到 35/15/5% 時分級通知；同款電池才顯示預估天數；僅等級變化時通知一次
mode: single

triggers:
  - id: t35
    trigger: numeric_state
    entity_id: sensor.ke_ting_men_suo_dian_liang_guo_lu
    below: 35
    for: "00:05:00"
  - id: t15
    trigger: numeric_state
    entity_id: sensor.ke_ting_men_suo_dian_liang_guo_lu
    below: 15
    for: "00:03:00"
  - id: t5
    trigger: numeric_state
    entity_id: sensor.ke_ting_men_suo_dian_liang_guo_lu
    below: 5
    for: "00:01:00"

variables:
  automation_version: "V3.0"
  notif_title_base: "【AI電量告警系統 {{ automation_version }}】"
  notif_title_warn: |-
    {{ notif_title_base }}
    門鎖電量提醒 🚪🔋
  notif_title_alarm: |-
    {{ notif_title_base }}
    門鎖電量告警 🚪🔋

  line_bot_target_user_id: "{{ states('sensor.line_bot_target_user_id') }}"

  doorlock_batt: "{{ states('sensor.ke_ting_men_suo_dian_liang_guo_lu')|float(-1) }}"
  batt_valid: "{{ doorlock_batt >= 0 }}"
  lvl: "{{ (doorlock_batt if batt_valid else 0)|round(1) }}"

  # 依目前電量映射成「等級」
  # OK: >=35 或資料無效; LT35: <35; LT15: <15; LT5: <5; EQ0: 0% 完全沒電（<1% 視為 0）
  stage_now: >-
    {% if not batt_valid %}
      OK
    {% elif doorlock_batt < 1 %}
      EQ0
    {% elif doorlock_batt < 5 %}
      LT5
    {% elif doorlock_batt < 15 %}
      LT15
    {% elif doorlock_batt < 35 %}
      LT35
    {% else %}
      OK
    {% endif %}
  stage_last: "{{ states('input_text.doorlock_batt_last_stage')|default('OK') }}"
  stage_changed: "{{ stage_now != stage_last }}"

  model_now: "{{ states('input_text.doorlock_batt_model_current')|trim }}"
  model_last: "{{ states('input_text.doorlock_batt_model_last_cycle')|trim }}"

  batt_line_text: >-
    {% set txt = states('sensor.batt_line_text') %}
    {% set invalids = ['unknown','unavailable','none','None'] %}
    {{ txt if txt|trim and txt|lower not in invalids else '門鎖電量摘要：\n• 資料暫無（gateway 尚未回報）' }}
  batt_line_text_line: "{{ (batt_line_text|replace('\\n','\n')) if batt_line_text|default('')|trim else '' }}"
  batt_line_text_line_safe: "{{ batt_line_text_line|default('', true)|string }}"

  notif_title_100c_warn_safe: >-
    {{ states('input_text.notif_title_100c_warn') if states('input_text.notif_title_100c_warn')|trim and states('input_text.notif_title_100c_warn')|lower not in ['unknown','unavailable','none'] else notif_title_base }}
  notif_title_100c_alarm_safe: >-
    {{ states('input_text.notif_title_100c_alarm') if states('input_text.notif_title_100c_alarm')|trim and states('input_text.notif_title_100c_alarm')|lower not in ['unknown','unavailable','none'] else notif_title_base }}

actions:
  # 先過濾 unknown → -1 的假觸發
  - choose:
      - conditions:
          - condition: template
            alias: 過濾 unknown → -1 假觸發
            value_template: >-
              {% set from = trigger.from_state.state if trigger.from_state is not none else 'unknown' %}
              {% set to   = trigger.to_state.state   if trigger.to_state   is not none else 'unknown' %}
              {% set invalids = ['unknown','unavailable','none','None'] %}
              {{ not (from in invalids and to == '-1') }}
        sequence:
          # 僅在等級「變化」時才通知；否則直接停止
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ stage_changed }}"
                sequence:
                  - choose:
                      - conditions:  # 0% 完全沒電（最優先）
                          - condition: template
                            value_template: "{{ stage_now == 'EQ0' }}"
                        sequence:
                          - service: notify.persistent_notification
                            data:
                              title: "{{ notif_title_alarm }}"
                              message: "🟥 門鎖電量完全沒電（0%）！請以行動電源供電後解鎖。此時「自動離家」與「網關保護」可能異常。"
                          - if:
                              - condition: state
                                entity_id: input_boolean.notify_line_emergency_enable
                                state: "on"
                            then:
                              - service: script.send_line_to_user
                                data:
                                  user_id: "{{ line_bot_target_user_id }}"
                                  payload: >-
                                    {{
                                      [
                                        {"type":"text","text": (notif_title_100c_alarm_safe|default(notif_title_base, true)|string)},
                                        {"type":"text","text":"🟥 門鎖電量完全沒電（0%）！\n請以行動電源供電後解鎖。\n此時「自動離家」與「網關保護」可能異常。"},
                                        {"type":"text","text": batt_line_text_line_safe|default('', true)|string}
                                      ] | tojson
                                    }}
                      - conditions:  # <5%
                          - condition: template
                            value_template: "{{ stage_now == 'LT5' }}"
                        sequence:
                          - service: notify.persistent_notification
                            data:
                              title: "{{ notif_title_alarm }}"
                              message: "🟥 門鎖電量低於 5%，隨時可能完全沒電，請立即更換！"
                          - if:
                              - condition: state
                                entity_id: input_boolean.notify_line_emergency_enable
                                state: "on"
                            then:
                              - service: script.send_line_to_user
                                data:
                                  user_id: "{{ line_bot_target_user_id }}"
                                  payload: >-
                                    {{
                                      [
                                        {"type":"text","text": (notif_title_100c_alarm_safe|default(notif_title_base, true)|string)},
                                        {"type":"text","text":"🟥 門鎖電量低於 5%，隨時可能完全沒電，請立即更換！"},
                                        {"type":"text","text": batt_line_text_line_safe|default('', true)|string}
                                      ] | tojson
                                    }}
                      - conditions:  # <15%
                          - condition: template
                            value_template: "{{ stage_now == 'LT15' }}"
                        sequence:
                          - service: notify.persistent_notification
                            data:
                              title: "{{ notif_title_warn }}"
                              message: "🟧 門鎖電量低於 15%，可能無法遠端或手機解鎖，請儘速更換或準備行動電源。"
                          - if:
                              - condition: state
                                entity_id: input_boolean.notify_line_important_enable
                                state: "on"
                            then:
                              - service: script.send_line_to_user
                                data:
                                  user_id: "{{ line_bot_target_user_id }}"
                                  payload: >-
                                    {{
                                      [
                                        {"type":"text","text": (notif_title_100c_warn_safe|default(notif_title_base, true)|string)},
                                        {"type":"text","text":"🟧 門鎖電量低於 15%，可能無法遠端或手機解鎖，請儘速更換或準備行動電源。"},
                                        {"type":"text","text": batt_line_text_line_safe|default('', true)|string}
                                      ] | tojson
                                    }}
                      - conditions:  # <35%
                          - condition: template
                            value_template: "{{ stage_now == 'LT35' }}"
                        sequence:
                          - service: notify.persistent_notification
                            data:
                              title: "{{ notif_title_warn }}"
                              message: "🟨 門鎖電量 35% 以下，建議安排電池更換。"
                          - if:
                              - condition: state
                                entity_id: input_boolean.notify_line_important_enable
                                state: "on"
                            then:
                              - service: script.send_line_to_user
                                data:
                                  user_id: "{{ line_bot_target_user_id }}"
                                  payload: >-
                                    {{
                                      [
                                        {"type":"text","text": (notif_title_100c_warn_safe|default(notif_title_base, true)|string)},
                                        {"type":"text","text":"🟨 門鎖電量 35% 以下，建議安排電池更換。"},
                                        {"type":"text","text": batt_line_text_line_safe|default('', true)|string}
                                      ] | tojson
                                    }}
                  # 成功通知後，寫回已通知等級
                  - service: input_text.set_value
                    data:
                      entity_id: input_text.doorlock_batt_last_stage
                      value: "{{ stage_now }}"
            default:
              - stop: "等級未變化（stage={{ stage_now }}），不重覆通知"
    default:
      - stop: "忽略：unknown → -1 假觸發（未送出任何通知）"
