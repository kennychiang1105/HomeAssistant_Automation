# ─────────────────────────────────────────────────────────────
# 08-5F頂樓自動上下樓情境AI (V3.0)
# 相容版本：Helpers V3.0
# 更新紀錄（統一格式）：
# - V3.0：統一命名規範、欄位標準化與通知標題版本同步。
# ─────────────────────────────────────────────────────────────
alias: 08-5F頂樓自動上下樓情境AI (V3.0)
id: ai_topfloor_stairs_scene
description: >
  V2.0 版頂樓上下樓情境：整合上樓/下樓判定、保護窗、雙黏著鎖與除錯快照輸出。
  依攝影機、AP 與光源狀態做多條件決策，避免誤判並提升情境切換穩定性。
mode: restart
max: 10
triggers:
  - id: t_leave_ai_confirmed
    event_type: ai_leave_confirmed
    event_data:
      who: kenny
    trigger: event
  - id: t_cam
    entity_id: binary_sensor.wu_lou_she_ying_ji_person_detected
    to: "on"
    trigger: state
  - id: t_ap_immediate_up
    value_template: >
      {% set s1 = states('input_text.iphone_tracker_entity_kenny') %} {% set s2
      = states('input_text.watch_tracker_entity_kenny') %} {% set iphone_ent =
      'device_tracker.iphone_17_pro_max_kenny' if s1 in
      ['unknown','unavailable',''] else s1 %} {% set watch_ent  =
      'device_tracker.apple_watch_ultra_3_kenny' if s2 in
      ['unknown','unavailable',''] else s2 %} {% set iphone_ap  =
      (state_attr(iphone_ent,'ap_mac')|default(''))|lower %} {% set watch_ap   =
      (state_attr(watch_ent,'ap_mac')|default(''))|lower %} {% set ap_raw     =
      states('input_text.topfloor_ap_macs_5f') %} {% set ap_list_raw =
      '70:a7:41:e4:54:1f,70:a7:41:e4:5a:bf,d0:21:f9:f2:fc:4c' if ap_raw in
      ['unknown','unavailable',''] else ap_raw %} {% set ap_list =
      (ap_list_raw|lower|replace('
      ','')|replace(';',',')|regex_findall('[^,]+')) %} {{ (iphone_ap in
      ap_list) or (watch_ap in ap_list) }}
    trigger: template
  - id: t_ap_left_phone
    value_template: >
      {% set s1 = states('input_text.iphone_tracker_entity_kenny') %} {% set
      iphone_ent = 'device_tracker.iphone_17_pro_max_kenny' if s1 in
      ['unknown','unavailable',''] else s1 %} {% set iphone_ap  =
      (state_attr(iphone_ent,'ap_mac')|default(''))|lower %} {% set ap_raw     =
      states('input_text.topfloor_ap_macs_5f') %} {% set ap_list_raw =
      '70:a7:41:e4:54:1f,70:a7:41:e4:5a:bf,d0:21:f9:f2:fc:4c' if ap_raw in
      ['unknown','unavailable',''] else ap_raw %} {% set ap_list =
      (ap_list_raw|lower|replace('
      ','')|replace(';',',')|regex_findall('[^,]+')) %} {{ iphone_ap not in
      ap_list }}
    trigger: template
  - id: t_ap_left_watch
    value_template: >
      {% set s2 = states('input_text.watch_tracker_entity_kenny') %} {% set
      watch_ent = 'device_tracker.apple_watch_ultra_3_kenny' if s2 in
      ['unknown','unavailable',''] else s2 %} {% set watch_ap  =
      (state_attr(watch_ent,'ap_mac')|default(''))|lower %} {% set ap_raw     =
      states('input_text.topfloor_ap_macs_5f') %} {% set ap_list_raw =
      '70:a7:41:e4:54:1f,70:a7:41:e4:5a:bf,d0:21:f9:f2:fc:4c' if ap_raw in
      ['unknown','unavailable',''] else ap_raw %} {% set ap_list =
      (ap_list_raw|lower|replace('
      ','')|replace(';',',')|regex_findall('[^,]+')) %} {{ watch_ap not in
      ap_list }}
    trigger: template
conditions:
  - condition: state
    entity_id: device_tracker.iphone_17_pro_max_kenny
    state: home
actions:
  - variables:
      _trig: "{{ (trigger.id | default('unknown')) | string }}"
      _iphone_ap_s: "{{ (iphone_ap | default('none')) | string }}"
      _watch_ap_s: "{{ (watch_ap  | default('none')) | string }}"
      _snap_json: |
        {{
          {
            "ts": now().isoformat(),
            "trigger": _trig,
            "iphone_ap": _iphone_ap_s,
            "watch_ap": _watch_ap_s,
            "iphone_ap_valid": (iphone_ap_valid | bool),
            "up_phone_raw": (upstairs_phone_raw | bool),
            "up_watch": (upstairs_watch | bool),
            "up_for_up": (upstairs_present_up | bool),
            "up_for_down": (upstairs_present_down | bool),
            "l1": (lamp1_on | bool),
            "l2": (lamp2_on | bool),
            "l2_bri": (lamp2_bri | int),
            "all_dark": (lights_all_off | bool),
            "off_or_dim": (lights_off_or_dim | bool),
            "recent_light_off": (recent_light_off | bool),
            "dark_15s": (dark_15s | bool),
            "sleep_silent": (sleep_silent_active | bool),
            "guard_active": (guard_active | bool),
            "lock_up_active": (lock_up_active | bool),
            "lock_down_active": (lock_down_active | bool)
          } | tojson
        }}
  - variables:
      _pretty: >
        {% set Y = '✅' %}{% set N = '❌' %} 🕒 {{ now().strftime('%Y-%m-%d
        %H:%M:%S') }} 🔔 Trigger: {{ _trig }} ───────────────────────────── 📶
        AP 狀態 • iPhone AP: {{ _iphone_ap_s }}（有效? {{ Y if iphone_ap_valid else N
        }}）→ 5F? {{ Y if upstairs_phone_raw else N }} • Watch  AP: {{
        _watch_ap_s }} → 5F? {{ Y if upstairs_watch else N }} • 上樓用(OR): {{ Y if
        upstairs_present_up else N }}　下樓用(Phone-保守): {{ Y if
        upstairs_present_down else N }} ───────────────────────────── 💡 燈光 •
        L1: {{ 'ON' if lamp1_on else 'off' }}　L2: {{ 'ON' if lamp2_on else 'off'
        }}　L2亮度: {{ lamp2_bri }} • 全黑(all off): {{ Y if lights_all_off else N
        }}　極暗/全暗(off_or_dim): {{ Y if lights_off_or_dim else N }} • 連續黑≥15s: {{
        Y if dark_15s else N }}　燈剛關({{ light_off_cooldown_sec }}s內): {{ Y if
        recent_light_off else N }} ───────────────────────────── 💤 睡眠靜默 • Sleep
        Window 啟用? {{ Y if sleep_silent_active else N }}（{{
        sleep_silent_start_min }}→{{ sleep_silent_end_min }} 分）
        ───────────────────────────── 🛡️ 保護窗 / 黏著鎖 • guard_active: {{ Y if
        guard_active else N }} • lock_up_active(上樓鎖): {{ Y if lock_up_active
        else N }} • lock_down_active(下樓鎖): {{ Y if lock_down_active else N }}
  - action: input_text.set_value
    target:
      entity_id: input_text.topfloor_debug_last_json
    data:
      value: "{{ (_snap_json | string)[:250] }}"
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ debug_on }}"
        sequence:
          - action: persistent_notification.create
            data:
              title: "[DEBUG] 頂樓偵測（可讀版）"
              message: "{{ _pretty }}"
          - action: persistent_notification.create
            data:
              title: "[DEBUG] 頂樓偵測快照（JSON）"
              message: "{{ _snap_json }}"
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ trigger.id in ['t_cam'] and lamp_was_on_recently }}"
        sequence:
          - action: timer.start
            target:
              entity_id: timer.topfloor_down_intent_guard
            data:
              duration: >-
                {{
                states('input_number.topfloor_cam_ambiguous_sec_kenny')|int(45)
                }}
  - choose:
      - conditions:
          condition: trigger
          id: t_leave_ai_confirmed
        sequence:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.ding_lou_xia_lou_qing_jing
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.ding_lou_shang_lou_qing_jing
          - action: timer.start
            target:
              entity_id: timer.topfloor_lock_after_down
            data:
              duration: 90
          - action: input_text.set_value
            target:
              entity_id: input_text.topfloor_debug_last_decision
            data:
              value: AI離家→下樓
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ debug_on }}"
                sequence:
                  - action: persistent_notification.create
                    data:
                      title: "[DEBUG] 決策"
                      message: AI離家→下樓
          - stop: AI離家→下樓完成
      - conditions:
          - condition: state
            entity_id: timer.topfloor_lock_after_down
            state: idle
          - condition: or
            conditions:
              - condition: trigger
                id: t_ap_immediate_up
              - condition: template
                value_template: "{{ upstairs_present_up }}"
          - condition: template
            value_template: "{{ (not recent_light_off) or (dark_15s) }}"
          - condition: template
            value_template: "{{ not guard_active }}"
          - condition: template
            value_template: "{{ lights_all_off }}"
          - condition: template
            value_template: "{{ not sleep_silent_active }}"
        sequence:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.ding_lou_shang_lou_qing_jing
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.ding_lou_xia_lou_qing_jing
          - action: timer.start
            target:
              entity_id: timer.topfloor_lock_after_up
            data:
              duration: 90
          - action: input_text.set_value
            target:
              entity_id: input_text.topfloor_debug_last_decision
            data:
              value: 上樓成立（AP即時/OR，全黑 + 非睡眠窗，黑≥15s 或非剛關燈）
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ debug_on }}"
                sequence:
                  - action: persistent_notification.create
                    data:
                      title: "[DEBUG] 決策"
                      message: 上樓成立（AP即時/OR，全黑 + 非睡眠窗，黑≥15s 或非剛關燈）
          - stop: 上樓成立（即時/OR）
      - conditions:
          - condition: state
            entity_id: timer.topfloor_lock_after_up
            state: idle
          - condition: or
            conditions:
              - condition: trigger
                id: t_ap_left_phone
              - condition: template
                value_template: >-
                  {{ (down_no_light_grace_sec|int) > 0 and (not
                  upstairs_present_down) }}
        sequence:
          - variables:
              __start: "{{ as_timestamp(now()) }}"
          - repeat:
              until:
                - condition: or
                  conditions:
                    - condition: template
                      value_template: |
                        {{ (not upstairs_present_down) and
                           ((as_timestamp(now()) - __start) >= (down_no_light_grace_sec | int)) }}
                    - condition: template
                      value_template: "{{ upstairs_present_down }}"
              sequence:
                - delay: "00:00:05"
                - choose:
                    - conditions:
                        - condition: template
                          value_template: "{{ upstairs_present_down }}"
                      sequence:
                        - variables:
                            __start: "{{ as_timestamp(now()) }}"
          - choose:
              - conditions:
                  - condition: template
                    value_template: |
                      {{ (not upstairs_present_down) and
                         ((as_timestamp(now()) - __start) >= (down_no_light_grace_sec | int)) }}
                sequence:
                  - action: input_boolean.turn_on
                    target:
                      entity_id: input_boolean.ding_lou_xia_lou_qing_jing
                  - action: input_boolean.turn_off
                    target:
                      entity_id: input_boolean.ding_lou_shang_lou_qing_jing
                  - action: timer.start
                    target:
                      entity_id: timer.topfloor_lock_after_down
                    data:
                      duration: 90
                  - action: input_text.set_value
                    target:
                      entity_id: input_text.topfloor_debug_last_decision
                    data:
                      value: 下樓成立（iPhone 連續 {{ down_no_light_hms }} 不在頂樓 AP）
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ debug_on }}"
                        sequence:
                          - action: persistent_notification.create
                            data:
                              title: "[DEBUG] 決策"
                              message: 下樓成立（iPhone 連續 {{ down_no_light_hms }} 不在頂樓 AP）
                  - stop: 下樓成立（iPhone 連續不在頂樓 AP）
      - conditions:
          - condition: state
            entity_id: timer.topfloor_lock_after_up
            state: idle
          - condition: or
            conditions:
              - condition: trigger
                id: t_ap_left_watch
              - condition: trigger
                id: t_cam
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ lamp_was_on_recently }}"
                sequence:
                  - action: timer.start
                    target:
                      entity_id: timer.topfloor_down_intent_guard
                    data:
                      duration: >-
                        {{
                        states('input_number.topfloor_cam_ambiguous_sec_kenny')|int(45)
                        }}
          - variables:
              __assist_end: "{{ as_timestamp(now()) + (down_assist_wait_sec | int) }}"
              __start: "{{ as_timestamp(now()) }}"
          - repeat:
              until:
                - condition: or
                  conditions:
                    - condition: template
                      value_template: |
                        {{ (not upstairs_present_down) and
                           ((as_timestamp(now()) - __start) >= (down_no_light_grace_sec | int)) }}
                    - condition: template
                      value_template: "{{ as_timestamp(now()) >= (__assist_end | float) }}"
              sequence:
                - delay: "00:00:05"
                - choose:
                    - conditions:
                        - condition: template
                          value_template: "{{ upstairs_present_down }}"
                      sequence:
                        - variables:
                            __start: "{{ as_timestamp(now()) }}"
          - choose:
              - conditions:
                  - condition: template
                    value_template: |
                      {{ (not upstairs_present_down) and
                         ((as_timestamp(now()) - __start) >= (down_no_light_grace_sec | int)) }}
                sequence:
                  - action: input_boolean.turn_on
                    target:
                      entity_id: input_boolean.ding_lou_xia_lou_qing_jing
                  - action: input_boolean.turn_off
                    target:
                      entity_id: input_boolean.ding_lou_shang_lou_qing_jing
                  - action: timer.start
                    target:
                      entity_id: timer.topfloor_lock_after_down
                    data:
                      duration: 90
                  - action: input_text.set_value
                    target:
                      entity_id: input_text.topfloor_debug_last_decision
                    data:
                      value: 下樓成立（Assist：iPhone 連續 {{ down_no_light_hms }} 不在頂樓）
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ debug_on }}"
                        sequence:
                          - action: persistent_notification.create
                            data:
                              title: "[DEBUG] 決策"
                              message: >-
                                下樓成立（Assist：iPhone 連續 {{ down_no_light_hms }}
                                不在頂樓）
                  - stop: 下樓成立（Assist 視窗）
      - conditions:
          condition: trigger
          id: t_cam
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ lamp_was_on_recently }}"
                sequence:
                  - action: timer.start
                    target:
                      entity_id: timer.topfloor_down_intent_guard
                    data:
                      duration: >-
                        {{
                        states('input_number.topfloor_cam_ambiguous_sec_kenny')|int(45)
                        }}
          - variables:
              start_ts: "{{ as_timestamp(now()) }}"
          - repeat:
              until:
                - condition: template
                  value_template: >
                    {{ (as_timestamp(now()) - start_ts) >
                    (monitor_window_sec|int) }}
              sequence:
                - choose:
                    - conditions:
                        - condition: state
                          entity_id: timer.topfloor_lock_after_down
                          state: idle
                        - condition: template
                          value_template: >
                            {{ upstairs_present_up and ((not recent_light_off)
                            or dark_15s) and (not guard_active) }}
                        - condition: template
                          value_template: "{{ lights_all_off }}"
                        - condition: template
                          value_template: "{{ not sleep_silent_active }}"
                      sequence:
                        - action: input_boolean.turn_on
                          target:
                            entity_id: input_boolean.ding_lou_shang_lou_qing_jing
                        - action: input_boolean.turn_off
                          target:
                            entity_id: input_boolean.ding_lou_xia_lou_qing_jing
                        - action: timer.start
                          target:
                            entity_id: timer.topfloor_lock_after_up
                          data:
                            duration: 90
                        - action: input_text.set_value
                          target:
                            entity_id: input_text.topfloor_debug_last_decision
                          data:
                            value: 上樓成立（視窗內立即，全黑 + 非睡眠窗，黑≥15s 或非剛關燈）
                        - choose:
                            - conditions:
                                - condition: template
                                  value_template: "{{ debug_on }}"
                              sequence:
                                - action: persistent_notification.create
                                  data:
                                    title: "[DEBUG] 決策"
                                    message: 上樓成立（視窗內立即，全黑 + 非睡眠窗，黑≥15s 或非剛關燈）
                        - stop: 上樓成立（視窗內立即）
                - choose:
                    - conditions:
                        - condition: state
                          entity_id: timer.topfloor_lock_after_up
                          state: idle
                        - condition: template
                          value_template: >-
                            {{ (not upstairs_present_down) and lights_off_or_dim
                            }}
                        - condition: template
                          value_template: "{{ not upstairs_present_up }}"
                      sequence:
                        - variables:
                            __start_cam_dn: "{{ as_timestamp(now()) }}"
                        - repeat:
                            until:
                              - condition: or
                                conditions:
                                  - condition: template
                                    value_template: >
                                      {{ (not upstairs_present_down) and
                                      lights_off_or_dim and
                                         ((as_timestamp(now()) - __start_cam_dn) >= 20) }}
                                  - condition: template
                                    value_template: >
                                      {{ upstairs_present_down or (not
                                      lights_off_or_dim) }}
                            sequence:
                              - delay: "00:00:05"
                              - choose:
                                  - conditions:
                                      - condition: template
                                        value_template: >
                                          {{ upstairs_present_down or (not
                                          lights_off_or_dim) }}
                                    sequence:
                                      - variables:
                                          __start_cam_dn: "{{ as_timestamp(now()) }}"
                        - choose:
                            - conditions:
                                - condition: template
                                  value_template: >
                                    {{ (not upstairs_present_down) and
                                    lights_off_or_dim and
                                       ((as_timestamp(now()) - __start_cam_dn) >= 20) }}
                              sequence:
                                - action: input_boolean.turn_on
                                  target:
                                    entity_id: input_boolean.ding_lou_xia_lou_qing_jing
                                - action: input_boolean.turn_off
                                  target:
                                    entity_id: input_boolean.ding_lou_shang_lou_qing_jing
                                - action: timer.start
                                  target:
                                    entity_id: timer.topfloor_lock_after_down
                                  data:
                                    duration: 90
                                - action: input_text.set_value
                                  target:
                                    entity_id: input_text.topfloor_debug_last_decision
                                  data:
                                    value: 下樓成立（視窗內 20s 連續燈關/極暗）
                                - choose:
                                    - conditions:
                                        - condition: template
                                          value_template: "{{ debug_on }}"
                                      sequence:
                                        - action: persistent_notification.create
                                          data:
                                            title: "[DEBUG] 決策"
                                            message: 下樓成立（視窗內 20s 連續燈關/極暗）
                                - stop: 下樓成立（視窗內）
                - delay: "00:00:10"
          - choose:
              - conditions:
                  - condition: state
                    entity_id: timer.topfloor_lock_after_down
                    state: idle
                  - condition: template
                    value_template: "{{ tail_grace_up_sec|int > 0 }}"
                  - condition: template
                    value_template: "{{ lights_all_off }}"
                  - condition: template
                    value_template: "{{ not sleep_silent_active }}"
                sequence:
                  - wait_template: >
                      {{ upstairs_present_up and ((not recent_light_off) or
                      dark_15s) and
                         (not guard_active) and lights_all_off and (not sleep_silent_active) }}
                    timeout: >
                      {{ '%02d:%02d:%02d'|format((tail_grace_up_sec//3600),
                      ((tail_grace_up_sec%3600)//60), (tail_grace_up_sec%60)) }}
                    continue_on_timeout: true
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ wait.completed }}"
                        sequence:
                          - action: input_boolean.turn_on
                            target:
                              entity_id: input_boolean.ding_lou_shang_lou_qing_jing
                          - action: input_boolean.turn_off
                            target:
                              entity_id: input_boolean.ding_lou_xia_lou_qing_jing
                          - action: timer.start
                            target:
                              entity_id: timer.topfloor_lock_after_up
                            data:
                              duration: 90
                          - action: input_text.set_value
                            target:
                              entity_id: input_text.topfloor_debug_last_decision
                            data:
                              value: 上樓成立（尾隨寬限，全黑 + 非睡眠窗，黑≥15s 或非剛關燈）
                          - choose:
                              - conditions:
                                  - condition: template
                                    value_template: "{{ debug_on }}"
                                sequence:
                                  - action: persistent_notification.create
                                    data:
                                      title: "[DEBUG] 決策"
                                      message: 上樓成立（尾隨寬限，全黑 + 非睡眠窗，黑≥15s 或非剛關燈）
                          - stop: 上樓成立（尾隨寬限）
          - choose:
              - conditions:
                  - condition: state
                    entity_id: timer.topfloor_lock_after_up
                    state: idle
                  - condition: template
                    value_template: "{{ tail_grace_down_sec|int > 0 }}"
                sequence:
                  - wait_template: "{{ (not upstairs_present_down) and lights_off_or_dim }}"
                    timeout: >
                      {{ '%02d:%02d:%02d'|format((tail_grace_down_sec//3600),
                      ((tail_grace_down_sec%3600)//60),
                      (tail_grace_down_sec%60)) }}
                    continue_on_timeout: true
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ wait.completed }}"
                        sequence:
                          - action: input_boolean.turn_on
                            target:
                              entity_id: input_boolean.ding_lou_xia_lou_qing_jing
                          - action: input_boolean.turn_off
                            target:
                              entity_id: input_boolean.ding_lou_shang_lou_qing_jing
                          - action: timer.start
                            target:
                              entity_id: timer.topfloor_lock_after_down
                            data:
                              duration: 90
                          - action: input_text.set_value
                            target:
                              entity_id: input_text.topfloor_debug_last_decision
                            data:
                              value: 下樓成立（尾隨寬限）
                          - choose:
                              - conditions:
                                  - condition: template
                                    value_template: "{{ debug_on }}"
                                sequence:
                                  - action: persistent_notification.create
                                    data:
                                      title: "[DEBUG] 決策"
                                      message: 下樓成立（尾隨寬限）
                          - stop: 下樓成立（尾隨寬限）
variables:
  automation_version: "V3.0"
  iphone_entity: >
    {% set s = states('input_text.iphone_tracker_entity_kenny') %} {{
    'device_tracker.iphone_17_pro_max_kenny' if s in
    ['unknown','unavailable',''] else s }}
  watch_entity: >
    {% set s = states('input_text.watch_tracker_entity_kenny') %} {{
    'device_tracker.apple_watch_ultra_3_kenny' if s in
    ['unknown','unavailable',''] else s }}
  ap_list_raw: >
    {% set s = states('input_text.topfloor_ap_macs_5f') %} {{
    '70:a7:41:e4:54:1f,70:a7:41:e4:5a:bf,d0:21:f9:f2:fc:4c' if s in
    ['unknown','unavailable',''] else s }}
  ap_list: >
    {{ ap_list_raw | lower | replace(' ','') | replace(';',',') |
    regex_findall('[^,]+') }}
  iphone_ap: "{{ (state_attr(iphone_entity, 'ap_mac') | default('')) | lower }}"
  watch_ap: "{{ (state_attr(watch_entity,  'ap_mac') | default('')) | lower }}"
  upstairs_phone_raw: "{{ iphone_ap in ap_list }}"
  upstairs_watch: "{{ watch_ap in ap_list }}"
  iphone_ap_valid: "{{ iphone_ap not in ['', 'unknown', 'unavailable', none] }}"
  upstairs_present_up: "{{ upstairs_phone_raw or upstairs_watch }}"
  upstairs_present_down: |
    {% if iphone_ap_valid %}
      {{ upstairs_phone_raw }}
    {% else %}
      true
    {% endif %}
  lamp1_on: "{{ is_state('light.yeelink_lamp2_678c_light', 'on') }}"
  lamp2_on: "{{ is_state('light.yeelink_bslamp2_4329_light', 'on') }}"
  lamp2_bri: >-
    {{ (state_attr('light.yeelink_bslamp2_4329_light', 'brightness') | int(0))
    }}
  lights_all_off: "{{ (not lamp1_on) and (not lamp2_on) }}"
  lights_off_or_dim: "{{ (not lamp1_on) and (not lamp2_on or lamp2_bri <= 3) }}"
  light_off_cooldown_sec: "{{ states('input_number.topfloor_light_off_cooldown_sec_kenny')|int(30) }}"
  recent_light_off: >
    {% set now_ts = as_timestamp(now()) %} {% set l1 =
    states.light.yeelink_lamp2_678c_light %} {% set l2 =
    states.light.yeelink_bslamp2_4329_light %} {% set off1 = (l1.state == 'off')
    and ((now_ts - as_timestamp(l1.last_changed)) <
    (light_off_cooldown_sec|int)) %} {% set off2 = (l2.state == 'off') and
    ((now_ts - as_timestamp(l2.last_changed)) < (light_off_cooldown_sec|int)) %}
    {{ off1 or off2 }}
  dark_15s: >
    {% set now_ts = as_timestamp(now()) %} {% set l1 =
    states.light.yeelink_lamp2_678c_light %} {% set l2 =
    states.light.yeelink_bslamp2_4329_light %} {% set l1_ok = (l1.state ==
    'off') and ((now_ts - as_timestamp(l1.last_changed)) >= 15) %} {% set l2_ok
    = ((l2.state == 'off') or
    ((state_attr('light.yeelink_bslamp2_4329_light','brightness')|int(0)) <= 3))
    and ((now_ts - as_timestamp(l2.last_changed)) >= 15) %} {{ l1_ok and l2_ok
    }}
  monitor_window_sec: "{{ (states('input_number.topfloor_cam_window_min_kenny')|int(6)) * 60 }}"
  tail_grace_up_sec: "{{ (states('input_number.topfloor_tail_grace_up_min_kenny')|int(3)) * 60 }}"
  tail_grace_down_sec: >-
    {{ (states('input_number.topfloor_tail_grace_down_min_kenny')|int(3)) * 60
    }}
  up_stable_hms: "00:00:15"
  down_stable_hms: "00:00:20"
  down_no_light_grace_sec: "{{ states('input_number.topfloor_down_no_light_grace_sec_kenny')|int(120) }}"
  down_no_light_hms: >
    {{ '%02d:%02d:%02d'|format((down_no_light_grace_sec//3600),
    ((down_no_light_grace_sec%3600)//60), (down_no_light_grace_sec%60)) }}
  down_assist_wait_sec: "{{ states('input_number.topfloor_down_assist_wait_sec_kenny')|int(180) }}"
  down_assist_hms: >
    {{ '%02d:%02d:%02d'|format((down_assist_wait_sec//3600),
    ((down_assist_wait_sec%3600)//60), (down_assist_wait_sec%60)) }}
  lamp_was_on_recently: >
    {% set now_ts = as_timestamp(now()) %} {% set l1 =
    states.light.yeelink_lamp2_678c_light %} {% set l2 =
    states.light.yeelink_bslamp2_4329_light %} {% set on1 = (l1.state == 'on')
    or ((now_ts - as_timestamp(l1.last_changed)) < 60 and l1.state == 'off') %}
    {% set on2 = (l2.state == 'on') or ((now_ts - as_timestamp(l2.last_changed))
    < 60 and l2.state == 'off') %} {{ on1 or on2 }}
  sleep_silent_start_min: "{{ states('input_number.sleep_silent_start_min')|int(150) }}"
  sleep_silent_end_min: "{{ states('input_number.sleep_silent_end_min')|int(540) }}"
  _now_minute_of_day: "{{ now().hour*60 + now().minute }}"
  sleep_silent_active: >
    {% set s = sleep_silent_start_min|int %} {% set e = sleep_silent_end_min|int
    %} {% set n = _now_minute_of_day|int %} {% if s <= e %}
      {{ n >= s and n < e }}
    {% else %}
      {{ n >= s or  n < e }}
    {% endif %}
  guard_active: "{{ not is_state('timer.topfloor_down_intent_guard','idle') }}"
  lock_up_active: "{{ not is_state('timer.topfloor_lock_after_up','idle') }}"
  lock_down_active: "{{ not is_state('timer.topfloor_lock_after_down','idle') }}"
  debug_on: "{{ is_state('input_boolean.debug_topfloor_kenny', 'on') }}"
