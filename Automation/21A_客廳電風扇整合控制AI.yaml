# ─────────────────────────────────────────────────────────────
# 21A_客廳電風扇整合控制AI (V2.2)   （Helpers V2.3 相容）
# 更新重點：
# 1) 體感溫度修正：即使非自動風速模式，偵測到有效感測值也會寫回體感溫度 Helper，避免卡在 10°C。
#
# ----- 上次更新紀錄 -----
# V2.1：
# 1) 風速曲線調整：改為20%~100%風速，29°C以上為100%，並區分夏季/非夏季模式(-5%)。
# 2) 體感溫度實體：新增 input_number Helper，用於顯示目前有效體感溫度。
# V2.0：
# 1) 版本號升級：升級至 V2 Beta 2，與 Helper V2.2 同步，並統一更新日誌格式。
# 2) 命名修正：修正 alias 以符合檔案名稱格式。
# ─────────────────────────────────────────────────────────────

alias: 21A_客廳電風扇整合控制AI (V2.2)
id: ai_21a_living_room_fan_integrated_control
description: "整合溫控、防關閉、夏季模式的雙模式自動化"
mode: queued
max: 10

trigger:
  - platform: state
    entity_id:
      - sensor.kong_qi_qing_jing_ji_temperature
      - sensor.kong_qi_qing_jing_ji_humidity
      - sensor.kitchenm_wen_du
      - sensor.kitchenm_shi_du
    id: sensor_change
    for: "00:00:10"
  - platform: state
    entity_id: fan.ke_ting_dian_feng_shan
    id: fan_change
  - platform: state
    entity_id: light.yeelink_color5_4181_light
    to: "on"
    id: light_on
  - platform: state
    entity_id:
      - input_boolean.living_room_fan_auto_speed_mode
      - input_boolean.living_room_fan_prevent_off_mode
    id: mode_change

variables:
  automation_version: "V2.2.0"
  # ---- Modes ----
  auto_speed_mode: "{{ is_state('input_boolean.living_room_fan_auto_speed_mode', 'on') }}"
  prevent_off_mode: "{{ is_state('input_boolean.living_room_fan_prevent_off_mode', 'on') }}"
  summer_mode: "{{ is_state('input_boolean.summer_mode','on') }}"
  snooze_active: "{{ is_state('timer.living_room_fan_light_sync_snooze', 'active') }}"
  light_is_on: "{{ is_state('light.yeelink_color5_4181_light', 'on') }}"

  # ---- Debug & Fan State ----
  debug_notify: "{{ is_state('input_boolean.living_room_fan_debug_notify','on') }}"
  fan_pct_now: "{{ state_attr('fan.ke_ting_dian_feng_shan','percentage') | int(0) }}"

  # ---- Sensor Logic (copied from V2) ----
  primary_temp: "{{ states('sensor.kong_qi_qing_jing_ji_temperature') | float(None) }}"
  primary_humidity: "{{ states('sensor.kong_qi_qing_jing_ji_humidity') | float(None) }}"
  primary_valid: >-
    {% set temp_valid = (primary_temp is not none) and (10 < primary_temp < 45) %}
    {% set hum_valid = (primary_humidity is not none) and (0 < primary_humidity <= 100) %}
    {{ temp_valid and hum_valid }}
  fallback_temp: "{{ states('sensor.kitchenm_wen_du') | float(None) }}"
  fallback_humidity: "{{ states('sensor.kitchenm_shi_du') | float(None) }}"
  fallback_valid: >-
    {% set temp_valid = (fallback_temp is not none) and (10 < fallback_temp < 45) %}
    {% set hum_valid = (fallback_humidity is not none) and (0 < fallback_humidity <= 100) %}
    {{ temp_valid and hum_valid }}
  active_temp: "{{ primary_temp if primary_valid else fallback_temp }}"
  active_humidity: "{{ primary_humidity if primary_valid else fallback_humidity }}"
  active_sensor_name: "{{ '空氣清淨機' if primary_valid else ('廚房' if fallback_valid else '無') }}"
  humidity_bonus_c: >-
    {% if active_humidity is not none %}
      {% if active_humidity > 75 %} 1.5
      {% elif active_humidity > 60 %} 1.0
      {% elif active_humidity > 50 %} 0.5
      {% else %} 0 {% endif %}
    {% else %} 0 {% endif %}
  t_eff: >-
    {% if active_temp is not none %}
      {{ active_temp + humidity_bonus_c }}
    {% else %}
      none
    {% endif %}
  t_eff_valid: "{{ t_eff is not none }}"
  desired_pct_curve: >-
    {% if not t_eff_valid %} {{ fan_pct_now }}
    {% else %}
      {% set t = t_eff | float %}
      {% set summer_pct = 0 %}
      {% if t > 29.0 %}      {% set summer_pct = 100 %}
      {% elif t > 28.5 %}    {% set summer_pct = 90 %}
      {% elif t > 28.0 %}    {% set summer_pct = 80 %}
      {% elif t > 27.5 %}    {% set summer_pct = 70 %}
      {% elif t > 27.0 %}    {% set summer_pct = 60 %}
      {% elif t > 26.5 %}    {% set summer_pct = 50 %}
      {% elif t > 26.0 %}    {% set summer_pct = 40 %}
      {% elif t > 25.5 %}    {% set summer_pct = 30 %}
      {% else %}              {% set summer_pct = 20 %}
      {% endif %}

      {% if summer_mode %}
        {{ summer_pct }}
      {% else %}
        {% if summer_pct == 100 %}
          {{ 100 }}
        {% else %}
          {{ [summer_pct - 5, 20] | max }}
        {% endif %}
      {% endif %}
    {% endif %}

action:
  - choose:
      # === PRIORITY 1: 防關閉模式的兒童鎖控制 ===
      - conditions:
          - condition: trigger
            id: mode_change
          - "{{ trigger.entity_id == 'input_boolean.living_room_fan_prevent_off_mode' }}"
        sequence:
          - choose:
              - conditions:
                  - "{{ trigger.to_state.state == 'on' }}"
                sequence:
                  - service: xiaomi_miio_fan.fan_set_child_lock_on
                    target:
                      entity_id: fan.ke_ting_dian_feng_shan
              - conditions:
                  - "{{ trigger.to_state.state == 'off' }}"
                sequence:
                  - service: xiaomi_miio_fan.fan_set_child_lock_off
                    target:
                      entity_id: fan.ke_ting_dian_feng_shan

      # === PRIORITY 2: 手動關閉風扇 (防關閉模式 vs 自動風速模式的區別處理) ===
      - conditions:
          - condition: trigger
            id: fan_change
          - "{{ trigger.to_state.state == 'off' }}"
        sequence:
          - choose:
              # Case A: 防關閉模式開啟 -> 強制重開 (並觸發21B警報)
              - conditions:
                  - "{{ prevent_off_mode }}"
                sequence:
                  - service: fan.turn_on
                    target:
                      entity_id: fan.ke_ting_dian_feng_shan
              # Case B: 夏季燈光連動模式 -> 啟動暫停
              - conditions:
                  - "{{ auto_speed_mode }}"
                  - "{{ summer_mode }}"
                  - "{{ light_is_on }}"
                sequence:
                  - service: timer.start
                    target:
                      entity_id: timer.living_room_fan_light_sync_snooze
                  - if:
                      - "{{ debug_notify }}"
                    then:
                      - service: notify.persistent_notification
                        data:
                          title: "客廳風扇 (Debug)"
                          message: "風扇被手動關閉，已啟動燈光連動暫停 1 小時。"
                  - stop: "Snooze for light-sync started"
              # Case C: 只是自動風速模式 -> 允許關閉，不執行任何動作
              - conditions:
                  - "{{ auto_speed_mode }}"
                sequence:
                  - stop: "Auto-speed mode allows manual turn off"

      # === PRIORITY 3: 夏季模式開燈 (自動風速模式) ===
      - conditions:
          - condition: trigger
            id: light_on
          - "{{ auto_speed_mode }}"
          - "{{ summer_mode }}"
          - "{{ not snooze_active }}"
          - "{{ is_state('fan.ke_ting_dian_feng_shan', 'off') }}"
        sequence:
          - service: fan.turn_on
            target:
              entity_id: fan.ke_ting_dian_feng_shan
          - if:
              - "{{ debug_notify }}"
            then:
              - service: notify.persistent_notification
                data:
                  title: "客廳風扇 (Debug)"
                  message: "夏季模式下，因燈光開啟而連動開啟風扇。"

      # === PRIORITY 4: 體感溫度調整 (自動風速模式) ===
      - conditions:
          - condition: trigger
            id: sensor_change
          - "{{ t_eff_valid }}"
        sequence:
          - if:
            - condition: template
              value_template: "{{ t_eff != states('input_number.living_room_effective_apparent_temperature') | float(0) }}"
            then:
              - service: input_number.set_value
                target:
                  entity_id: input_number.living_room_effective_apparent_temperature
                data:
                  value: "{{ t_eff }}"
          - if:
              - "{{ auto_speed_mode }}"
              - "{{ is_state('fan.ke_ting_dian_feng_shan', 'on') }}"
            then:
              - variables:
                  desired_pct: "{{ desired_pct_curve | int }}"
                  need_update: "{{ (desired_pct - fan_pct_now) | abs >= 5 }}"
              - if:
                  - "{{ need_update }}"
                then:
                  - service: fan.set_percentage
                    target:
                      entity_id: fan.ke_ting_dian_feng_shan
                    data:
                      percentage: "{{ desired_pct }}"
                  - if:
                      - "{{ debug_notify }}"
                    then:
                      - service: notify.persistent_notification
                        data:
                          title: "客廳風扇風速調整 (Debug)"
                          message: >
                            🔄 新風速={{ desired_pct }}%｜體感t_eff={{ '%.1f'|format(t_eff|float) }}°C
                            (來源: {{ active_sensor_name }}｜T={{ '%.1f'|format(active_temp|float) }}°C, H={{ '%.1f'|format(active_humidity|float) }}%)
