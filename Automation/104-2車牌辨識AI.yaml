# ─────────────────────────────────────────────
# 104-2車牌辨識AI_Beta (V1 Beta 1)
# 更新重點（相對 Ａlpha V3）：
# 1) 版本號更新 (Alpha 4 → Beta 1)
# 2) 啟用真實開門：LPR 偵測後將實際開門，不再只是發送通知。
# 相容版本：Helpers V1 Beta 15
# ─────────────────────────────────────────────
alias: 104-2車牌辨識AI_Beta (V1 Beta 1)
id: 104-2_lpr_ai_beta
description: >
  兩輛車（EAK8030、REA9519）— 多 Webhook；即時門控監測；可取消式關門評估；
  UI 可切換「只通知 / 實際關門」。不含加密。
mode: single
max_exceeded: silent

trigger:
  # LPR — EAK8030
  - id: t_eak8030
    platform: webhook
    webhook_id: lpr_gate_eak8030
    allowed_methods: [GET, POST]   # 方便測試；穩定後可改回 [POST]
    local_only: false
  # LPR — REA9519
  - id: t_rea9519
    platform: webhook
    webhook_id: lpr_gate_rea9519
    allowed_methods: [GET, POST]
    local_only: false
  # 鐵門一開就觸發
  - id: t_gate_open_instant
    platform: state
    entity_id: cover.garage
    to: "open"

variables:
  # 來源車牌與名稱
  plate: >-
    {% if trigger.id == 't_eak8030' %}EAK8030
    {% elif trigger.id == 't_rea9519' %}REA9519
    {% else %}未知{% endif %}
  car_name: >-
    {% if plate == 'EAK8030' %}Kenny車
    {% elif plate == 'REA9519' %}家用車
    {% else %}未知車輛{% endif %}

  # 基本環境
  event_time: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
  gate_state: "{{ states('cover.garage') }}"
  debug_on: "{{ is_state('input_boolean.lpr_debug_notify','on') }}"
  auto_close_enabled: "{{ is_state('input_boolean.lpr_auto_close_enable','on') }}"
  delay_minutes: "{{ states('input_number.lpr_auto_close_delay_min') | int(3) }}"

  # 安防與人形
  alarm_entity: alarm_control_panel.home
  person_sensor: binary_sensor.che_ku_she_ying_ji_person_detected
  arm_away_now: "{{ is_state(alarm_entity, 'armed_away') }}"
  nobody_now: "{{ is_state(person_sensor, 'off') }}"
  arm_away_text: "{{ 'Arm Away' if arm_away_now else '非 Arm Away' }}"
  nobody_text: "{{ '無人' if nobody_now else '有人' }}"

  # LPR 當下「開門」預判（仍不實作動）
  should_open_now: "{{ is_state('cover.garage','closed') }}"
  open_decision_text: "{{ '預判：會開門' if should_open_now else '預判：不開門（門已開或條件不符）' }}"

action:
  - choose:
      # ① LPR 事件（EAK8030 / REA9519）
      - conditions:
          - condition: template
            value_template: "{{ trigger.id in ['t_eak8030','t_rea9519'] }}"
        sequence:
          # 記錄最後事件（255 硬截斷）
          - service: input_text.set_value
            data:
              entity_id: input_text.lpr_last_event
              value: >-
                {{
                  (event_time ~ " | 來源:LPR | 車牌:" ~ plate ~
                  " (" ~ car_name ~ ") | 鐵門:" ~ gate_state)[:255]
                }}
          # UI 顯示最近車牌
          - service: input_select.select_option
            data:
              entity_id: input_select.lpr_last_plate
              option: "{{ '未偵測' if plate=='未知' else plate }}"
          # 根據預判，執行開門或僅通知
          - choose:
              # 條件符合：關閉狀態下收到 LPR -> 開門
              - conditions:
                  - condition: template
                    value_template: "{{ should_open_now }}"
                sequence:
                  - service: cover.open_cover
                    target:
                      entity_id: cover.garage
                  - service: persistent_notification.create
                    data:
                      title: "✅ LPR 開門指令已執行 (Beta 1)"
                      message: >-
                        時間：{{ event_time }}
                        車牌：{{ plate }}（{{ car_name }}）
                        指令：開門 (因鐵門為關閉狀態)
              # 條件不符：門已開 -> 僅通知
              - conditions:
                  - condition: template
                    value_template: "{{ not should_open_now }}"
                sequence:
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ debug_on }}"
                        sequence:
                          - service: persistent_notification.create
                            data:
                              title: "ℹ️ LPR 事件通知 (Beta 1)"
                              message: >-
                                時間：{{ event_time }}
                                車牌：{{ plate }}（{{ car_name }}）
                                狀態：鐵門已開，不重複執行開門。

      # ② 鐵門開啟 → 進入「可取消」的延遲關門評估
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 't_gate_open_instant' }}"
        sequence:
          # 立即記錄（255 硬截斷）
          - service: input_text.set_value
            data:
              entity_id: input_text.lpr_last_event
              value: >-
                {{
                  (event_time ~ " | 來源:GateOpen | 車牌:N/A | 鐵門:" ~ gate_state)[:255]
                }}
          # 告知開始計時（只通知）
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ debug_on }}"
                sequence:
                  - service: persistent_notification.create
                    data:
                      title: "🛗 鐵門已開啟（Beta 1）"
                      message: >-
                        開始 {{ delay_minutes }} 分鐘關門評估視窗。
                        若期間偵測到人或新 LPR 事件，將取消自動關門。

          # —— 進入「可取消」的等待視窗 —— #
          - wait_for_trigger:
              - platform: state
                entity_id: binary_sensor.che_ku_she_ying_ji_person_detected  # 固定填實體ID
                to: "on"
              - platform: webhook
                webhook_id: lpr_gate_eak8030
              - platform: webhook
                webhook_id: lpr_gate_rea9519
            timeout:
              seconds: "{{ delay_minutes | int(3) * 60 }}"
            continue_on_timeout: true

          # 有事件發生 ⇒ 取消自動關門
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ wait.trigger is not none }}"
                sequence:
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ debug_on }}"
                        sequence:
                          - service: persistent_notification.create
                            data:
                              title: "⛔ 已取消關門評估"
                              message: >-
                                原因：{{ '偵測到人' if wait.trigger.platform=='state' else '收到新 LPR 事件' }}。
                                本次不執行自動關門。
                  - stop: "Canceled by presence/LPR"

          # 視窗結束且「沒有」取消 ⇒ 做條件式判斷
          - variables:
              arm_away_later: "{{ is_state(alarm_entity, 'armed_away') }}"
              nobody_later: "{{ is_state(person_sensor, 'off') }}"
              gate_still_open: "{{ is_state('cover.garage','open') }}"
          - choose:
              # 符合條件：Arm Away + 無人 + 門仍開
              - conditions:
                  - condition: template
                    value_template: "{{ gate_still_open and arm_away_later and nobody_later }}"
                sequence:
                  - choose:
                      # 啟用自動關門：真的關門
                      - conditions:
                          - condition: template
                            value_template: "{{ auto_close_enabled }}"
                        sequence:
                          - service: cover.close_cover
                            target:
                              entity_id: cover.garage
                          - service: persistent_notification.create
                            data:
                              title: "🤖 自動關門已執行"
                              message: >-
                                視窗結束：Arm Away + 無人 + 門仍開 ⇒ 已下達關門。
                      # 未啟用：只通知
                      - conditions:
                          - condition: template
                            value_template: "{{ not auto_close_enabled }}"
                        sequence:
                          - service: persistent_notification.create
                            data:
                              title: "🤖（預備）條件式關門：會關"
                              message: >-
                                視窗結束：Arm Away + 無人 + 門仍開 ⇒ 預判會關門。
                                （目前僅通知；開啟『LPR自動關門』即可生效）
              # 不符合條件：不關
              - conditions:
                  - condition: template
                    value_template: "{{ not (gate_still_open and arm_away_later and nobody_later) }}"
                sequence:
                  - service: persistent_notification.create
                    data:
                      title: "🙂（預備）條件式關門：不關"
                      message: >-
                        視窗結束但條件未滿足：保全={{ 'Arm Away' if arm_away_later else '非 Arm Away' }}、
                        人形={{ '無人' if nobody_later else '有人' }}、鐵門={{ '仍開啟' if gate_still_open else '已關閉' }}。
                        本次不關門（或已關）。
    default: []
