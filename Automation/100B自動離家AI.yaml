# ─────────────────────────────────────────────────────────────
# 100B自動離家AI (V2.0)   （Helpers V2.2 相容）
# 更新重點（相對 V1 Beta 9）：
# 1) 版本號升級：升級至 V2.0，與 Helper V2.2 同步，並統一更新日誌格式。
# 2) 通知優化：新增 HA 系統通知，並將 LINE 重要/緊急通知開關與 Helpers V2.2 同步。
# ─────────────────────────────────────────────────────────────
alias: "100B自動離家AI (V2.0)"
id: automation.100b_ai_leave_v1beta9
description: ""
mode: single

triggers:
  - entity_id: device_tracker.iphone_17_pro_max_kenny
    to: not_home
    for: {seconds: 10}
    trigger: state
  - entity_id: device_tracker.iphone_13_pro_max_iris_2
    to: not_home
    for: {seconds: 10}
    trigger: state
  - entity_id: device_tracker.iphone_16_jerry
    to: not_home
    for: {seconds: 10}
    trigger: state
  - entity_id: device_tracker.unifi_16_cc_a1_4d_4f_42_default
    to: not_home
    for: {seconds: 10}
    trigger: state

conditions:
  - condition: and
    conditions:
      - condition: state
        entity_id: device_tracker.unifi_16_cc_a1_4d_4f_42_default
        state: not_home
      - condition: state
        entity_id: device_tracker.iphone_17_pro_max_kenny
        state: not_home
      - condition: state
        entity_id: device_tracker.iphone_13_pro_max_iris_2
        state: not_home
      - condition: state
        entity_id: device_tracker.iphone_16_jerry
        state: not_home
  - condition: or
    conditions:
      - condition: not
        conditions:
          - condition: state
            entity_id: device_tracker.unifi_16_cc_a1_4d_4f_42_default
            state: not_home
            for: {minutes: 10}
      - condition: not
        conditions:
          - condition: state
            entity_id: device_tracker.iphone_17_pro_max_kenny
            state: not_home
            for: {minutes: 10}
      - condition: not
        conditions:
          - condition: state
            entity_id: device_tracker.iphone_13_pro_max_iris_2
            state: not_home
            for: {minutes: 10}
      - condition: not
        conditions:
          - condition: state
            entity_id: device_tracker.iphone_16_jerry
            state: not_home
            for: {minutes: 10}

variables:
  notif_title_base: "【AI離家系統 V2.0】"
  notif_title_general: >-
    {% set title = states('input_text.notif_title_general') %}
    {{ title if title|trim and title|lower not in ['unknown','unavailable','none'] else '【AI離家系統 V2.0】' }}
  notif_title_urgent: >-
    {% set title = states('input_text.notif_title_urgent') %}
    {{ title if title|trim and title|lower not in ['unknown','unavailable','none'] else '【AI離家系統 V2.0】' }}

  debounce_sec: 120
  debounce_ok: >-
    {% set last = state_attr(this.entity_id, 'last_triggered') %}
    {% set delta = (as_timestamp(now()) - as_timestamp(last)) if last else 999999 %}
    {{ delta > debounce_sec }}

  arm_away_timeout_sec: 5

  doorlock_batt: "{{ states('sensor.ke_ting_men_suo_dian_liang_guo_lu')|float(-1) }}"
  batt_valid: "{{ doorlock_batt >= 0 }}"
  batt50: "{{ batt_valid and doorlock_batt < 50 }}"
  batt10: "{{ batt_valid and doorlock_batt < 10 }}"
  batt0: "{{ batt_valid and doorlock_batt < 1 }}"

actions:
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ not debounce_ok }}"
        sequence:
          - stop: "防抖中（{{ debounce_sec }} 秒內重複觸發）—已跳過通知"

  - event: ai_leave_confirmed
    event_data:
      who: kenny
      reason: "automation.100b_ai_leave_v1beta9 conditions passed — {{ automation_version }} / {{ helpers_compat }}"

  # 若尚未 armed_away → 觸發離家情境
  - choose:
      - conditions:
          - condition: template
            value_template: >
              {{ states('alarm_control_panel.54ef44cf58f9_alarm') != 'armed_away' }}
        sequence:
          - service: automation.trigger
            target:
              entity_id: automation.101li_jia_qing_jing
            data: {skip_condition: true}
          - wait_template: >
              {{ states('alarm_control_panel.54ef44cf58f9_alarm') == 'armed_away' }}
            timeout: "00:00:{{ arm_away_timeout_sec }}"
            continue_on_timeout: true
          - choose:
              - conditions:
                  - condition: template
                    value_template: >
                      {{ states('alarm_control_panel.54ef44cf58f9_alarm') != 'armed_away' }}
                sequence:
                  - service: notify.persistent_notification
                    data:
                      title: "{{ notif_title_urgent }}"
                      message: "已判定離家，已執行離家情境，但保全系統未成功設定外出模式（目前狀態：{{ states('alarm_control_panel.54ef44cf58f9_alarm') }}）。"
                  - if:
                      - condition: state
                        entity_id: input_boolean.notify_line_emergency_enable
                        state: "on"
                    then:
                      - service: script.send_line_to_user
                        data:
                          user_id: C26ff4e9d30159ba5264a1676f46f8f86
                          payload: >-
                            {{
                              [
                                {"type":"text","text": (states('input_text.notif_title_urgent') if states('input_text.notif_title_urgent')|trim and states('input_text.notif_title_urgent')|lower not in ['unknown','unavailable','none'] else '【AI離家系統 V2.0】')},
                                {"type":"text","text": "已判定離家，已執行離家情境，但保全系統未成功設定外出模式（目前狀態："
                                                         ~ states('alarm_control_panel.54ef44cf58f9_alarm') ~ "）。"},
                                {"type":"text","text": (states('sensor.batt_line_text') if states('sensor.batt_line_text')|trim and states('sensor.batt_line_text')|lower not in ['unknown','unavailable','none'] else "（無門鎖電量異常）")}
                              ] | tojson
                            }}

  - choose:
      - conditions:
          - condition: and
            conditions:
              - condition: state
                entity_id: cover.garage
                state: closed
              - condition: or
                conditions:
                  - condition: state
                    entity_id: input_boolean.er_lou_men_suo_tong_bu_kai_guan
                    state: "off"
                  - condition: template
                    value_template: "{{ batt0 }}"
              - condition: state
                entity_id: alarm_control_panel.54ef44cf58f9_alarm
                state: armed_away
        sequence:
          - service: notify.persistent_notification
            data:
              title: "{{ notif_title_general }}"
              message: "系統偵測所有人已離家，家電皆為關閉狀態，且門鎖皆已上鎖，已啟動離家模式。"
          - if:
              - condition: state
                entity_id: input_boolean.notify_line_important_enable
                state: "on"
            then:
              - service: script.send_line_to_user
                data:
                  user_id: C26ff4e9d30159ba5264a1676f46f8f86
                  payload: >-
                    {{
                      (
                        [
                          {"type":"text","text": (states('input_text.notif_title_general') if states('input_text.notif_title_general')|trim and states('input_text.notif_title_general')|lower not in ['unknown','unavailable','none'] else '【AI離家系統 V2.0】')},
                          {"type":"text","text":"系統偵測所有人已離家，家電皆為關閉狀態，且門鎖皆已上鎖，已啟動離家模式。"}
                        ] +
                        ([{"type":"text","text": states('sensor.batt_line_text')}] if (states('sensor.batt_line_text')|trim and states('sensor.batt_line_text')|lower not in ['unknown','unavailable','none']) else [])
                      ) | tojson
                    }}

      - conditions:
          - condition: and
            conditions:
              - condition: template
                value_template: >-
                  {% set garage_open = is_state('cover.garage','open') %}
                  {% set lock_on = is_state('input_boolean.er_lou_men_suo_tong_bu_kai_guan','on') %}
                  {{ garage_open or (lock_on and (not batt0)) }}
              - condition: state
                entity_id: alarm_control_panel.54ef44cf58f9_alarm
                state: armed_away
        sequence:
          - service: notify.persistent_notification
            data:
              title: "{{ notif_title_urgent }}"
              message: "系統偵測所有人已離家，家電皆為關閉狀態但門鎖尚未上鎖！請確認鐵門及二樓門鎖狀況！"
          - if:
              - condition: state
                entity_id: input_boolean.notify_line_emergency_enable
                state: "on"
            then:
              - service: script.send_line_to_user
                data:
                  user_id: C26ff4e9d30159ba5264a1676f46f8f86
                  payload: >-
                    {{
                      (
                        [
                          {"type":"text","text": (states('input_text.notif_title_urgent') if states('input_text.notif_title_urgent')|trim and states('input_text.notif_title_urgent')|lower not in ['unknown','unavailable','none'] else '【AI離家系統 V2.0】')},
                          {"type":"text","text":"系統偵測所有人已離家，家電皆為關閉狀態但門鎖尚未上鎖！請確認鐵門及二樓門鎖狀況！"}
                        ] +
                        ([{"type":"text","text": states('sensor.batt_line_text')}] if (states('sensor.batt_line_text')|trim and states('sensor.batt_line_text')|lower not in ['unknown','unavailable','none']) else [])
                      ) | tojson
                    }}
