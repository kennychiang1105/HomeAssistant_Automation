# ─────────────────────────────────────────────────────────────
# 100B自動離家AI (V2.4)   （Helpers V2.13 相容）
# 更新重點（相對 V2.3）：
# 1) Aqara 網關情境：改用 input_boolean.aqara_* 判斷離家/夜間/觸發狀態，淘汰舊 alarm_control_panel 實體。
# 2) 通知同步：LINE 標題同步至 V2.4，訊息仍沿用 AI 離家格式並補充情境狀態說明。
# 前版更新（V1 Beta 9 → V2.3）：
# 1) 版本號升級：升級至 V2.3，與 Helper V2.10 同步，並統一更新日誌格式。
# 2) 通知優化：新增 HA 系統通知，並將 LINE 重要/緊急通知開關與 Helpers V2.2 同步。
# 3) LINE 格式：一般通知回復「一般 General 🪧」標示並增添 Emoji，維持舊版訊息風格與可讀性。
# ─────────────────────────────────────────────────────────────
alias: "100B自動離家AI (V2.4)"
id: automation.100b_ai_leave_v1beta9
description: "AI離家 v2.4"
mode: single

triggers:
  - entity_id: device_tracker.iphone_17_pro_max_kenny
    to: not_home
    for: {seconds: 10}
    trigger: state
  - entity_id: device_tracker.iphone_13_pro_max_iris_2
    to: not_home
    for: {seconds: 10}
    trigger: state
  - entity_id: device_tracker.iphone_16_jerry
    to: not_home
    for: {seconds: 10}
    trigger: state
  - entity_id: device_tracker.unifi_16_cc_a1_4d_4f_42_default
    to: not_home
    for: {seconds: 10}
    trigger: state

conditions:
  - condition: and
    conditions:
      - condition: state
        entity_id: device_tracker.unifi_16_cc_a1_4d_4f_42_default
        state: not_home
      - condition: state
        entity_id: device_tracker.iphone_17_pro_max_kenny
        state: not_home
      - condition: state
        entity_id: device_tracker.iphone_13_pro_max_iris_2
        state: not_home
      - condition: state
        entity_id: device_tracker.iphone_16_jerry
        state: not_home
  - condition: or
    conditions:
      - condition: not
        conditions:
          - condition: state
            entity_id: device_tracker.unifi_16_cc_a1_4d_4f_42_default
            state: not_home
            for: {minutes: 10}
      - condition: not
        conditions:
          - condition: state
            entity_id: device_tracker.iphone_17_pro_max_kenny
            state: not_home
            for: {minutes: 10}
      - condition: not
        conditions:
          - condition: state
            entity_id: device_tracker.iphone_13_pro_max_iris_2
            state: not_home
            for: {minutes: 10}
      - condition: not
        conditions:
          - condition: state
            entity_id: device_tracker.iphone_16_jerry
            state: not_home
            for: {minutes: 10}

variables:
  automation_version: "V2.4"
  helpers_compat: "Helpers V2.13"
  notif_title_base: "【AI離家系統 V2.4】"
  notif_title_general: >-
    {% set title = states('input_text.notif_title_100b_general') %}
    {{ title if title|trim and title|lower not in ['unknown','unavailable','none'] else '【AI離家系統 V2.4】' }}
  notif_title_urgent: >-
    {% set title = states('input_text.notif_title_100b_urgent') %}
    {{ title if title|trim and title|lower not in ['unknown','unavailable','none'] else '【AI離家系統 V2.4】' }}
  notif_title_only_general: >-
    {{ (notif_title_general if notif_title_general|trim else notif_title_base) }}
  notif_title_only_urgent: >-
    {{ (notif_title_urgent if notif_title_urgent|trim else notif_title_base) }}
  notif_heading_general: >-
    {% set heading = notif_title_general if notif_title_general|trim else notif_title_base %}
    {{ heading ~ '\n一般 General 🪧' }}
  notif_heading_urgent: >-
    {% set heading = notif_title_urgent if notif_title_urgent|trim else notif_title_base %}
    {{ heading ~ '\n緊急 Urgent ‼️' }}
  notif_title_only_general_safe: >-
    {{ notif_title_only_general|default(notif_title_base, true)|string }}
  notif_title_only_urgent_safe: >-
    {{ notif_title_only_urgent|default(notif_title_base, true)|string }}

  debounce_sec: 120
  debounce_ok: >-
    {% set last = state_attr(this.entity_id, 'last_triggered') %}
    {% set delta = (as_timestamp(now()) - as_timestamp(last)) if last else 999999 %}
    {{ delta > debounce_sec }}

  arm_away_timeout_sec: 5

  aqara_zai_jia_on: "{{ is_state('input_boolean.aqara_zai_jia','on') }}"
  aqara_wan_an_on: "{{ is_state('input_boolean.aqara_wan_an','on') }}"
  aqara_li_jia_on: "{{ is_state('input_boolean.aqara_li_jia','on') }}"
  aqara_guan_bi_on: "{{ is_state('input_boolean.aqara_guan_bi','on') }}"
  aqara_chu_fa_on: "{{ is_state('input_boolean.aqara_chu_fa','on') }}"
  aqara_state_label: >-
    {% if aqara_li_jia_on %}離家情境
    {% elif aqara_wan_an_on %}晚安情境
    {% elif aqara_zai_jia_on %}在家情境
    {% elif aqara_guan_bi_on %}網關解除情境
    {% elif aqara_chu_fa_on %}網關觸發情境
    {% else %}無情境（全關）{% endif %}
  aqara_is_away: "{{ aqara_li_jia_on }}"
  aqara_active_labels: >-
    {% set labels = [] %}
    {% if aqara_zai_jia_on %}{% set _ = labels.append('在家情境') %}{% endif %}
    {% if aqara_wan_an_on %}{% set _ = labels.append('晚安情境') %}{% endif %}
    {% if aqara_li_jia_on %}{% set _ = labels.append('離家情境') %}{% endif %}
    {% if aqara_guan_bi_on %}{% set _ = labels.append('網關解除情境') %}{% endif %}
    {% if aqara_chu_fa_on %}{% set _ = labels.append('網關觸發情境') %}{% endif %}
    {{ labels|join('、') if labels else '無（全關）' }}

  doorlock_batt: "{{ states('sensor.ke_ting_men_suo_dian_liang_guo_lu')|float(-1) }}"
  batt_valid: "{{ doorlock_batt >= 0 }}"
  batt50: "{{ batt_valid and doorlock_batt < 50 }}"
  batt10: "{{ batt_valid and doorlock_batt < 10 }}"
  batt0: "{{ batt_valid and doorlock_batt < 1 }}"
  batt_line_text: >-
    {% set txt = states('sensor.batt_line_text') %}
    {% set invalids = ['unknown','unavailable','none','None'] %}
    {{ txt if txt|trim and txt|lower not in invalids else '門鎖電量摘要：\n• 資料暫無（gateway 尚未回報）' }}
  batt_line_text_line: >-
    {{ (batt_line_text|replace('\\n','\n')) if batt_line_text|default('')|trim else '' }}
  batt_line_text_line_safe: >-
    {{ batt_line_text_line|default('', true)|string }}
  title_fallback_line: "【AI離家系統 V2.4】"

actions:
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ not debounce_ok }}"
        sequence:
          - stop: "防抖中（{{ debounce_sec }} 秒內重複觸發）—已跳過通知"

  - event: ai_leave_confirmed
    event_data:
      who: kenny
      reason: "automation.100b_ai_leave_v1beta9 conditions passed — {{ automation_version }} / {{ helpers_compat }}"

  # 若尚未離家情境 → 觸發離家情境
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ not is_state('input_boolean.aqara_li_jia','on') }}"
        sequence:
          - service: automation.trigger
            target:
              entity_id: automation.101li_jia_qing_jing
            data: {skip_condition: true}
          - wait_template: >
              {{ is_state('input_boolean.aqara_li_jia','on') }}
            timeout: "00:00:{{ arm_away_timeout_sec }}"
            continue_on_timeout: true
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ not is_state('input_boolean.aqara_li_jia','on') }}"
                sequence:
          - service: notify.persistent_notification
            data:
              title: "{{ notif_title_urgent }}"
              message: |-
                ⚠️ 已判定離家，但保全系統未成功設定外出模式。
                目前情境：{{ aqara_state_label|default('情境未知', true) }}
          - if:
              - condition: state
                entity_id: input_boolean.notify_line_emergency_enable
                state: "on"
            then:
              - service: script.send_line_to_user
                data:
                  user_id: C26ff4e9d30159ba5264a1676f46f8f86
                  payload: >-
                    {% set base = title_fallback_line %}
                    {% set title_raw = states('input_text.notif_title_100b_urgent') %}
                    {% set title_safe = title_raw if title_raw|trim and title_raw|lower not in ['unknown','unavailable','none'] else base %}
                    {% set batt_txt = states('sensor.batt_line_text') %}
                    {% set batt_safe = (batt_txt|replace('\\n','\n')) if batt_txt|trim and batt_txt|lower not in ['unknown','unavailable','none'] else '' %}
                    {% set messages = [
                      {"type":"text","text": title_safe},
                      {"type":"text","text": '緊急 Urgent ‼️'},
                      {"type":"text","text": (
                        '⚠️ 已判定離家並執行離家情境，'
                        ~ "\n但 Aqara 網關未成功設定離家模式。"
                        ~ "\n目前情境：" ~ (aqara_state_label|default('情境未知', true))
                      )}
                    ] %}
                    {% if batt_safe|trim %}
                      {% set messages = messages + [{"type":"text","text": batt_safe}] %}
                    {% endif %}
                    {{ messages | tojson }}

  - choose:
      - conditions:
          - condition: and
            conditions:
              - condition: state
                entity_id: cover.garage
                state: closed
              - condition: or
                conditions:
                  - condition: state
                    entity_id: input_boolean.er_lou_men_suo_tong_bu_kai_guan
                    state: "off"
                  - condition: template
                    value_template: "{{ batt0 }}"
              - condition: state
                entity_id: input_boolean.aqara_li_jia
                state: "on"
        sequence:
          - service: notify.persistent_notification
            data:
              title: "{{ notif_title_general|default(notif_title_base, true) }}"
              message: |-
                🏠 系統偵測所有人已離家。
                • 家電皆為關閉，門鎖皆已上鎖。
                • 已啟動離家模式。

                {{ batt_line_text_line }}
          - if:
              - condition: state
                entity_id: input_boolean.notify_line_important_enable
                state: "on"
            then:
              - service: script.send_line_to_user
                data:
                  user_id: C26ff4e9d30159ba5264a1676f46f8f86
                  payload: >-
                    {% set base = title_fallback_line %}
                    {% set title_raw = states('input_text.notif_title_100b_general') %}
                    {% set title_safe = title_raw if title_raw|trim and title_raw|lower not in ['unknown','unavailable','none'] else base %}
                    {% set batt_txt = states('sensor.batt_line_text') %}
                    {% set batt_safe = (batt_txt|replace('\\n','\n')) if batt_txt|trim and batt_txt|lower not in ['unknown','unavailable','none'] else '' %}
                    {% set messages = [
                      {"type":"text","text": title_safe},
                      {"type":"text","text": '一般 General 🪧'},
                      {"type":"text","text": (
                        '🏠 系統偵測所有人已離家。'
                        ~ "\n• 家電皆為關閉，門鎖皆已上鎖。"
                        ~ "\n• 已啟動離家模式。"
                      )}
                    ] %}
                    {% if batt_safe|trim %}
                      {% set messages = messages + [{"type":"text","text": batt_safe}] %}
                    {% endif %}
                    {{ messages | tojson }}

      - conditions:
          - condition: and
            conditions:
              - condition: template
                value_template: >-
                  {% set garage_open = is_state('cover.garage','open') %}
                  {% set lock_on = is_state('input_boolean.er_lou_men_suo_tong_bu_kai_guan','on') %}
                  {{ garage_open or (lock_on and (not batt0)) }}
              - condition: state
                entity_id: input_boolean.aqara_li_jia
                state: "on"
        sequence:
          - service: notify.persistent_notification
            data:
              title: "{{ notif_title_urgent|default(notif_title_base, true) }}"
              message: |-
                ⚠️ 系統偵測所有人已離家，但門鎖/車庫有未上鎖或未關狀態。
                請確認鐵門與二樓門鎖狀況！
          - if:
              - condition: state
                entity_id: input_boolean.notify_line_emergency_enable
                state: "on"
            then:
              - service: script.send_line_to_user
                data:
                  user_id: C26ff4e9d30159ba5264a1676f46f8f86
                  payload: >-
                    {% set base = title_fallback_line %}
                    {% set title_raw = states('input_text.notif_title_100b_urgent') %}
                    {% set title_safe = title_raw if title_raw|trim and title_raw|lower not in ['unknown','unavailable','none'] else base %}
                    {% set batt_txt = states('sensor.batt_line_text') %}
                    {% set batt_safe = (batt_txt|replace('\\n','\n')) if batt_txt|trim and batt_txt|lower not in ['unknown','unavailable','none'] else '' %}
                    {% set messages = [
                      {"type":"text","text": title_safe},
                      {"type":"text","text": '緊急 Urgent ‼️'},
                      {"type":"text","text": (
                        '⚠️ 系統偵測所有人已離家，但門鎖/車庫有未上鎖或未關狀態。'
                        ~ "\n請確認鐵門與二樓門鎖狀況！"
                      )}
                    ] %}
                    {% if batt_safe|trim %}
                      {% set messages = messages + [{"type":"text","text": batt_safe}] %}
                    {% endif %}
                    {{ messages | tojson }}
