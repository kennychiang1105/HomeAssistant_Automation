# ─────────────────────────────────────────────────────────────
# 100B自動離家AI (V2.3)   （Helpers V2.9 相容）
# 更新重點（相對 V2.2）：
# 1) 版本號同步：更新自動化/Helper 標題與版本同步器至 V2.3，保持通知版本一致。
# 2) 通知格式：沿用 V1 Beta 9 樣式並補齊 fallback 版本字串，避免混用 V2.2/V1 Beta 9。
# 前版更新（V1 Beta 9 → V2.2）：
# 1) 版本號升級：升級至 V2.2，與 Helper V2.6 同步，並統一更新日誌格式。
# 2) 通知優化：新增 HA 系統通知，並將 LINE 重要/緊急通知開關與 Helpers V2.2 同步。
# 3) LINE 格式：一般通知回復「一般 General 🪧」標示並增添 Emoji，維持舊版訊息風格與可讀性。
# ─────────────────────────────────────────────────────────────
alias: "100B自動離家AI (V2.3)"
id: automation.100b_ai_leave_v1beta9
description: "AI離家 v2.3"
mode: single

triggers:
  - entity_id: device_tracker.iphone_17_pro_max_kenny
    to: not_home
    for: {seconds: 10}
    trigger: state
  - entity_id: device_tracker.iphone_13_pro_max_iris_2
    to: not_home
    for: {seconds: 10}
    trigger: state
  - entity_id: device_tracker.iphone_16_jerry
    to: not_home
    for: {seconds: 10}
    trigger: state
  - entity_id: device_tracker.unifi_16_cc_a1_4d_4f_42_default
    to: not_home
    for: {seconds: 10}
    trigger: state

conditions:
  - condition: and
    conditions:
      - condition: state
        entity_id: device_tracker.unifi_16_cc_a1_4d_4f_42_default
        state: not_home
      - condition: state
        entity_id: device_tracker.iphone_17_pro_max_kenny
        state: not_home
      - condition: state
        entity_id: device_tracker.iphone_13_pro_max_iris_2
        state: not_home
      - condition: state
        entity_id: device_tracker.iphone_16_jerry
        state: not_home
  - condition: or
    conditions:
      - condition: not
        conditions:
          - condition: state
            entity_id: device_tracker.unifi_16_cc_a1_4d_4f_42_default
            state: not_home
            for: {minutes: 10}
      - condition: not
        conditions:
          - condition: state
            entity_id: device_tracker.iphone_17_pro_max_kenny
            state: not_home
            for: {minutes: 10}
      - condition: not
        conditions:
          - condition: state
            entity_id: device_tracker.iphone_13_pro_max_iris_2
            state: not_home
            for: {minutes: 10}
      - condition: not
        conditions:
          - condition: state
            entity_id: device_tracker.iphone_16_jerry
            state: not_home
            for: {minutes: 10}

variables:
  automation_version: "V2.3"
  helpers_compat: "Helpers V2.10"
  notif_title_base: "【AI離家系統 V2.3】"
  notif_title_general: >-
    {% set title = states('input_text.notif_title_100b_general') %}
    {{ title if title|trim and title|lower not in ['unknown','unavailable','none'] else '【AI離家系統 V2.3】' }}
  notif_title_urgent: >-
    {% set title = states('input_text.notif_title_100b_urgent') %}
    {{ title if title|trim and title|lower not in ['unknown','unavailable','none'] else '【AI離家系統 V2.3】' }}
  notif_heading_general: >-
    {% set heading = notif_title_general if notif_title_general|trim else notif_title_base %}
    {{ heading ~ '\n一般 General 🪧' }}
  notif_heading_urgent: >-
    {% set heading = notif_title_urgent if notif_title_urgent|trim else notif_title_base %}
    {{ heading ~ '\n緊急 Urgent ‼️' }}

  debounce_sec: 120
  debounce_ok: >-
    {% set last = state_attr(this.entity_id, 'last_triggered') %}
    {% set delta = (as_timestamp(now()) - as_timestamp(last)) if last else 999999 %}
    {{ delta > debounce_sec }}

  arm_away_timeout_sec: 5

  doorlock_batt: "{{ states('sensor.ke_ting_men_suo_dian_liang_guo_lu')|float(-1) }}"
  batt_valid: "{{ doorlock_batt >= 0 }}"
  batt50: "{{ batt_valid and doorlock_batt < 50 }}"
  batt10: "{{ batt_valid and doorlock_batt < 10 }}"
  batt0: "{{ batt_valid and doorlock_batt < 1 }}"
  batt_line_text: >-
    {% set txt = states('sensor.batt_line_text') %}
    {% set invalids = ['unknown','unavailable','none','None'] %}
    {{ txt if txt|trim and txt|lower not in invalids else '門鎖電量摘要：\n• 資料暫無（gateway 尚未回報）' }}
  batt_line_text_line: "{{ (batt_line_text|replace('\\n','\n')) if batt_line_text|default('')|trim else '' }}"

actions:
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ not debounce_ok }}"
        sequence:
          - stop: "防抖中（{{ debounce_sec }} 秒內重複觸發）—已跳過通知"

  - event: ai_leave_confirmed
    event_data:
      who: kenny
      reason: "automation.100b_ai_leave_v1beta9 conditions passed — {{ automation_version }} / {{ helpers_compat }}"

  # 若尚未 armed_away → 觸發離家情境
  - choose:
      - conditions:
          - condition: template
            value_template: >
              {{ states('alarm_control_panel.54ef44cf58f9_alarm') != 'armed_away' }}
        sequence:
          - service: automation.trigger
            target:
              entity_id: automation.101li_jia_qing_jing
            data: {skip_condition: true}
          - wait_template: >
              {{ states('alarm_control_panel.54ef44cf58f9_alarm') == 'armed_away' }}
            timeout: "00:00:{{ arm_away_timeout_sec }}"
            continue_on_timeout: true
          - choose:
              - conditions:
                  - condition: template
                    value_template: >
                      {{ states('alarm_control_panel.54ef44cf58f9_alarm') != 'armed_away' }}
                sequence:
          - service: notify.persistent_notification
            data:
              title: "{{ notif_title_urgent }}"
              message: |-
                ⚠️ 已判定離家，但保全系統未成功設定外出模式。
                目前狀態：{{ states('alarm_control_panel.54ef44cf58f9_alarm') }}
          - if:
              - condition: state
                entity_id: input_boolean.notify_line_emergency_enable
                state: "on"
            then:
              - service: script.send_line_to_user
                data:
                  user_id: C26ff4e9d30159ba5264a1676f46f8f86
                  payload: >-
                    {% set alarm_state = states('alarm_control_panel.54ef44cf58f9_alarm') %}
                    {% set alarm_labels = {
                      'armed_away': '外出模式',
                      'armed_home': '在家模式',
                      'armed_night': '夜間模式',
                      'armed_custom_bypass': '自訂模式',
                      'pending': '待啟用',
                      'triggered': '已觸發',
                      'disarmed': '未設防'
                    } %}
                    {% set alarm_label = alarm_labels.get(alarm_state, alarm_state) %}
                    {% set messages = [
                      {"type":"text","text": notif_heading_urgent|default(notif_title_base ~ '\n緊急 Urgent ‼️', true)},
                      {"type":"text","text": (
                        '⚠️ 已判定離家並執行離家情境，'
                        ~ "\n但保全系統未成功設定外出模式。"
                        ~ "\n保全狀態：" ~ alarm_label ~ (('（' ~ alarm_state ~ '）') if alarm_state|trim else '')
                      )}
                    ] %}
                    {% if batt_line_text_line|trim %}
                      {% set messages = messages + [{"type":"text","text": batt_line_text_line}] %}
                    {% endif %}
                    {{ messages | tojson }}

  - choose:
      - conditions:
          - condition: and
            conditions:
              - condition: state
                entity_id: cover.garage
                state: closed
              - condition: or
                conditions:
                  - condition: state
                    entity_id: input_boolean.er_lou_men_suo_tong_bu_kai_guan
                    state: "off"
                  - condition: template
                    value_template: "{{ batt0 }}"
              - condition: state
                entity_id: alarm_control_panel.54ef44cf58f9_alarm
                state: armed_away
        sequence:
          - service: notify.persistent_notification
            data:
              title: "{{ notif_title_general|default(notif_title_base, true) }}"
              message: |-
                🏠 系統偵測所有人已離家。
                • 家電皆為關閉，門鎖皆已上鎖。
                • 已啟動離家模式。

                {{ batt_line_text_line }}
          - if:
              - condition: state
                entity_id: input_boolean.notify_line_important_enable
                state: "on"
            then:
              - service: script.send_line_to_user
                data:
                  user_id: C26ff4e9d30159ba5264a1676f46f8f86
                  payload: >-
                    {% set messages = [
                      {"type":"text","text": notif_heading_general|default(notif_title_base ~ '\n一般 General 🪧', true)},
                      {"type":"text","text": (
                        '🏠 系統偵測所有人已離家。'
                        ~ "\n• 家電皆為關閉，門鎖皆已上鎖。"
                        ~ "\n• 已啟動離家模式。"
                      )}
                    ] %}
                    {% if batt_line_text_line|trim %}
                      {% set messages = messages + [{"type":"text","text": batt_line_text_line}] %}
                    {% endif %}
                    {{ messages | tojson }}

      - conditions:
          - condition: and
            conditions:
              - condition: template
                value_template: >-
                  {% set garage_open = is_state('cover.garage','open') %}
                  {% set lock_on = is_state('input_boolean.er_lou_men_suo_tong_bu_kai_guan','on') %}
                  {{ garage_open or (lock_on and (not batt0)) }}
              - condition: state
                entity_id: alarm_control_panel.54ef44cf58f9_alarm
                state: armed_away
        sequence:
          - service: notify.persistent_notification
            data:
              title: "{{ notif_title_urgent|default(notif_title_base, true) }}"
              message: |-
                ⚠️ 系統偵測所有人已離家，但門鎖/車庫有未上鎖或未關狀態。
                請確認鐵門與二樓門鎖狀況！
          - if:
              - condition: state
                entity_id: input_boolean.notify_line_emergency_enable
                state: "on"
            then:
              - service: script.send_line_to_user
                data:
                  user_id: C26ff4e9d30159ba5264a1676f46f8f86
                  payload: >-
                    {% set messages = [
                      {"type":"text","text": notif_heading_urgent|default(notif_title_base ~ '\n緊急 Urgent ‼️', true)},
                      {"type":"text","text": (
                        '⚠️ 系統偵測所有人已離家，但門鎖/車庫有未上鎖或未關狀態。'
                        ~ "\n請確認鐵門與二樓門鎖狀況！"
                      )}
                    ] %}
                    {% if batt_line_text_line|trim %}
                      {% set messages = messages + [{"type":"text","text": batt_line_text_line}] %}
                    {% endif %}
                    {{ messages | tojson }}
