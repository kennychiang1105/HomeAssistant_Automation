# ─────────────────────────────────────────────────────────────
# 08-6離家保全系統AI (V1.4)   （Helpers V2.16 相容）
# 更新重點（相對 V1.3）：
# 1) 情境 helper 更名：改讀 sensor.aqaradang_qian_qing_jing，修正拼字導致空白情境。
# 2) 版本同步：對應 Helpers V2.16。
# 前版更新（V1.0 → V1.1）：
# 1) Aqara 情境判斷：改用 input_boolean.aqara_* 辨識離家/夜間/觸發狀態，淘汰舊 alarm_control_panel 實體。
# 2) LINE 通知升級：採用 AI 離家訊息格式並套用 Helper 分級，鐵門告警歸類為「重要」、門鎖/全開告警歸類為「緊急」。
# 3) 版本同步：通知標題與 Helpers V2.12 同步，保留舊版更新紀錄。
# ─────────────────────────────────────────────────────────────
alias: 08-6離家保全系統AI (V1.4)
description: ""
mode: single

variables:
  automation_version: "V1.4"
  helpers_compat: "Helpers V2.16"
  notif_title_base: "【離家保全系統 V1.4】"
  notif_title_important: >-
    {% set title = states('input_text.notif_title_086_important') %}
    {{ title if title|trim and title|lower not in ['unknown','unavailable','none'] else notif_title_base }}
  notif_title_emergency: >-
    {% set title = states('input_text.notif_title_086_emergency') %}
    {{ title if title|trim and title|lower not in ['unknown','unavailable','none'] else notif_title_base }}
  notif_heading_important: "{{ notif_title_important ~ '\\n重要 Important ⚠️' }}"
  notif_heading_emergency: "{{ notif_title_emergency ~ '\\n緊急 Urgent ‼️' }}"
  aqara_zai_jia_on: "{{ is_state('input_boolean.aqara_zai_jia','on') | bool }}"
  aqara_wan_an_on: "{{ is_state('input_boolean.aqara_wan_an','on') | bool }}"
  aqara_li_jia_on: "{{ is_state('input_boolean.aqara_li_jia','on') | bool }}"
  aqara_guan_bi_on: "{{ is_state('input_boolean.aqara_guan_bi','on') | bool }}"
  aqara_chu_fa_on: "{{ is_state('input_boolean.aqara_chu_fa','on') | bool }}"
  aqara_scene_label_helper_raw: "{{ states('sensor.aqaradang_qian_qing_jing')|string }}"
  aqara_scene_label_attr_raw: "{{ state_attr('sensor.aqaradang_qian_qing_jing','active_labels')|string }}"
  aqara_scene_label_helper: >-
    {% set label = aqara_scene_label_helper_raw|trim %}
    {% set invalids = ['unknown','unavailable','none','null','', None, 'None', '未設定情境'] %}
    {% if label|lower in invalids %}
      {{ '' }}
    {% else %}
      {{ label }}
    {% endif %}
  aqara_scene_label_attr: >-
    {% set label = aqara_scene_label_attr_raw|trim %}
    {% set invalids = ['unknown','unavailable','none','null','', None, 'None'] %}
    {% if label|lower in invalids %}
      {{ '' }}
    {% else %}
      {{ label }}
    {% endif %}
  aqara_state_label: >-
    {% if is_state('input_boolean.aqara_li_jia','on') %}離家情境
    {% elif is_state('input_boolean.aqara_wan_an','on') %}晚安情境
    {% elif is_state('input_boolean.aqara_zai_jia','on') %}在家情境
    {% elif is_state('input_boolean.aqara_guan_bi','on') %}網關解除情境
    {% elif is_state('input_boolean.aqara_chu_fa','on') %}網關觸發情境
    {% else %}情境未知{% endif %}
  aqara_active_labels: >-
    {% set labels = [] %}
    {% if is_state('input_boolean.aqara_zai_jia','on') %}{% set _ = labels.append('在家情境') %}{% endif %}
    {% if is_state('input_boolean.aqara_wan_an','on') %}{% set _ = labels.append('晚安情境') %}{% endif %}
    {% if is_state('input_boolean.aqara_li_jia','on') %}{% set _ = labels.append('離家情境') %}{% endif %}
    {% if is_state('input_boolean.aqara_guan_bi','on') %}{% set _ = labels.append('網關解除情境') %}{% endif %}
    {% if is_state('input_boolean.aqara_chu_fa','on') %}{% set _ = labels.append('網關觸發情境') %}{% endif %}
    {{ labels|join('、') if labels else '' }}
  aqara_scene_label_safe: >-
    {% if aqara_scene_label_helper|trim %}{{ aqara_scene_label_helper|trim }}
    {% elif aqara_scene_label_attr|trim %}{{ aqara_scene_label_attr|trim }}
    {% elif aqara_active_labels|trim %}{{ aqara_active_labels|trim }}
    {% else %}{{ aqara_state_label }}{% endif %}
triggers:
  - entity_id:
      - cover.garage
    to: open
    for:
      hours: 0
      minutes: 5
      seconds: 0
    trigger: state
  - entity_id:
      - input_boolean.er_lou_men_suo_tong_bu_kai_guan
    to: "on"
    trigger: state
conditions:
  - condition: and
    conditions:
      - condition: state
        entity_id: device_tracker.unifi_16_cc_a1_4d_4f_42_default
        state: not_home
      - condition: state
        entity_id: device_tracker.iphone_17_pro_max_kenny
        state: not_home
      - condition: state
        entity_id: device_tracker.iphone_13_pro_max_iris_2
        state: not_home
      - condition: state
        entity_id: device_tracker.iphone_16_jerry
        state: not_home
      - condition: state
        entity_id: device_tracker.redmi_note_11_pro_5g
        state: not_home
